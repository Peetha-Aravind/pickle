<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Editor - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-amber-50 text-gray-800 min-h-screen p-8">
    
    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow p-8">
        <div class="mb-4"><a id="back-link" href="#" class="text-amber-700 font-medium hover:underline">&larr; Back to Products</a></div>
        <h2 id="editor-title" class="text-2xl font-bold mb-6 border-b pb-4">Add New Pickle</h2>
        
        <div class="space-y-4">
            <div>
                <label class="text-sm font-bold text-gray-700 block mb-1">Pickle Name <span class="text-red-500">*</span></label>
                <input type="text" id="prod-name" class="w-full px-4 py-2 border rounded bg-gray-50 focus:ring-2 focus:ring-amber-400 outline-none" placeholder="e.g. Extra Spicy Mango">
            </div>
            
            <div>
                <label class="text-sm font-bold text-gray-700 block mb-1">Image URL</label>
                <input type="text" id="prod-img" class="w-full px-4 py-2 border rounded bg-gray-50 focus:ring-2 focus:ring-amber-400 outline-none" placeholder="https://...">
            </div>
            
            <div class="border rounded-lg p-4 bg-gray-50 mt-6">
                <div class="flex justify-between items-center mb-3">
                    <label class="font-bold text-gray-800">Quantity Variants & Pricing <span class="text-red-500">*</span></label>
                    <button onclick="app.addVariant()" class="text-xs bg-amber-200 hover:bg-amber-300 px-3 py-1.5 rounded font-bold shadow transition-colors text-amber-900">+ Add Variant</button>
                </div>
                <div id="variants-container" class="space-y-3"></div>
            </div>

            <div class="flex justify-end pt-6 border-t mt-6">
                <button onclick="app.savePickle()" id="save-btn" class="px-8 py-2.5 bg-green-600 text-white rounded-lg shadow-md font-bold hover:bg-green-700 transition-colors flex items-center">
                    <i class="fas fa-save mr-2"></i> Save Pickle
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM", authDomain: "pickle-fdc54.firebaseapp.com", projectId: "pickle-fdc54" };
        const db = getFirestore(initializeApp(firebaseConfig));
        
        // Extract both IDs from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const categoryId = urlParams.get('categoryId');

        window.app = {
            variants: [{ weight: '500g', price: 150 }],
            
            init: async () => {
                if(!categoryId) {
                    alert("Category ID is missing. Returning to Categories.");
                    window.location.href = 'manage-categories.html';
                    return;
                }

                // Dynamically set the back link to return to the specific category
                document.getElementById('back-link').href = `manage-products.html?categoryId=${categoryId}`;

                // If editing an existing product
                if(productId) {
                    document.getElementById('editor-title').innerText = "Edit Pickle";
                    
                    const categoryRef = doc(db, 'categories', categoryId);
                    const docSnap = await getDoc(categoryRef);
                    
                    if(docSnap.exists()) {
                        const data = docSnap.data();
                        // Pull data directly from the Map
                        if(data.products && data.products[productId]) {
                            const prodData = data.products[productId];
                            document.getElementById('prod-name').value = prodData.name || '';
                            document.getElementById('prod-img').value = prodData.image || '';
                            app.variants = prodData.variants || [{weight: prodData.weight, price: prodData.price}];
                        }
                    }
                }
                app.renderVariants();
            },
            
            renderVariants: () => {
                document.getElementById('variants-container').innerHTML = app.variants.map((v, i) => `
                    <div class="flex space-x-2 items-center bg-white p-2 rounded border shadow-sm">
                        <input type="text" value="${v.weight}" onchange="app.updateVar(${i}, 'weight', this.value)" class="flex-1 px-3 py-1.5 border rounded bg-gray-50 outline-none focus:ring-1 focus:ring-amber-400" placeholder="Weight (250g)">
                        <input type="number" value="${v.price}" onchange="app.updateVar(${i}, 'price', this.value)" class="flex-1 px-3 py-1.5 border rounded bg-gray-50 outline-none focus:ring-1 focus:ring-amber-400" placeholder="Price (₹)">
                        <button onclick="app.removeVar(${i})" class="text-red-500 p-2 hover:bg-red-50 rounded transition-colors" title="Remove"><i class="fas fa-times"></i></button>
                    </div>`).join('');
            },
            
            addVariant: () => { app.variants.push({weight: '', price: ''}); app.renderVariants(); },
            removeVar: (i) => { if(app.variants.length > 1) { app.variants.splice(i, 1); app.renderVariants(); } },
            updateVar: (i, field, val) => { app.variants[i][field] = field === 'price' ? parseFloat(val) : val; },
            
            savePickle: async () => {
                const name = document.getElementById('prod-name').value.trim();
                const image = document.getElementById('prod-img').value.trim() || 'https://placehold.co/400x300/fef3c7/b45309?text=' + encodeURIComponent(name);
                
                if(!name || app.variants.length === 0) return alert("Valid name and at least one variant required.");
                
                const btn = document.getElementById('save-btn');
                btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Saving...`;
                btn.disabled = true;

                const data = { 
                    name, 
                    image, 
                    variants: app.variants, 
                    categoryId, // Automatically uses the ID from the URL
                    price: app.variants[0].price, 
                    weight: app.variants[0].weight 
                };
                
                const categoryRef = doc(db, 'categories', categoryId);

                try {
                    if (productId) {
                        // UPDATING
                        const rootProdRef = doc(db, 'products', productId);
                        await Promise.all([
                            updateDoc(rootProdRef, data),
                            setDoc(categoryRef, {
                                products: { [productId]: data }
                            }, { merge: true })
                        ]);
                    } else {
                        // CREATING
                        const rootProdRef = doc(collection(db, 'products'));
                        const newProductId = rootProdRef.id;
                        const saveData = { ...data, id: newProductId, isavailable: true, createdAt: Date.now() };
                        
                        await Promise.all([
                            setDoc(rootProdRef, saveData),
                            setDoc(categoryRef, {
                                products: { [newProductId]: saveData }
                            }, { merge: true })
                        ]);
                    }

                    // Redirect securely back to that specific category's management page
                    window.location.href = `manage-products.html?categoryId=${categoryId}`;
                } catch (error) {
                    console.error("Error saving product:", error);
                    alert("Failed to save the product. Check console.");
                    btn.innerHTML = `<i class="fas fa-save mr-2"></i> Save Pickle`;
                    btn.disabled = false;
                }
            }
        };
        app.init();
    </script>
</body>
</html>
