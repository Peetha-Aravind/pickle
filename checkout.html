<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Checkout – Happy NonVeg Pickles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* (styles unchanged – same as your original) */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --rust: #C0392B; --rust-dark: #962d22; --rust-light: #f5e9e7;
      --turmeric: #E8A020; --cream: #FDF6EC; --ink: #1C1009;
      --ash: #6b5b4e; --border: rgba(28,16,9,0.1);
      --shadow-sm: 0 2px 8px rgba(28,16,9,0.08);
      --shadow-md: 0 8px 32px rgba(28,16,9,0.12);
      --r-card: 16px; --r-pill: 999px;
      --ff-body: 'IBM Plex Sans', sans-serif;
    }
    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--ff-body);
      font-size: 15px;
      line-height: 1.5;
    }
    
    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1100;
      background: white;
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
      cursor: pointer;
      font-family: var(--ff-body);
    }
    .back-button:hover {
      background: var(--rust-light);
      border-color: var(--rust);
      color: var(--rust);
      transform: translateX(-2px);
    }
    .back-button svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2.5;
      fill: none;
    }

    .checkout-container {
      max-width: 1200px;
      margin: 80px auto 40px;
      padding: 0 5vw;
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 40px;
    }
    .left-panel { background: white; border-radius: var(--r-card); box-shadow: var(--shadow-sm); overflow: hidden; }
    .card { padding: 24px; border-bottom: 1px solid var(--border); }
    .card-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 16px; color: var(--ink); }
    .add-address-btn {
      background: white; border: 2px dashed var(--rust); border-radius: 60px;
      padding: 12px; width: 100%; text-align: center; font-weight: 600;
      color: var(--rust); cursor: pointer; transition: 0.2s;
    }
    .add-address-btn:hover { background: var(--rust-light); }
    .address-display {
      background: #f9f5f0; border-radius: 16px; padding: 14px;
      margin-top: 12px; font-size: 0.85rem; line-height: 1.4;
    }
    .payment-options { display: flex; flex-direction: column; gap: 14px; margin-top: 8px; }
    .payment-radio {
      display: flex; align-items: center; gap: 12px;
      border: 2px solid var(--border); border-radius: 16px;
      padding: 14px; cursor: pointer; transition: 0.2s;
    }
    .payment-radio.active { border-color: var(--rust); background: var(--rust-light); }
    .payment-radio input { width: 18px; height: 18px; margin: 0; cursor: pointer; }
    .payment-radio .label { flex: 1; }
    .payment-radio .name { font-weight: 700; display: block; }
    .payment-radio .fee { font-size: 0.7rem; color: var(--ash); }
    
    .order-summary {
      background: white; border-radius: var(--r-card); box-shadow: var(--shadow-sm);
      overflow: hidden; position: sticky; top: 20px;
      display: flex; flex-direction: column;
    }
    .summary-header { background: var(--rust); color: white; padding: 18px 24px; font-weight: 700; font-size: 1.2rem; }
    .summary-items { padding: 20px 24px; border-bottom: 1px solid var(--border); max-height: 300px; overflow-y: auto; }
    .cart-item { display: flex; gap: 16px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px dashed var(--border); }
    .cart-item:last-child { margin-bottom: 0; border-bottom: none; }
    .cart-item-img { width: 70px; height: 70px; border-radius: 12px; background: #f0e7de; overflow: hidden; flex-shrink: 0; }
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-details { flex: 1; }
    .cart-item-name { font-weight: 700; margin-bottom: 4px; }
    .cart-item-variant { font-size: 0.8rem; color: var(--ash); margin-bottom: 6px; }
    .cart-item-price-row { display: flex; justify-content: space-between; align-items: baseline; }
    
    .coupon-section {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: #fffef8;
    }
    .coupon-row {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
    }
    .coupon-row input {
      flex: 1;
      padding: 12px;
      border-radius: 60px;
      border: 1px solid var(--border);
      font-family: var(--ff-body);
    }
    .apply-coupon-btn {
      background: var(--ink);
      color: white;
      border: none;
      padding: 0 20px;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .apply-coupon-btn:hover { background: var(--rust); }
    .discount-msg {
      font-size: 0.8rem;
      margin-top: 6px;
      min-height: 32px;
    }
    
    .summary-totals { padding: 20px 24px; background: #faf7f2; }
    .totals-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .totals-row.grand-total { font-weight: 800; font-size: 1.2rem; border-top: 2px solid var(--border); padding-top: 12px; margin-top: 8px; color: var(--rust); }
    .pay-btn {
      width: calc(100% - 48px); margin: 0 24px 24px 24px;
      background: var(--rust); color: white; border: none;
      padding: 16px; font-size: 1.1rem; font-weight: 700; border-radius: 40px;
      cursor: pointer; transition: 0.2s;
    }
    .pay-btn:hover { background: var(--rust-dark); transform: translateY(-2px); }
    
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
    }
    .modal-content {
      background: white; max-width: 500px; width: 90%; border-radius: 24px;
      padding: 28px; position: relative;
    }
    .modal-content h3 { margin-bottom: 20px; }
    .modal-content input, .modal-content textarea {
      width: 100%; margin-bottom: 16px; padding: 12px; border: 1px solid var(--border);
      border-radius: 12px;
      font-family: var(--ff-body);
    }
    .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 12px; }
    .modal-buttons button { padding: 10px 20px; border-radius: 40px; border: none; cursor: pointer; }
    .save-address { background: var(--rust); color: white; }
    .close-modal { background: #ccc; }
    
    footer {
      background: var(--ink);
      color: rgba(255,255,255,0.6);
      padding: 30px 5vw;
      text-align: center;
      margin-top: 60px;
    }
    
    @media (max-width: 800px) {
      .checkout-container { grid-template-columns: 1fr; gap: 30px; margin-top: 70px; }
      .order-summary { position: relative; top: 0; }
      .back-button { top: 12px; left: 12px; padding: 6px 12px; font-size: 13px; }
    }
  </style>
</head>
<body>

<!-- Back button at top left corner -->
<button class="back-button" onclick="goBack()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M15 18l-6-6 6-6"/>
  </svg>
  Back
</button>

<main id="checkoutRoot"><div style="text-align:center; padding:60px;">Loading checkout...</div></main>

<!-- Address Modal -->
<div id="addressModal" class="modal">
  <div class="modal-content">
    <h3>Add Delivery Address</h3>
    <input type="text" id="addrName" placeholder="Full Name *">
    <input type="tel" id="addrPhone" placeholder="Phone Number *">
    <textarea id="addrFull" rows="3" placeholder="Street, Area, Landmark *"></textarea>
    <input type="text" id="addrCity" placeholder="City *">
    <input type="text" id="addrPincode" placeholder="PIN Code *">
    <div class="modal-buttons">
      <button class="close-modal" onclick="closeAddressModal()">Cancel</button>
      <button class="save-address" onclick="saveAddress()">Save Address</button>
    </div>
  </div>
</div>

<footer><p>© 2025 Happy NonVeg Pickles — handcrafted with tradition.</p></footer>

<script>
  // Back navigation function
  function goBack() {
    if (document.referrer && document.referrer !== "") {
      window.history.back();
    } else {
      window.location.href = 'index.html';
    }
  }
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM",
    authDomain: "pickle-fdc54.firebaseapp.com",
    projectId: "pickle-fdc54",
    storageBucket: "pickle-fdc54.firebasestorage.app",
    messagingSenderId: "650348710985",
    appId: "1:650348710985:web:b8eedb551a79b536578398",
    measurementId: "G-B40NG5KQDL"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function formatPrice(p) { return `₹${Math.round(Number(p) || 0)}`; }

  // Global state
  let checkoutItems = [];      // array of { id, name, image, variant, quantity, price }
  let appliedCoupon = null;    // { code, type, value, docId }
  let selectedPayment = 'online';
  let savedAddress = null;

  // ─── Determine checkout flow and gather items ─────────────────
  async function getCheckoutItems() {
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id') || params.get('productId');

    // ── Direct Buy Now flow ──
    if (productId) {
      const qty = parseInt(params.get('quantity')) || 1;
      const variantWeight = params.get('weight') || '';
      const directPrice = params.get('price');
      const directName = params.get('name');
      const directImage = params.get('image');

      try {
        const prodSnap = await getDoc(doc(db, "products", productId));
        if (prodSnap.exists()) {
          const product = prodSnap.data();
          let selectedVariant = null;
          if (variantWeight && product.variants) {
            selectedVariant = product.variants.find(v => v.weight === variantWeight);
          }
          if (!selectedVariant && product.variants && product.variants.length > 0) {
            selectedVariant = product.variants[0];
          }
          const itemPrice = selectedVariant ? selectedVariant.price : (product.price || directPrice || 0);
          const imageUrl = product.mainImage || product.image || directImage || "https://placehold.co/400x400/f5e9e7/c0392b?text=Pickle";
          return [{
            id: productId,
            name: product.longName || product.name || directName || "Pickle",
            image: imageUrl,
            variant: selectedVariant ? selectedVariant.weight : (variantWeight || "Standard"),
            quantity: qty,
            price: Number(itemPrice)
          }];
        }
      } catch(e) { console.warn("Firestore fetch failed, using URL params", e); }

      return [{
        id: productId,
        name: directName || "Product",
        image: directImage || "https://placehold.co/400x400/f5e9e7/c0392b?text=Pickle",
        variant: variantWeight || "Standard",
        quantity: qty,
        price: Number(directPrice) || 0
      }];
    }

    // ── Cart Checkout flow ──
    const rawCart = JSON.parse(localStorage.getItem('vastramaya_cart')) || [];
    if (!rawCart.length) return [];

    return rawCart.map(item => ({
      id: item.productId || item.id,
      name: item.name,
      image: item.image || "https://placehold.co/400x400/f5e9e7/c0392b?text=Pickle",
      variant: item.size || item.variant || "Standard",
      quantity: item.quantity || 1,
      price: Number(item.price) || 0
    }));
  }

  // ─── Totals calculation ──────────────────────────────────────
  function getCurrentTotals() {
    let subtotal = 0;
    checkoutItems.forEach(item => {
      subtotal += item.price * item.quantity;
    });

    let discount = 0;
    let discountText = '';
    if (appliedCoupon) {
      if (appliedCoupon.type === 'percentage') {
        discount = subtotal * (appliedCoupon.value / 100);
        discountText = `${appliedCoupon.value}% off`;
      } else if (appliedCoupon.type === 'flat') {
        discount = appliedCoupon.value;
        discountText = `₹${appliedCoupon.value} off`;
      }
      discount = Math.min(discount, subtotal); // discount cannot exceed subtotal
    }

    let shipping = subtotal > 499 ? 0 : 40;
    let handlingFee = 0;
    if (selectedPayment === 'cod') handlingFee = 100;

    const total = subtotal - discount + shipping + handlingFee;
    return { subtotal, discount, discountText, shipping, handlingFee, total };
  }

  function updateTotalsAndButton() {
    const totals = getCurrentTotals();
    const totalsPanel = document.getElementById('totalsPanel');
    if (totalsPanel) {
      totalsPanel.innerHTML = `
        <div class="totals-row"><span>Subtotal</span><span>${formatPrice(totals.subtotal)}</span></div>
        ${totals.discount > 0 ? `<div class="totals-row"><span>Coupon Discount (${totals.discountText})</span><span>-${formatPrice(totals.discount)}</span></div>` : ''}
        <div class="totals-row"><span>Shipping</span><span>${totals.shipping === 0 ? 'FREE' : formatPrice(totals.shipping)}</span></div>
        ${selectedPayment === 'cod' ? `<div class="totals-row"><span>COD Handling Fee</span><span>${formatPrice(totals.handlingFee)}</span></div>` : ''}
        <div class="totals-row grand-total"><span>Total</span><span>${formatPrice(totals.total)}</span></div>
      `;
    }
    const payBtn = document.getElementById('payNowBtn');
    if (payBtn) payBtn.innerText = `Pay ${formatPrice(totals.total)}`;
  }

  // ─── Coupon logic – aligned with admin schema ──────────────────
  async function applyCoupon(code) {
    if (!code) return { success: false, message: 'Enter a coupon code' };
    const upperCode = code.toUpperCase();
    try {
      const couponRef = doc(db, "coupons", upperCode);
      const couponSnap = await getDoc(couponRef);

      if (!couponSnap.exists()) {
        return { success: false, message: 'Invalid coupon code' };
      }

      const data = couponSnap.data();

      // 1. Check active status
      if (data.isActive === false) {
        return { success: false, message: 'Coupon is not active' };
      }

      // 2. Check expiry (admin stores as string "YYYY-MM-DD")
      if (data.expiry) {
        const today = new Date();
        today.setHours(0,0,0,0); // compare date only
        const expiryDate = new Date(data.expiry);
        if (expiryDate < today) {
          return { success: false, message: 'Coupon has expired' };
        }
      }

      // 3. Check total usage limit
      if (data.totalLimit) {
        const used = data.usage || 0;
        if (used >= data.totalLimit) {
          return { success: false, message: 'Coupon usage limit reached' };
        }
      }

      // 4. Validate discount type and value
      const type = data.type; // "percentage" or "flat"
      const value = Number(data.value);
      if (!type || !value || value <= 0) {
        return { success: false, message: 'Invalid coupon configuration' };
      }

      // Store applied coupon info for totals calculation
      appliedCoupon = {
        code: upperCode,
        type: type,
        value: value,
        docId: upperCode  // same as doc ID
      };

      const discountText = type === 'percentage' ? `${value}% off` : `₹${value} off`;
      updateTotalsAndButton();
      return { success: true, message: `Coupon applied! ${discountText}` };
    } catch(e) {
      console.error("Coupon apply error:", e);
      return { success: false, message: 'Error validating coupon. Please try again.' };
    }
  }

  // ─── Render left panel (address + payment) ──────────────────
  function renderLeftPanel() {
    const leftContainer = document.getElementById('leftPanelContainer');
    if (!leftContainer) return;
    const addressHtml = savedAddress ? `
      <div class="address-display">
        <strong>${escapeHtml(savedAddress.name)}</strong><br>
        ${escapeHtml(savedAddress.address)}<br>
        ${escapeHtml(savedAddress.city)} - ${escapeHtml(savedAddress.pincode)}<br>
        Phone: ${escapeHtml(savedAddress.phone)}
      </div>
    ` : '<p style="color:var(--ash); margin-top:10px;">No address added yet.</p>';

    leftContainer.innerHTML = `
      <div class="card">
        <div class="card-title">📦 Delivery Address</div>
        <button class="add-address-btn" id="openAddressBtn">+ Add Address</button>
        <div id="addressDisplay">${addressHtml}</div>
      </div>
      <div class="card">
        <div class="card-title">💳 Payment Method</div>
        <div class="payment-options" id="paymentOptions">
          <div class="payment-radio ${selectedPayment === 'online' ? 'active' : ''}" data-payment="online">
            <input type="radio" name="payment" value="online" ${selectedPayment === 'online' ? 'checked' : ''}>
            <div class="label">
              <span class="name">🔒 Online Payment</span>
              <span class="fee">Recommended (UPI/Card/NetBanking)</span>
            </div>
          </div>
          <div class="payment-radio ${selectedPayment === 'cod' ? 'active' : ''}" data-payment="cod">
            <input type="radio" name="payment" value="cod" ${selectedPayment === 'cod' ? 'checked' : ''}>
            <div class="label">
              <span class="name">💰 Cash on Delivery</span>
              <span class="fee">+ ₹100 handling fee</span>
            </div>
          </div>
        </div>
      </div>
    `;

    document.getElementById('openAddressBtn')?.addEventListener('click', () => openAddressModal());
    const radios = document.querySelectorAll('.payment-radio');
    radios.forEach(radio => {
      radio.addEventListener('click', () => {
        const method = radio.getAttribute('data-payment');
        selectedPayment = method;
        radios.forEach(r => r.classList.remove('active'));
        radio.classList.add('active');
        const inp = radio.querySelector('input');
        if (inp) inp.checked = true;
        updateTotalsAndButton();
      });
    });
  }

  // ─── Render right column (order summary) ────────────────────
  function renderRightColumn() {
    const rightContainer = document.getElementById('rightColumnContainer');
    if (!rightContainer) return;

    const itemsHtml = checkoutItems.map(item => `
      <div class="cart-item">
        <div class="cart-item-img"><img src="${item.image}" alt="${escapeHtml(item.name)}" onerror="this.src='https://placehold.co/70x70/f5e9e7/c0392b?text=Pickle'"></div>
        <div class="cart-item-details">
          <div class="cart-item-name">${escapeHtml(item.name)}</div>
          <div class="cart-item-variant">${escapeHtml(item.variant)}</div>
          <div class="cart-item-price-row">
            <span class="cart-item-qty">Qty: ${item.quantity}</span>
            <span class="cart-item-total">${formatPrice(item.price * item.quantity)}</span>
          </div>
        </div>
      </div>
    `).join('');

    rightContainer.innerHTML = `
      <div class="order-summary">
        <div class="summary-header">Order Summary</div>
        <div class="summary-items">${itemsHtml}</div>
        <div class="coupon-section">
          <div class="coupon-row">
            <input type="text" id="couponInputRight" placeholder="Enter coupon code">
            <button class="apply-coupon-btn" id="applyCouponBtnRight">Apply</button>
          </div>
          <div id="discountMsgRight" class="discount-msg"></div>
        </div>
        <div class="summary-totals" id="totalsPanel"></div>
        <button class="pay-btn" id="payNowBtn">Pay Now</button>
      </div>
    `;

    // Coupon apply handler
    const applyBtn = document.getElementById('applyCouponBtnRight');
    const couponInput = document.getElementById('couponInputRight');
    if (applyBtn) {
      applyBtn.onclick = async () => {
        const code = couponInput.value.trim();
        const result = await applyCoupon(code);
        const msgDiv = document.getElementById('discountMsgRight');
        if (result.success) {
          msgDiv.innerHTML = `<span style="color:#2e7d32;">✅ ${result.message}</span>`;
        } else {
          msgDiv.innerHTML = `<span style="color:#d32f2f;">❌ ${result.message}</span>`;
        }
      };
    }

    updateTotalsAndButton();
    document.getElementById('payNowBtn')?.addEventListener('click', () => processOrder());
  }

  // ─── Address modal handlers ──────────────────────────────────
  function openAddressModal() {
    document.getElementById('addressModal').style.display = 'flex';
  }
  window.closeAddressModal = function() {
    document.getElementById('addressModal').style.display = 'none';
  };
  window.saveAddress = function() {
    const name = document.getElementById('addrName').value.trim();
    const phone = document.getElementById('addrPhone').value.trim();
    const address = document.getElementById('addrFull').value.trim();
    const city = document.getElementById('addrCity').value.trim();
    const pincode = document.getElementById('addrPincode').value.trim();
    if (!name || !phone || !address || !city || !pincode) {
      alert('Please fill all address fields');
      return;
    }
    savedAddress = { name, phone, address, city, pincode };
    document.getElementById('addressDisplay').innerHTML = `
      <div class="address-display">
        <strong>${escapeHtml(name)}</strong><br>
        ${escapeHtml(address)}<br>
        ${escapeHtml(city)} - ${escapeHtml(pincode)}<br>
        Phone: ${escapeHtml(phone)}
      </div>
    `;
    closeAddressModal();
  };

  // ─── Final order processing (placeholder) ────────────────────
  async function processOrder() {
    if (!savedAddress) { alert('Please add a delivery address first'); return; }
    if (!checkoutItems.length) { alert('No items in checkout'); return; }

    const totals = getCurrentTotals();
    const paymentMethod = selectedPayment === 'online' ? 'Online Payment' : 'Cash on Delivery';
    const itemList = checkoutItems.map(i => `${i.name} (${i.variant}) x ${i.quantity}`).join(', ');

    // Clear cart if it came from the cart flow
    if (!new URLSearchParams(window.location.search).get('id')) {
      localStorage.removeItem('vastramaya_cart');
    }

    /* 
      NOTE: In a real implementation you would:
      1. Call your payment gateway to charge the user.
      2. On success, increment the coupon usage with:
         await updateDoc(doc(db, "coupons", appliedCoupon.docId), { usage: increment(1) });
      3. Save the order to a Firestore "orders" collection.
    */

    alert(`✅ Order placed successfully!\n\nDeliver to: ${savedAddress.name}, ${savedAddress.address}, ${savedAddress.city}\nItems: ${itemList}\nTotal: ${formatPrice(totals.total)}\nPayment: ${paymentMethod}\n\nThank you for shopping!`);
    window.location.href = 'index.html';
  }

  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  // ─── Main initialisation ─────────────────────────────────────
  async function initCheckout() {
    const root = document.getElementById('checkoutRoot');
    checkoutItems = await getCheckoutItems();

    if (!checkoutItems.length) {
      root.innerHTML = `<div style="text-align:center; padding:40px;">❌ No items to checkout. <a href="index.html" style="color:var(--rust);">Continue Shopping</a></div>`;
      return;
    }

    root.innerHTML = `
      <div class="checkout-container">
