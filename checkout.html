<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Happy NonVeg Pickles – Product Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --rust: #C0392B; --rust-dark: #962d22; --rust-light: #f5e9e7;
      --turmeric: #E8A020; --cream: #FDF6EC; --ink: #1C1009;
      --ash: #6b5b4e; --border: rgba(28,16,9,0.1);
      --shadow-sm: 0 2px 8px rgba(28,16,9,0.08);
      --shadow-md: 0 8px 32px rgba(28,16,9,0.12);
      --r-card: 16px; --r-pill: 999px;
      --ff-body: 'IBM Plex Sans', sans-serif;
      --nav-h: 68px;
    }
    body {
      background-color: var(--cream);
      color: var(--ink);
      font-family: var(--ff-body);
      font-size: 15px;
      line-height: 1.5;
      padding-top: var(--nav-h);
    }
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 900;
      height: var(--nav-h); display: flex; align-items: center;
      justify-content: space-between; padding: 0 5vw;
      background: rgba(253,246,236,0.94); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: box-shadow 0.3s;
    }
    .nav.scrolled { box-shadow: var(--shadow-md); }
    .nav-logo {
      font-family: var(--ff-body);
      font-size: 1.45rem; font-weight: 700;
      color: var(--rust); letter-spacing: -0.5px;
      display: flex; align-items: center; gap: 10px;
    }
    .nav-logo .dot { width: 8px; height: 8px; background: var(--turmeric); border-radius: 50%; }
    .nav-links { display: flex; gap: 32px; }
    .nav-links a { font-weight: 600; font-size: 14px; color: var(--ash); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--rust); }
    .nav-cta { background: var(--rust); color: #fff; padding: 10px 22px; border-radius: var(--r-pill); font-weight: 600; }
    .nav-hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
    .product-container {
      max-width: 1280px; margin: 30px auto 60px; padding: 0 5vw;
      display: grid; grid-template-columns: 0.9fr 1.1fr; gap: 48px; align-items: start;
    }
    .product-gallery {
      position: sticky; top: calc(var(--nav-h) + 20px);
      display: flex; gap: 20px; flex-direction: row;
    }
    .thumbnail-strip {
      display: flex; flex-direction: column; gap: 14px;
      width: 85px; flex-shrink: 0;
    }
    .thumbnail {
      width: 85px; height: 85px; border-radius: 12px; overflow: hidden;
      cursor: pointer; border: 2px solid transparent;
      transition: border 0.2s, transform 0.2s;
      background: #e9dfd5;
    }
    .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
    .thumbnail.active { border-color: var(--rust); transform: scale(0.96); }
    .main-image {
      flex: 1; aspect-ratio: 1 / 1; background: #f0e7de;
      border-radius: var(--r-card); overflow: hidden; box-shadow: var(--shadow-sm);
    }
    .main-image img { width: 100%; height: 100%; object-fit: cover; }
    .product-info { display: flex; flex-direction: column; gap: 24px; }
    .product-title {
      font-family: var(--ff-body);
      font-size: 2.4rem; font-weight: 700;
      line-height: 1.2; color: var(--ink);
    }
    .rating { display: flex; align-items: center; gap: 12px; }
    .stars { color: var(--turmeric); font-size: 1.1rem; letter-spacing: 2px; }
    .review-count { color: var(--ash); font-size: 0.85rem; }
    .price-group {
      display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
      background: var(--rust-light); padding: 12px 20px;
      border-radius: 60px; width: fit-content;
    }
    .current-price { font-size: 2rem; font-weight: 800; color: var(--rust); }
    .old-price { text-decoration: line-through; color: var(--ash); font-size: 1rem; }
    .discount-badge { background: var(--rust); color: white; padding: 4px 12px; border-radius: 30px; font-size: 0.8rem; font-weight: 700; }
    .variants-section h3 { font-size: 1rem; margin-bottom: 12px; font-weight: 600; }
    .variant-buttons { display: flex; gap: 16px; flex-wrap: wrap; }
    .variant-btn {
      border: 1.5px solid var(--border); background: white; border-radius: 60px;
      padding: 10px 24px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .variant-btn.active { border-color: var(--rust); background: var(--rust-light); color: var(--rust); }
    .qty-selector { display: flex; align-items: center; gap: 20px; margin: 8px 0 10px; }
    .qty-control { display: flex; border: 1px solid var(--border); border-radius: 40px; overflow: hidden; }
    .qty-control button { background: #fff; border: none; padding: 8px 18px; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
    .qty-control input { width: 50px; text-align: center; border: none; font-weight: 600; font-size: 1rem; }
    .action-buttons { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
    .button-row { display: flex; gap: 16px; }
    .btn-cart, .btn-wishlist, .btn-buynow {
      flex: 1; padding: 14px; border-radius: 40px; font-weight: 700;
      text-align: center; cursor: pointer; transition: 0.2s;
    }
    .btn-cart { background: black; color: white; border: none; }
    .btn-cart:hover { background: #2c2c2c; transform: translateY(-2px); }
    .btn-wishlist { background: transparent; border: 1.5px solid var(--rust); color: var(--rust); }
    .btn-wishlist:hover { background: var(--rust-light); }
    .btn-buynow { background: var(--turmeric); color: var(--ink); border: none; font-weight: 800; }
    .btn-buynow:hover { background: #d48f1a; transform: translateY(-2px); }
    .extra-info { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
    .policy-block { background: #fff8f0; border-radius: 20px; padding: 18px; margin-bottom: 20px; }
    .policy-block h4 { font-size: 1rem; margin-bottom: 8px; color: var(--rust); }
    .full-description { background: white; border-radius: 20px; padding: 18px; box-shadow: var(--shadow-sm); }
    .related-section { max-width: 1280px; margin: 80px auto 60px; padding: 0 5vw; }
    .related-section h2 { font-family: var(--ff-body); font-weight: 700; font-size: 1.9rem; margin-bottom: 28px; }
    .related-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 28px;
    }
    .related-card {
      background: white; border-radius: var(--r-card); overflow: hidden;
      border: 1px solid var(--border); transition: transform 0.25s, box-shadow 0.25s;
      cursor: pointer; display: flex; flex-direction: column;
      position: relative;
    }
    .related-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }
    .related-img { aspect-ratio: 1 / 1; background: #f3ede7; }
    .related-img img { width: 100%; height: 100%; object-fit: cover; }
    .related-info { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .related-name { font-weight: 700; font-size: 0.95rem; }
    .related-stars { font-size: 0.75rem; color: var(--turmeric); letter-spacing: 1px; }
    .related-pricing { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin: 4px 0; }
    .related-price { color: var(--rust); font-weight: 800; font-size: 1rem; }
    .related-mrp { text-decoration: line-through; font-size: 0.8rem; color: var(--ash); }
    .related-discount-tag {
      position: absolute; top: 12px; left: 12px;
      background: var(--rust); color: white;
      padding: 4px 10px; border-radius: 30px;
      font-size: 0.7rem; font-weight: 700;
      z-index: 2;
    }
    .related-view-btn {
      background: black; color: white; border: none; border-radius: 40px;
      padding: 8px 12px; font-size: 0.75rem; font-weight: 600;
      margin-top: 8px; cursor: pointer; text-align: center; transition: background 0.2s;
    }
    .related-view-btn:hover { background: var(--rust); }
    .loader { text-align: center; padding: 60px; color: var(--ash); }
    .error-message {
      background: #ffefef; padding: 40px 30px; text-align: center;
      border-radius: var(--r-card); margin: 40px auto; max-width: 600px;
    }
    .error-message button {
      background: var(--rust); color: white; border: none;
      padding: 10px 24px; border-radius: 40px; margin-top: 20px;
      cursor: pointer; font-weight: bold;
    }
    footer { background: var(--ink); color: rgba(255,255,255,0.6); padding: 30px 5vw; text-align: center; margin-top: 50px; }
    @media (max-width: 800px) {
      .product-container { grid-template-columns: 1fr; gap: 32px; }
      .product-gallery { position: relative; top: 0; flex-direction: column; }
      .thumbnail-strip { flex-direction: row; width: 100%; order: 2; justify-content: center; }
      .main-image { order: 1; }
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }
      .button-row { flex-direction: column; }
    }
    @media (max-width: 500px) {
      .thumbnail-strip { gap: 8px; }
      .thumbnail { width: 65px; height: 65px; }
      .variant-btn { padding: 6px 18px; font-size: 0.85rem; }
    }
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.6s, transform 0.6s; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<nav class="nav" id="mainNav">
  <div class="nav-logo"><span class="dot"></span> Happy NonVeg Pickles</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="index.html#bestsellers">Best Sellers</a>
    <a href="index.html#categories">Shop</a>
  </div>
  <div class="nav-hamburger" id="hamburger"><span></span><span></span><span></span></div>
</nav>

<main id="productDetailRoot"><div class="loader">Loading delicious details...</div></main>

<footer><p>© 2025 Happy NonVeg Pickles — handcrafted with tradition.</p></footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getFirestore, doc, getDoc, getDocs, collection, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM",
    authDomain: "pickle-fdc54.firebaseapp.com",
    projectId: "pickle-fdc54",
    storageBucket: "pickle-fdc54.firebasestorage.app",
    messagingSenderId: "650348710985",
    appId: "1:650348710985:web:b8eedb551a79b536578398",
    measurementId: "G-B40NG5KQDL"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function getProductId() {
    const params = new URLSearchParams(window.location.search);
    return params.get('id') || params.get('productId');
  }
  function formatPrice(p) { return `₹${Math.round(Number(p) || 0)}`; }
  function getDiscountPercent(mrp, price) {
    if (!mrp || !price || mrp <= price) return null;
    return Math.round(((mrp - price) / mrp) * 100);
  }
  function renderStars(rating) {
    const r = Number(rating) || 4.5;
    const full = Math.floor(r);
    const half = r % 1 >= 0.5;
    return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(5 - Math.ceil(r));
  }
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  }

  async function loadProductPage() {
    const root = document.getElementById('productDetailRoot');
    const productId = getProductId();
    if (!productId) {
      root.innerHTML = `<div class="error-message"><strong>❌ No product specified.</strong><br><button onclick="location.href='index.html'">Go to Shop</button></div>`;
      return;
    }
    try {
      const productSnap = await getDoc(doc(db, "products", productId));
      if (!productSnap.exists()) {
        root.innerHTML = `<div class="error-message"><strong>😕 Product not found.</strong><br><button onclick="location.href='index.html'">Browse Pickles</button></div>`;
        return;
      }
      const product = { id: productSnap.id, ...productSnap.data() };
      let relatedProducts = [];
      const categoryValue = product.categoryId || product.category;
      if (categoryValue) {
        const q1 = query(collection(db, "products"), where("categoryId", "==", categoryValue));
        const snap1 = await getDocs(q1);
        snap1.forEach(docSnap => {
          if (docSnap.id !== product.id) relatedProducts.push({ id: docSnap.id, ...docSnap.data() });
        });
        if (relatedProducts.length === 0) {
          const q2 = query(collection(db, "products"), where("category", "==", categoryValue));
          const snap2 = await getDocs(q2);
          snap2.forEach(docSnap => {
            if (docSnap.id !== product.id) relatedProducts.push({ id: docSnap.id, ...docSnap.data() });
          });
        }
      }
      relatedProducts = relatedProducts.slice(0, 4);
      renderProductPage(product, relatedProducts);
      observeReveal();
    } catch (err) {
      console.error(err);
      root.innerHTML = `<div class="error-message"><strong>⚠️ Failed to load data.</strong><br>${err.message || "Check network"}<br><button onclick="location.reload()">Retry</button></div>`;
    }
  }

  function renderProductPage(product, relatedProducts) {
    const variants = product.variants || [];
    const defaultVariant = variants[0] || { weight: "Standard", price: product.price || 249, mrp: product.mrp || 299 };
    const mainImageUrl = product.mainImage || product.image || "https://placehold.co/600x600/f5e9e7/c0392b?text=Pickle";
    const thumbImages = product.thumbnailImages || product.additionalImages || (mainImageUrl ? [mainImageUrl] : []);
    const displayName = product.longName || product.name || "Artisan Pickle";
    const fullDescription = product.fullDescription || product.description || "No detailed description available.";
    const shippingInfo = product.shippingPolicy || "Free shipping on orders above ₹499. Delivery within 3-5 business days.";
    const returnInfo = product.returnPolicy || "7-day return policy for unopened jars. Contact support for replacements.";

    const html = `
      <div class="product-container reveal">
        <div class="product-gallery">
          <div class="thumbnail-strip" id="thumbnailStrip">
            ${thumbImages.map((img, idx) => `<div class="thumbnail ${idx === 0 ? 'active' : ''}" data-img="${img}"><img src="${img}" loading="lazy" onerror="this.src='https://placehold.co/85x85/f5e9e7/c0392b?text=img'"></div>`).join('')}
          </div>
          <div class="main-image"><img id="mainProductImage" src="${mainImageUrl}" onerror="this.src='https://placehold.co/600x600/f5e9e7/c0392b?text=Pickle'"></div>
        </div>
        <div class="product-info">
          <h1 class="product-title">${escapeHtml(displayName)}</h1>
          <div class="rating"><div class="stars">${renderStars(product.rating || 4.7)}</div><span class="review-count">${product.reviewCount || '★ 100+ reviews'}</span></div>
          <div class="price-group" id="priceGroup">
            <span class="current-price" id="currentPrice">${formatPrice(defaultVariant.price)}</span>
            ${defaultVariant.mrp ? `<span class="old-price" id="oldPrice">${formatPrice(defaultVariant.mrp)}</span>` : ''}
            ${getDiscountPercent(defaultVariant.mrp, defaultVariant.price) ? `<span class="discount-badge" id="discountBadge">${getDiscountPercent(defaultVariant.mrp, defaultVariant.price)}% OFF</span>` : ''}
          </div>
          ${variants.length ? `
          <div class="variants-section"><h3>Select Size:</h3><div class="variant-buttons" id="variantButtons">
            ${variants.map((v, idx) => `<button class="variant-btn ${idx === 0 ? 'active' : ''}" data-price="${v.price}" data-mrp="${v.mrp || ''}" data-weight="${v.weight}">${v.weight} ${formatPrice(v.price)}</button>`).join('')}
          </div></div>` : ''}
          <div class="qty-selector"><span style="font-weight:600;">Quantity:</span><div class="qty-control"><button id="qtyMinus">-</button><input type="text" id="qtyInput" value="1" readonly><button id="qtyPlus">+</button></div></div>
          <div class="action-buttons">
            <div class="button-row"><div class="btn-cart" id="addToCartBtn">🛒 Add to Cart</div><div class="btn-wishlist" id="wishlistBtn">❤️ Wishlist</div></div>
            <div class="btn-buynow" id="buyNowBtn">⚡ Buy Now</div>
          </div>
          <div class="extra-info">
            <div class="policy-block"><h4>🚚 Shipping & Return</h4><p>${escapeHtml(shippingInfo)}</p><p style="margin-top:8px;">${escapeHtml(returnInfo)}</p></div>
            <div class="full-description"><h4>📖 Full Description</h4><p>${escapeHtml(fullDescription)}</p></div>
          </div>
        </div>
      </div>
      <div class="related-section reveal">
        <h2>🔥 More from the same category</h2>
        <div class="related-grid" id="relatedGrid">
          ${relatedProducts.length ? relatedProducts.map(prod => {
            const firstVar = prod.variants?.[0] || {};
            const price = firstVar.price || prod.price || 0;
            const mrp = firstVar.mrp || prod.mrp || 0;
            const discPercent = getDiscountPercent(mrp, price);
            return `<div class="related-card" data-id="${prod.id}">
              ${discPercent ? `<div class="related-discount-tag">${discPercent}% OFF</div>` : ''}
              <div class="related-img"><img src="${prod.mainImage || 'https://placehold.co/400x400/f5e9e7/c0392b?text=Pickle'}" alt="${prod.name}" loading="lazy"></div>
              <div class="related-info">
                <div class="related-name">${escapeHtml(prod.name)}</div>
                <div class="related-stars">${renderStars(prod.rating || 4.5)}</div>
                <div class="related-pricing"><span class="related-price">${formatPrice(price)}</span>${mrp && mrp > price ? `<span class="related-mrp">${formatPrice(mrp)}</span>` : ''}</div>
                <div class="related-view-btn">View Product</div>
              </div>
            </div>`;
          }).join('') : `<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--ash);">No other pickles in this category right now. Check back soon!</div>`}
        </div>
      </div>
    `;

    const root = document.getElementById('productDetailRoot');
    root.innerHTML = html;

    // Thumbnail click
    const thumbs = document.querySelectorAll('.thumbnail');
    const mainImg = document.getElementById('mainProductImage');
    thumbs.forEach(t => t.addEventListener('click', () => {
      const src = t.getAttribute('data-img');
      if (src) mainImg.src = src;
      thumbs.forEach(th => th.classList.remove('active'));
      t.classList.add('active');
    }));

    // Variant selection
    const variantBtns = document.querySelectorAll('.variant-btn');
    const currentPriceSpan = document.getElementById('currentPrice');
    const oldPriceSpan = document.getElementById('oldPrice');
    const discountSpan = document.getElementById('discountBadge');
    variantBtns.forEach(btn => btn.addEventListener('click', () => {
      variantBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const price = btn.getAttribute('data-price');
      const mrp = btn.getAttribute('data-mrp');
      currentPriceSpan.innerText = formatPrice(price);
      if (oldPriceSpan) {
        if (mrp && mrp !== 'null') oldPriceSpan.innerText = formatPrice(mrp);
        else oldPriceSpan.style.display = 'none';
      }
      const disc = getDiscountPercent(mrp, price);
      if (discountSpan) {
        if (disc) { discountSpan.innerText = `${disc}% OFF`; discountSpan.style.display = 'inline-block'; }
        else discountSpan.style.display = 'none';
      }
    }));

    // Quantity
    const qtyInput = document.getElementById('qtyInput');
    document.getElementById('qtyMinus')?.addEventListener('click', () => {
      let v = parseInt(qtyInput.value);
      if (v > 1) qtyInput.value = v - 1;
    });
    document.getElementById('qtyPlus')?.addEventListener('click', () => {
      let v = parseInt(qtyInput.value);
      qtyInput.value = v + 1;
    });

    const getActiveVariant = () => {
      const active = document.querySelector('.variant-btn.active');
      if (active) return { weight: active.innerText.split(' ')[0], price: active.getAttribute('data-price') };
      return { weight: variants[0]?.weight || 'Standard', price: variants[0]?.price || product.price };
    };
    
    // Add to Cart (still shows alert for demo)
    document.getElementById('addToCartBtn')?.addEventListener('click', () => {
      const qty = parseInt(qtyInput.value);
      const v = getActiveVariant();
      alert(`🛒 Added to cart: ${displayName} (${v.weight}) x ${qty} = ${formatPrice(v.price * qty)}`);
    });
    
    // Wishlist
    document.getElementById('wishlistBtn')?.addEventListener('click', () => alert(`❤️ ${displayName} saved to wishlist!`));
    
    // 🔥 BUY NOW: redirect to checkout page with product details
    document.getElementById('buyNowBtn')?.addEventListener('click', () => {
      const qty = parseInt(qtyInput.value);
      const v = getActiveVariant();
      // Build checkout URL with productId, quantity, variant weight
      const checkoutUrl = `checkout.html?productId=${product.id}&quantity=${qty}&variant=${encodeURIComponent(v.weight)}`;
      window.location.href = checkoutUrl;
    });

    // Related product click (navigate to view.html)
    document.querySelectorAll('.related-card').forEach(card => {
      card.addEventListener('click', (e) => {
        const pid = card.getAttribute('data-id');
        if (pid) window.location.href = `view.html?id=${pid}`;
      });
    });
  }

  function observeReveal() {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
  }

  const nav = document.getElementById('mainNav');
  window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 10));
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.querySelector('.nav-links');
  hamburger?.addEventListener('click', () => {
    if (navLinks.style.display === 'flex') navLinks.style.display = '';
    else navLinks.style.cssText = 'display:flex; flex-direction:column; position:fixed; top:var(--nav-h); left:0; right:0; background:rgba(253,246,236,0.98); backdrop-filter:blur(16px); padding:24px 5vw; gap:20px; z-index:800;';
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.nav') && navLinks && navLinks.style.display === 'flex') navLinks.style.display = '';
  });

  loadProductPage();
</script>
</body>
</html>
