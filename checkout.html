<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Checkout – Happy NonVeg Pickles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --rust: #C0392B; --rust-dark: #962d22; --rust-light: #f5e9e7;
      --turmeric: #E8A020; --cream: #FDF6EC; --ink: #1C1009;
      --ash: #6b5b4e; --border: rgba(28,16,9,0.1);
      --shadow-sm: 0 2px 8px rgba(28,16,9,0.08);
      --shadow-md: 0 8px 32px rgba(28,16,9,0.12);
      --r-card: 16px; --r-pill: 999px;
      --ff-body: 'IBM Plex Sans', sans-serif;
      --nav-h: 68px;
    }
    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--ff-body);
      font-size: 15px;
      line-height: 1.5;
      padding-top: var(--nav-h);
    }
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 900;
      height: var(--nav-h); display: flex; align-items: center;
      justify-content: space-between; padding: 0 5vw;
      background: rgba(253,246,236,0.94); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: box-shadow 0.3s;
    }
    .nav.scrolled { box-shadow: var(--shadow-md); }
    .nav-logo {
      font-family: var(--ff-body); font-size: 1.45rem; font-weight: 700;
      color: var(--rust); letter-spacing: -0.5px;
      display: flex; align-items: center; gap: 10px;
    }
    .nav-logo .dot { width: 8px; height: 8px; background: var(--turmeric); border-radius: 50%; }
    .nav-links { display: flex; gap: 32px; }
    .nav-links a { font-weight: 600; font-size: 14px; color: var(--ash); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--rust); }
    .nav-hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
    
    .checkout-container {
      max-width: 1200px; margin: 40px auto; padding: 0 5vw;
      display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px;
    }
    /* Left column */
    .left-panel { background: white; border-radius: var(--r-card); box-shadow: var(--shadow-sm); overflow: hidden; }
    .section { padding: 24px; border-bottom: 1px solid var(--border); }
    .section-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 16px; color: var(--ink); }
    .add-address-btn {
      background: white; border: 2px dashed var(--rust); border-radius: 60px;
      padding: 12px; width: 100%; text-align: center; font-weight: 600;
      color: var(--rust); cursor: pointer; transition: 0.2s;
    }
    .add-address-btn:hover { background: var(--rust-light); }
    .address-display {
      background: #f9f5f0; border-radius: 16px; padding: 14px;
      margin-top: 12px; font-size: 0.85rem; line-height: 1.4;
    }
    .payment-methods { display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap; }
    .payment-option {
      flex: 1; border: 2px solid var(--border); border-radius: 16px;
      padding: 14px; cursor: pointer; transition: 0.2s;
    }
    .payment-option.active { border-color: var(--rust); background: var(--rust-light); }
    .payment-option .name { font-weight: 700; display: block; }
    .payment-option .fee { font-size: 0.7rem; color: var(--ash); margin-top: 4px; }
    .coupon-section { display: flex; gap: 12px; margin: 20px 0 10px; }
    .coupon-section input { flex: 1; padding: 12px; border-radius: 60px; border: 1px solid var(--border); }
    .apply-btn { background: var(--ink); color: white; border: none; padding: 0 24px; border-radius: 60px; font-weight: 600; cursor: pointer; }
    .discount-info { font-size: 0.8rem; color: #2e7d32; margin: 8px 0; }
    .pay-btn {
      width: 100%; background: var(--rust); color: white; border: none;
      padding: 16px; font-size: 1.1rem; font-weight: 700; border-radius: 40px;
      cursor: pointer; margin-top: 20px; transition: 0.2s;
    }
    .pay-btn:hover { background: var(--rust-dark); transform: translateY(-2px); }
    /* Right column - order summary */
    .order-summary {
      background: white; border-radius: var(--r-card); box-shadow: var(--shadow-sm);
      overflow: hidden; position: sticky; top: calc(var(--nav-h) + 20px);
    }
    .summary-header { background: var(--rust); color: white; padding: 18px 24px; font-weight: 700; font-size: 1.2rem; }
    .summary-items { padding: 20px 24px; border-bottom: 1px solid var(--border); }
    .cart-item { display: flex; gap: 16px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px dashed var(--border); }
    .cart-item-img { width: 70px; height: 70px; border-radius: 12px; background: #f0e7de; overflow: hidden; flex-shrink: 0; }
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-details { flex: 1; }
    .cart-item-name { font-weight: 700; margin-bottom: 4px; }
    .cart-item-variant { font-size: 0.8rem; color: var(--ash); margin-bottom: 6px; }
    .cart-item-price-row { display: flex; justify-content: space-between; align-items: baseline; }
    .summary-totals { padding: 20px 24px; background: #faf7f2; }
    .totals-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .totals-row.grand-total { font-weight: 800; font-size: 1.2rem; border-top: 2px solid var(--border); padding-top: 12px; margin-top: 8px; color: var(--rust); }
    /* Modal */
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
    }
    .modal-content {
      background: white; max-width: 500px; width: 90%; border-radius: 24px;
      padding: 28px; position: relative;
    }
    .modal-content h3 { margin-bottom: 20px; }
    .modal-content input, .modal-content textarea {
      width: 100%; margin-bottom: 16px; padding: 12px; border: 1px solid var(--border);
      border-radius: 12px;
    }
    .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 12px; }
    .modal-buttons button { padding: 10px 20px; border-radius: 40px; border: none; cursor: pointer; }
    .save-address { background: var(--rust); color: white; }
    .close-modal { background: #ccc; }
    footer { background: var(--ink); color: rgba(255,255,255,0.6); padding: 30px 5vw; text-align: center; margin-top: 60px; }
    @media (max-width: 800px) {
      .checkout-container { grid-template-columns: 1fr; gap: 30px; }
      .order-summary { position: relative; top: 0; }
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }
    }
  </style>
</head>
<body>
<nav class="nav" id="mainNav">
  <div class="nav-logo"><span class="dot"></span> Happy NonVeg Pickles</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="index.html#bestsellers">Best Sellers</a>
    <a href="index.html#categories">Shop</a>
  </div>
  <div class="nav-hamburger" id="hamburger"><span></span><span></span><span></span></div>
</nav>

<main id="checkoutRoot"><div style="text-align:center; padding:60px;">Loading checkout...</div></main>

<!-- Address Modal -->
<div id="addressModal" class="modal">
  <div class="modal-content">
    <h3>Add Delivery Address</h3>
    <input type="text" id="addrName" placeholder="Full Name *">
    <input type="tel" id="addrPhone" placeholder="Phone Number *">
    <textarea id="addrFull" rows="3" placeholder="Street, Area, Landmark *"></textarea>
    <input type="text" id="addrCity" placeholder="City *">
    <input type="text" id="addrPincode" placeholder="PIN Code *">
    <div class="modal-buttons">
      <button class="close-modal" onclick="closeAddressModal()">Cancel</button>
      <button class="save-address" onclick="saveAddress()">Save Address</button>
    </div>
  </div>
</div>

<footer><p>© 2025 Happy NonVeg Pickles — handcrafted with tradition.</p></footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getFirestore, doc, getDoc, getDocs, collection, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM",
    authDomain: "pickle-fdc54.firebaseapp.com",
    projectId: "pickle-fdc54",
    storageBucket: "pickle-fdc54.firebasestorage.app",
    messagingSenderId: "650348710985",
    appId: "1:650348710985:web:b8eedb551a79b536578398",
    measurementId: "G-B40NG5KQDL"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function formatPrice(p) { return `₹${Math.round(Number(p) || 0)}`; }
  function unformatPrice(str) { return parseFloat(str.replace('₹', '')); }

  let checkoutItem = null;
  let appliedCoupon = null;   // { code, discountType, discountValue, minOrder }
  let selectedPayment = 'online'; // 'online' or 'cod'
  let savedAddress = null;

  // Helper: get product from URL
  async function getCheckoutItem() {
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('productId');
    const quantity = parseInt(params.get('quantity')) || 1;
    const variant = params.get('variant') || '';
    if (!productId) return null;
    try {
      const prodSnap = await getDoc(doc(db, "products", productId));
      if (!prodSnap.exists()) return null;
      const product = prodSnap.data();
      let selectedVariant = null;
      if (variant && product.variants) {
        selectedVariant = product.variants.find(v => v.weight === variant);
      }
      if (!selectedVariant && product.variants && product.variants.length > 0) {
        selectedVariant = product.variants[0];
      }
      const itemPrice = selectedVariant ? selectedVariant.price : (product.price || 0);
      const itemMrp = selectedVariant ? selectedVariant.mrp : (product.mrp || 0);
      return {
        id: productId,
        name: product.longName || product.name,
        image: product.mainImage || product.image || "https://placehold.co/400x400/f5e9e7/c0392b?text=Pickle",
        variant: selectedVariant ? selectedVariant.weight : (variant || "Standard"),
        quantity: quantity,
        price: itemPrice,
        mrp: itemMrp,
      };
    } catch(e) { console.warn(e); return null; }
  }

  // Calculate totals based on item, coupon, payment method
  function calculateTotals(item, coupon) {
    if (!item) return { subtotal: 0, discount: 0, shipping: 0, total: 0, handlingFee: 0 };
    let subtotal = item.price * item.quantity;
    let discount = 0;
    if (coupon) {
      if (coupon.discountType === 'percentage') {
        discount = subtotal * (coupon.discountValue / 100);
      } else if (coupon.discountType === 'fixed') {
        discount = coupon.discountValue;
      }
      discount = Math.min(discount, subtotal);
    }
    let shipping = subtotal > 499 ? 0 : 40;
    let handlingFee = 0;
    if (selectedPayment === 'cod') handlingFee = 100;
    const total = subtotal - discount + shipping + handlingFee;
    return { subtotal, discount, shipping, handlingFee, total };
  }

  // Render right side (order summary) and left side dynamic totals
  function renderOrderSummary(item, totals) {
    const summaryContainer = document.getElementById('orderSummaryContainer');
    if (!summaryContainer) return;
    const discountAmount = totals.discount;
    const html = `
      <div class="summary-header">Order Summary</div>
      <div class="summary-items">
        <div class="cart-item">
          <div class="cart-item-img"><img src="${item.image}" alt="${item.name}" onerror="this.src='https://placehold.co/70x70/f5e9e7/c0392b?text=Pickle'"></div>
          <div class="cart-item-details">
            <div class="cart-item-name">${escapeHtml(item.name)}</div>
            <div class="cart-item-variant">${escapeHtml(item.variant)}</div>
            <div class="cart-item-price-row"><span class="cart-item-qty">Qty: ${item.quantity}</span><span class="cart-item-total">${formatPrice(item.price * item.quantity)}</span></div>
          </div>
        </div>
      </div>
      <div class="summary-totals" id="totalsPanel">
        <div class="totals-row"><span>Subtotal</span><span>${formatPrice(totals.subtotal)}</span></div>
        ${discountAmount > 0 ? `<div class="totals-row"><span>Coupon Discount</span><span>-${formatPrice(discountAmount)}</span></div>` : ''}
        <div class="totals-row"><span>Shipping</span><span>${totals.shipping === 0 ? 'FREE' : formatPrice(totals.shipping)}</span></div>
        ${selectedPayment === 'cod' ? `<div class="totals-row"><span>COD Handling Fee</span><span>${formatPrice(totals.handlingFee)}</span></div>` : ''}
        <div class="totals-row grand-total"><span>Total</span><span>${formatPrice(totals.total)}</span></div>
      </div>
    `;
    summaryContainer.innerHTML = html;
  }

  function updateTotalsAndPayButton() {
    if (!checkoutItem) return;
    const totals = calculateTotals(checkoutItem, appliedCoupon);
    renderOrderSummary(checkoutItem, totals);
    const payBtn = document.getElementById('payNowBtn');
    if (payBtn) payBtn.innerText = `Pay ${formatPrice(totals.total)}`;
  }

  // Apply coupon from Firestore
  async function applyCoupon(code) {
    if (!code) return { success: false, message: 'Enter a coupon code' };
    try {
      const q = query(collection(db, "coupons"), where("code", "==", code.toUpperCase()));
      const snap = await getDocs(q);
      if (snap.empty) return { success: false, message: 'Invalid coupon code' };
      const couponDoc = snap.docs[0];
      const data = couponDoc.data();
      const now = new Date();
      const expiry = data.expiry ? data.expiry.toDate ? data.expiry.toDate() : new Date(data.expiry) : null;
      if (expiry && expiry < now) return { success: false, message: 'Coupon expired' };
      const subtotal = checkoutItem.price * checkoutItem.quantity;
      if (data.minOrder && subtotal < data.minOrder) {
        return { success: false, message: `Minimum order ₹${data.minOrder} required` };
      }
      appliedCoupon = {
        code: data.code,
        discountType: data.discountType,
        discountValue: data.discountValue,
        minOrder: data.minOrder
      };
      updateTotalsAndPayButton();
      document.getElementById('discountMsg').innerHTML = `<span style="color:#2e7d32;">✅ Coupon applied! ${data.discountType === 'percentage' ? data.discountValue+'% off' : '₹'+data.discountValue+' off'}</span>`;
      return { success: true };
    } catch(e) { console.error(e); return { success: false, message: 'Error validating coupon' }; }
  }

  // Render left panel with address, payment, coupon
  function renderLeftPanel() {
    const leftContainer = document.getElementById('leftPanelContainer');
    if (!leftContainer) return;
    const addressHtml = savedAddress ? `
      <div class="address-display">
        <strong>${escapeHtml(savedAddress.name)}</strong><br>
        ${escapeHtml(savedAddress.address)}<br>
        ${escapeHtml(savedAddress.city)} - ${escapeHtml(savedAddress.pincode)}<br>
        Phone: ${escapeHtml(savedAddress.phone)}
      </div>
    ` : '<p style="color:var(--ash); margin-top:10px;">No address added yet.</p>';
    const html = `
      <div class="section">
        <div class="section-title">📦 Delivery Address</div>
        <button class="add-address-btn" id="openAddressBtn">+ Add Address</button>
        <div id="addressDisplay">${addressHtml}</div>
      </div>
      <div class="section">
        <div class="section-title">💳 Payment Method</div>
        <div class="payment-methods">
          <div class="payment-option ${selectedPayment === 'online' ? 'active' : ''}" data-payment="online">
            <span class="name">🔒 Online Payment</span>
            <span class="fee">Recommended (UPI/Card/NetBanking)</span>
          </div>
          <div class="payment-option ${selectedPayment === 'cod' ? 'active' : ''}" data-payment="cod">
            <span class="name">💰 Cash on Delivery</span>
            <span class="fee">+ ₹100 handling fee</span>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">🎟️ Coupon</div>
        <div class="coupon-section">
          <input type="text" id="couponInput" placeholder="Enter coupon code">
          <button class="apply-btn" id="applyCouponBtn">Apply</button>
        </div>
        <div id="discountMsg" class="discount-info"></div>
        <button class="pay-btn" id="payNowBtn">Pay Now</button>
      </div>
    `;
    leftContainer.innerHTML = html;
    // Attach event listeners
    document.getElementById('openAddressBtn')?.addEventListener('click', () => openAddressModal());
    document.querySelectorAll('.payment-option').forEach(opt => {
      opt.addEventListener('click', () => {
        const method = opt.getAttribute('data-payment');
        selectedPayment = method;
        document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
        updateTotalsAndPayButton();
      });
    });
    document.getElementById('applyCouponBtn')?.addEventListener('click', async () => {
      const code = document.getElementById('couponInput').value.trim();
      const result = await applyCoupon(code);
      if (!result.success) {
        document.getElementById('discountMsg').innerHTML = `<span style="color:#d32f2f;">❌ ${result.message}</span>`;
      }
    });
    document.getElementById('payNowBtn')?.addEventListener('click', () => processOrder());
  }

  function openAddressModal() {
    document.getElementById('addressModal').style.display = 'flex';
  }
  window.closeAddressModal = function() {
    document.getElementById('addressModal').style.display = 'none';
  };
  window.saveAddress = function() {
    const name = document.getElementById('addrName').value.trim();
    const phone = document.getElementById('addrPhone').value.trim();
    const address = document.getElementById('addrFull').value.trim();
    const city = document.getElementById('addrCity').value.trim();
    const pincode = document.getElementById('addrPincode').value.trim();
    if (!name || !phone || !address || !city || !pincode) {
      alert('Please fill all address fields');
      return;
    }
    savedAddress = { name, phone, address, city, pincode };
    document.getElementById('addressDisplay').innerHTML = `
      <div class="address-display">
        <strong>${escapeHtml(name)}</strong><br>
        ${escapeHtml(address)}<br>
        ${escapeHtml(city)} - ${escapeHtml(pincode)}<br>
        Phone: ${escapeHtml(phone)}
      </div>
    `;
    closeAddressModal();
  };

  function processOrder() {
    if (!savedAddress) { alert('Please add a delivery address first'); return; }
    if (!checkoutItem) { alert('No product in checkout'); return; }
    const totals = calculateTotals(checkoutItem, appliedCoupon);
    const paymentMethod = selectedPayment === 'online' ? 'Online Payment' : 'Cash on Delivery';
    alert(`✅ Order placed successfully!\n\nDeliver to: ${savedAddress.name}, ${savedAddress.address}, ${savedAddress.city}\nProduct: ${checkoutItem.name} (${checkoutItem.variant}) x ${checkoutItem.quantity}\nTotal: ${formatPrice(totals.total)}\nPayment: ${paymentMethod}\n\nThank you for shopping!`);
    window.location.href = 'index.html';
  }

  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  async function initCheckout() {
    const root = document.getElementById('checkoutRoot');
    const item = await getCheckoutItem();
    if (!item) {
      root.innerHTML = `<div class="error-message">❌ No item to checkout. <a href="index.html" style="color:var(--rust);">Continue Shopping</a></div>`;
      return;
    }
    checkoutItem = item;
    root.innerHTML = `
      <div class="checkout-container">
        <div class="left-panel" id="leftPanelContainer"></div>
        <div class="order-summary" id="orderSummaryContainer"></div>
      </div>
    `;
    renderLeftPanel();
    const totals = calculateTotals(checkoutItem, null);
    renderOrderSummary(checkoutItem, totals);
  }

  // Navbar scripts
  const nav = document.getElementById('mainNav');
  window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 10));
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.querySelector('.nav-links');
  hamburger?.addEventListener('click', () => {
    if (navLinks.style.display === 'flex') navLinks.style.display = '';
    else navLinks.style.cssText = 'display:flex; flex-direction:column; position:fixed; top:var(--nav-h); left:0; right:0; background:rgba(253,246,236,0.98); backdrop-filter:blur(16px); padding:24px 5vw; gap:20px; z-index:800;';
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.nav') && navLinks && navLinks.style.display === 'flex') navLinks.style.display = '';
  });

  initCheckout();
</script>
</body>
</html>
