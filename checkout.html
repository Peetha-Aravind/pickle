<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Checkout – Happy NonVeg Pickles</title>
  
  <!-- Google Fonts (Navbar + Checkout) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Boxicons for navbar icons -->
  <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
  
  <style>
    /* ---------- GLOBAL RESET ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #FDF6EC;
      color: #1C1009;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    /* ---------- NAVBAR STYLES (from first file, unmodified) ---------- */
    .navbar {
      background: white;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 0.75rem 1.2rem;
      font-family: 'Inter', sans-serif;
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .left-group {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .hamburger {
      background: none;
      border: none;
      font-size: 1.8rem;
      color: #4e3622;
      cursor: pointer;
      display: none;
      padding: 0.2rem;
    }

    .logo-area {
      display: flex;
      align-items: center;
      text-decoration: none;
    }
    .logo-desktop {
      display: block;
      height: 50px;
      width: auto;
    }
    .logo-mobile {
      display: none;
      height: 40px;
      width: auto;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .nav-links a {
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      color: #4a3220;
      transition: color 0.2s;
    }
    .nav-links a:hover {
      color: #c94f2c;
    }

    .search-wrapper {
      flex: 1;
      max-width: 300px;
      min-width: 180px;
    }
    .search-bar {
      display: flex;
      align-items: center;
      background: #f5efe8;
      border-radius: 60px;
      padding: 0.5rem 1rem;
      border: 1px solid #e2d6ca;
      transition: all 0.2s;
    }
    .search-bar:focus-within {
      border-color: #c94f2c;
      background: white;
      box-shadow: 0 0 0 3px rgba(201, 79, 44, 0.15);
    }
    .search-bar i {
      color: #b28b65;
      font-size: 1.1rem;
    }
    .search-bar input {
      border: none;
      background: transparent;
      padding: 0.3rem 0.8rem;
      width: 100%;
      font-size: 0.9rem;
      outline: none;
      font-family: inherit;
    }
    .search-bar input::placeholder {
      color: #b79b7c;
      font-weight: 400;
    }

    .icon-group {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .icon-btn {
      background: none;
      border: none;
      font-size: 1.6rem;
      color: #4e3622;
      cursor: pointer;
      transition: transform 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      position: relative;
    }
    .icon-btn:hover {
      color: #c94f2c;
      transform: translateY(-2px);
    }
    .cart-badge {
      position: absolute;
      top: -8px;
      right: -12px;
      background: #c94f2c;
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 40px;
      line-height: 1;
      min-width: 18px;
      text-align: center;
      border: 1px solid white;
    }

    .mobile-menu {
      display: none;
      flex-direction: column;
      background: white;
      padding: 1rem 1.5rem;
      border-top: 1px solid #f0e2d4;
      margin-top: 0.8rem;
      gap: 1rem;
    }
    .mobile-menu a {
      text-decoration: none;
      font-weight: 600;
      color: #4a3220;
      padding: 0.5rem 0;
      border-bottom: 1px solid #f3e9e0;
    }
    .mobile-menu a:last-child {
      border-bottom: none;
    }
    .mobile-menu.show {
      display: flex;
    }

    /* ---------- CHECKOUT PAGE STYLES (original, minus old nav) ---------- */
    :root {
      --rust: #C0392B;
      --rust-dark: #962d22;
      --rust-light: #f5e9e7;
      --turmeric: #E8A020;
      --cream: #FDF6EC;
      --ink: #1C1009;
      --ash: #6b5b4e;
      --border: rgba(28,16,9,0.1);
      --shadow-sm: 0 2px 8px rgba(28,16,9,0.08);
      --shadow-md: 0 8px 32px rgba(28,16,9,0.12);
      --r-card: 16px;
      --r-pill: 999px;
      --ff-body: 'IBM Plex Sans', sans-serif;
      --nav-h: 70px;          /* matches navbar height */
    }

    .checkout-container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 5vw;
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 40px;
    }

    .left-panel {
      background: white;
      border-radius: var(--r-card);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .card {
      padding: 24px;
      border-bottom: 1px solid var(--border);
    }
    .card-title {
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 16px;
      color: var(--ink);
    }
    .add-address-btn {
      background: white;
      border: 2px dashed var(--rust);
      border-radius: 60px;
      padding: 12px;
      width: 100%;
      text-align: center;
      font-weight: 600;
      color: var(--rust);
      cursor: pointer;
      transition: 0.2s;
    }
    .add-address-btn:hover {
      background: var(--rust-light);
    }
    .address-display {
      background: #f9f5f0;
      border-radius: 16px;
      padding: 14px;
      margin-top: 12px;
      font-size: 0.85rem;
      line-height: 1.4;
    }
    .payment-options {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 8px;
    }
    .payment-radio {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      cursor: pointer;
      transition: 0.2s;
    }
    .payment-radio.active {
      border-color: var(--rust);
      background: var(--rust-light);
    }
    .payment-radio input {
      width: 18px;
      height: 18px;
      margin: 0;
      cursor: pointer;
    }
    .payment-radio .label {
      flex: 1;
    }
    .payment-radio .name {
      font-weight: 700;
      display: block;
    }
    .payment-radio .fee {
      font-size: 0.7rem;
      color: var(--ash);
    }

    .order-summary {
      background: white;
      border-radius: var(--r-card);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      position: sticky;
      top: calc(var(--nav-h) + 20px);
      display: flex;
      flex-direction: column;
    }
    .summary-header {
      background: var(--rust);
      color: white;
      padding: 18px 24px;
      font-weight: 700;
      font-size: 1.2rem;
    }
    .summary-items {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }
    .cart-item {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px dashed var(--border);
    }
    .cart-item-img {
      width: 70px;
      height: 70px;
      border-radius: 12px;
      background: #f0e7de;
      overflow: hidden;
      flex-shrink: 0;
    }
    .cart-item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .cart-item-details {
      flex: 1;
    }
    .cart-item-name {
      font-weight: 700;
      margin-bottom: 4px;
    }
    .cart-item-variant {
      font-size: 0.8rem;
      color: var(--ash);
      margin-bottom: 6px;
    }
    .cart-item-price-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .coupon-section {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: #fffef8;
    }
    .coupon-row {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
    }
    .coupon-row input {
      flex: 1;
      padding: 12px;
      border-radius: 60px;
      border: 1px solid var(--border);
      font-family: var(--ff-body);
    }
    .apply-coupon-btn {
      background: var(--ink);
      color: white;
      border: none;
      padding: 0 20px;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .apply-coupon-btn:hover {
      background: var(--rust);
    }
    .discount-msg {
      font-size: 0.8rem;
      margin-top: 6px;
      min-height: 32px;
    }

    .summary-totals {
      padding: 20px 24px;
      background: #faf7f2;
    }
    .totals-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .totals-row.grand-total {
      font-weight: 800;
      font-size: 1.2rem;
      border-top: 2px solid var(--border);
      padding-top: 12px;
      margin-top: 8px;
      color: var(--rust);
    }
    .pay-btn {
      width: calc(100% - 48px);
      margin: 0 24px 24px 24px;
      background: var(--rust);
      color: white;
      border: none;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
    }
    .pay-btn:hover {
      background: var(--rust-dark);
      transform: translateY(-2px);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1001;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: white;
      max-width: 500px;
      width: 90%;
      border-radius: 24px;
      padding: 28px;
      position: relative;
    }
    .modal-content h3 {
      margin-bottom: 20px;
    }
    .modal-content input,
    .modal-content textarea {
      width: 100%;
      margin-bottom: 16px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: var(--ff-body);
    }
    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 12px;
    }
    .modal-buttons button {
      padding: 10px 20px;
      border-radius: 40px;
      border: none;
      cursor: pointer;
    }
    .save-address {
      background: var(--rust);
      color: white;
    }
    .close-modal {
      background: #ccc;
    }

    /* Footer */
    footer {
      background: var(--ink);
      color: rgba(255,255,255,0.6);
      padding: 30px 5vw;
      text-align: center;
      margin-top: 60px;
      font-size: 13px;
    }

    /* Responsive */
    @media (max-width: 880px) {
      .navbar {
        padding: 0.75rem 1rem;
      }
      .nav-links {
        display: none;
      }
      .hamburger {
        display: block;
      }
      .logo-desktop {
        display: none;
      }
      .logo-mobile {
        display: block;
      }
      .search-wrapper {
        max-width: 220px;
      }
      .icon-group {
        gap: 1rem;
      }
    }

    @media (max-width: 800px) {
      .checkout-container {
        grid-template-columns: 1fr;
        gap: 30px;
      }
      .order-summary {
        position: relative;
        top: 0;
      }
    }

    @media (max-width: 640px) {
      .nav-container {
        flex-wrap: wrap;
      }
      .search-wrapper {
        order: 3;
        max-width: 100%;
        width: 100%;
        margin-top: 0.6rem;
      }
      .icon-group {
        margin-left: auto;
      }
      .left-group {
        flex: 1;
      }
    }
  </style>
</head>

<!-- Navbar toggle script (original, unchanged) -->
<script>
  const hamburger = document.getElementById('hamburgerBtn');
  const mobileMenu = document.getElementById('mobileMenu');
  if (hamburger && mobileMenu) {
    hamburger.addEventListener('click', () => {
      mobileMenu.classList.toggle('show');
    });
    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.remove('show');
      });
    });
  }

<!-- Checkout Module Script (Firebase + logic, old nav handling removed) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM",
    authDomain: "pickle-fdc54.firebaseapp.com",
    projectId: "pickle-fdc54",
    storageBucket: "pickle-fdc54.firebasestorage.app",
    messagingSenderId: "650348710985",
    appId: "1:650348710985:web:b8eedb551a79b536578398",
    measurementId: "G-B40NG5KQDL"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function formatPrice(p) { return `₹${Math.round(Number(p) || 0)}`; }

  let checkoutItem = null;
  let appliedCoupon = null;
  let selectedPayment = 'online';
  let savedAddress = null;

  async function getCheckoutItem() {
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('productId');
    const quantity = parseInt(params.get('quantity')) || 1;
    const variant = params.get('variant') || '';
    if (!productId) return null;
    try {
      const prodSnap = await getDoc(doc(db, "products", productId));
      if (!prodSnap.exists()) return null;
      const product = prodSnap.data();
      let selectedVariant = null;
      if (variant && product.variants) {
        selectedVariant = product.variants.find(v => v.weight === variant);
      }
      if (!selectedVariant && product.variants && product.variants.length > 0) {
        selectedVariant = product.variants[0];
      }
      const itemPrice = selectedVariant ? selectedVariant.price : (product.price || 0);
      return {
        id: productId,
        name: product.longName || product.name,
        image: product.mainImage || product.image || "https://placehold.co/400x400/f5e9e7/c0392b?text=Pickle",
        variant: selectedVariant ? selectedVariant.weight : (variant || "Standard"),
        quantity: quantity,
        price: itemPrice,
      };
    } catch(e) { console.warn(e); return null; }
  }

  function getCurrentTotals() {
    if (!checkoutItem) return { subtotal: 0, discount: 0, shipping: 0, total: 0, handlingFee: 0, discountText: '' };
    let subtotal = checkoutItem.price * checkoutItem.quantity;
    let discount = 0;
    let discountText = '';
    if (appliedCoupon) {
      if (appliedCoupon.discountType === 'percentage') {
        discount = subtotal * (appliedCoupon.discountValue / 100);
        discountText = `${appliedCoupon.discountValue}% off`;
      } else if (appliedCoupon.discountType === 'fixed') {
        discount = appliedCoupon.discountValue;
        discountText = `₹${appliedCoupon.discountValue} off`;
      }
      discount = Math.min(discount, subtotal);
    }
    let shipping = subtotal > 499 ? 0 : 40;
    let handlingFee = 0;
    if (selectedPayment === 'cod') handlingFee = 100;
    const total = subtotal - discount + shipping + handlingFee;
    return { subtotal, discount, discountText, shipping, handlingFee, total };
  }

  function updateTotalsAndButton() {
    const totals = getCurrentTotals();
    const totalsPanel = document.getElementById('totalsPanel');
    if (totalsPanel) {
      totalsPanel.innerHTML = `
        <div class="totals-row"><span>Subtotal</span><span>${formatPrice(totals.subtotal)}</span></div>
        ${totals.discount > 0 ? `<div class="totals-row"><span>Coupon Discount (${totals.discountText})</span><span>-${formatPrice(totals.discount)}</span></div>` : ''}
        <div class="totals-row"><span>Shipping</span><span>${totals.shipping === 0 ? 'FREE' : formatPrice(totals.shipping)}</span></div>
        ${selectedPayment === 'cod' ? `<div class="totals-row"><span>COD Handling Fee</span><span>${formatPrice(totals.handlingFee)}</span></div>` : ''}
        <div class="totals-row grand-total"><span>Total</span><span>${formatPrice(totals.total)}</span></div>
      `;
    }
    const payBtn = document.getElementById('payNowBtn');
    if (payBtn) payBtn.innerText = `Pay ${formatPrice(totals.total)}`;
  }

  async function applyCoupon(code) {
    if (!code) return { success: false, message: 'Enter a coupon code' };
    const upperCode = code.toUpperCase();
    try {
      const couponRef = doc(db, "coupons", upperCode);
      const couponSnap = await getDoc(couponRef);
      if (!couponSnap.exists()) {
        return { success: false, message: 'Invalid coupon code' };
      }
      const data = couponSnap.data();
      if (data.expiry) {
        let expiryDate = data.expiry.toDate ? data.expiry.toDate() : new Date(data.expiry);
        if (expiryDate < new Date()) {
          return { success: false, message: 'Coupon expired' };
        }
      }
      const subtotal = checkoutItem.price * checkoutItem.quantity;
      if (data.minOrder && subtotal < data.minOrder) {
        return { success: false, message: `Minimum order ₹${data.minOrder} required` };
      }
      appliedCoupon = {
        code: upperCode,
        discountType: data.discountType,
        discountValue: data.discountValue,
        minOrder: data.minOrder
      };
      const discountText = data.discountType === 'percentage' ? `${data.discountValue}% off` : `₹${data.discountValue} off`;
      updateTotalsAndButton();
      return { success: true, message: `Coupon applied! ${discountText}` };
    } catch(e) {
      console.error(e);
      return { success: false, message: 'Error validating coupon' };
    }
  }

  function renderLeftPanel() {
    const leftContainer = document.getElementById('leftPanelContainer');
    if (!leftContainer) return;
    const addressHtml = savedAddress ? `
      <div class="address-display">
        <strong>${escapeHtml(savedAddress.name)}</strong><br>
        ${escapeHtml(savedAddress.address)}<br>
        ${escapeHtml(savedAddress.city)} - ${escapeHtml(savedAddress.pincode)}<br>
        Phone: ${escapeHtml(savedAddress.phone)}
      </div>
    ` : '<p style="color:var(--ash); margin-top:10px;">No address added yet.</p>';
    const html = `
      <div class="card">
        <div class="card-title">📦 Delivery Address</div>
        <button class="add-address-btn" id="openAddressBtn">+ Add Address</button>
        <div id="addressDisplay">${addressHtml}</div>
      </div>
      <div class="card">
        <div class="card-title">💳 Payment Method</div>
        <div class="payment-options" id="paymentOptions">
          <div class="payment-radio ${selectedPayment === 'online' ? 'active' : ''}" data-payment="online">
            <input type="radio" name="payment" value="online" ${selectedPayment === 'online' ? 'checked' : ''}>
            <div class="label">
              <span class="name">🔒 Online Payment</span>
              <span class="fee">Recommended (UPI/Card/NetBanking)</span>
            </div>
          </div>
          <div class="payment-radio ${selectedPayment === 'cod' ? 'active' : ''}" data-payment="cod">
            <input type="radio" name="payment" value="cod" ${selectedPayment === 'cod' ? 'checked' : ''}>
            <div class="label">
              <span class="name">💰 Cash on Delivery</span>
              <span class="fee">+ ₹100 handling fee</span>
            </div>
          </div>
        </div>
      </div>
    `;
    leftContainer.innerHTML = html;
    document.getElementById('openAddressBtn')?.addEventListener('click', () => openAddressModal());
    const radios = document.querySelectorAll('.payment-radio');
    radios.forEach(radio => {
      radio.addEventListener('click', () => {
        const method = radio.getAttribute('data-payment');
        selectedPayment = method;
        radios.forEach(r => r.classList.remove('active'));
        radio.classList.add('active');
        const inp = radio.querySelector('input');
        if (inp) inp.checked = true;
        updateTotalsAndButton();
      });
    });
  }

  function renderRightColumn() {
    const rightContainer = document.getElementById('rightColumnContainer');
    if (!rightContainer) return;
    rightContainer.innerHTML = `
      <div class="order-summary">
        <div class="summary-header">Order Summary</div>
        <div class="summary-items">
          <div class="cart-item">
            <div class="cart-item-img"><img src="${checkoutItem.image}" alt="${checkoutItem.name}" onerror="this.src='https://placehold.co/70x70/f5e9e7/c0392b?text=Pickle'"></div>
            <div class="cart-item-details">
              <div class="cart-item-name">${escapeHtml(checkoutItem.name)}</div>
              <div class="cart-item-variant">${escapeHtml(checkoutItem.variant)}</div>
              <div class="cart-item-price-row"><span class="cart-item-qty">Qty: ${checkoutItem.quantity}</span><span class="cart-item-total">${formatPrice(checkoutItem.price * checkoutItem.quantity)}</span></div>
            </div>
          </div>
        </div>
        <div class="coupon-section">
          <div class="coupon-row">
            <input type="text" id="couponInputRight" placeholder="Enter coupon code">
            <button class="apply-coupon-btn" id="applyCouponBtnRight">Apply</button>
          </div>
          <div id="discountMsgRight" class="discount-msg"></div>
        </div>
        <div class="summary-totals" id="totalsPanel"></div>
        <button class="pay-btn" id="payNowBtn">Pay Now</button>
      </div>
    `;
    const applyBtn = document.getElementById('applyCouponBtnRight');
    const couponInput = document.getElementById('couponInputRight');
    if (applyBtn) {
      applyBtn.onclick = async () => {
        const code = couponInput.value.trim();
        const result = await applyCoupon(code);
        const msgDiv = document.getElementById('discountMsgRight');
        if (result.success) {
          msgDiv.innerHTML = `<span style="color:#2e7d32;">✅ ${result.message}</span>`;
          updateTotalsAndButton();
        } else {
          msgDiv.innerHTML = `<span style="color:#d32f2f;">❌ ${result.message}</span>`;
        }
      };
    }
    updateTotalsAndButton();
    document.getElementById('payNowBtn')?.addEventListener('click', () => processOrder());
  }

  function openAddressModal() {
    document.getElementById('addressModal').style.display = 'flex';
  }
  window.closeAddressModal = function() {
    document.getElementById('addressModal').style.display = 'none';
  };
  window.saveAddress = function() {
    const name = document.getElementById('addrName').value.trim();
    const phone = document.getElementById('addrPhone').value.trim();
    const address = document.getElementById('addrFull').value.trim();
    const city = document.getElementById('addrCity').value.trim();
    const pincode = document.getElementById('addrPincode').value.trim();
    if (!name || !phone || !address || !city || !pincode) {
      alert('Please fill all address fields');
      return;
    }
    savedAddress = { name, phone, address, city, pincode };
    document.getElementById('addressDisplay').innerHTML = `
      <div class="address-display">
        <strong>${escapeHtml(name)}</strong><br>
        ${escapeHtml(address)}<br>
        ${escapeHtml(city)} - ${escapeHtml(pincode)}<br>
        Phone: ${escapeHtml(phone)}
      </div>
    `;
    closeAddressModal();
  };

  function processOrder() {
    if (!savedAddress) { alert('Please add a delivery address first'); return; }
    if (!checkoutItem) { alert('No product in checkout'); return; }
    const totals = getCurrentTotals();
    const paymentMethod = selectedPayment === 'online' ? 'Online Payment' : 'Cash on Delivery';
    alert(`✅ Order placed successfully!\n\nDeliver to: ${savedAddress.name}, ${savedAddress.address}, ${savedAddress.city}\nProduct: ${checkoutItem.name} (${checkoutItem.variant}) x ${checkoutItem.quantity}\nTotal: ${formatPrice(totals.total)}\nPayment: ${paymentMethod}\n\nThank you for shopping!`);
    window.location.href = 'index.html';
  }

  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  async function initCheckout() {
    const root = document.getElementById('checkoutRoot');
    const item = await getCheckoutItem();
    if (!item) {
      root.innerHTML = `<div style="text-align:center; padding:40px;">❌ No item to checkout. <a href="index.html" style="color:var(--rust);">Continue Shopping</a></div>`;
      return;
    }
    checkoutItem = item;
    root.innerHTML = `
      <div class="checkout-container">
        <div class="left-panel" id="leftPanelContainer"></div>
        <div id="rightColumnContainer"></div>
      </div>
    `;
    renderLeftPanel();
    renderRightColumn();
  }

  initCheckout();
</script>

</body>
</html>
