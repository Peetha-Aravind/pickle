<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Pickles - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-amber-50 text-gray-800 min-h-screen">
    <nav class="bg-white/90 backdrop-blur sticky top-0 z-50 shadow-sm border-b border-amber-200">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center">
            <span class="font-bold text-xl text-amber-900"><i class="fas fa-pepper-hot text-red-600 mr-2"></i>Spicy Delights Admin</span>
            <a href="manage-categories.html" class="text-sm font-medium text-amber-700 hover:text-amber-900">&larr; Back to Categories</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 border-b border-amber-200 pb-4 gap-4">
            <div>
                <h2 id="page-title" class="text-3xl font-bold">Loading...</h2>
                <p class="text-gray-600 text-sm mt-1">Manage products for this category</p>
            </div>
            <button onclick="app.addProduct()" class="bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-lg font-bold shadow transition-colors">
                <i class="fas fa-plus mr-2"></i> Add Pickle
            </button>
        </div>
        
        <div id="products-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <div class="col-span-full text-center py-12 text-gray-400 italic">
                <i class="fas fa-spinner fa-spin text-2xl mb-2 block"></i> Loading products...
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, deleteDoc, updateDoc, deleteField } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM", authDomain: "pickle-fdc54.firebaseapp.com", projectId: "pickle-fdc54" };
        const db = getFirestore(initializeApp(firebaseConfig));

        // Get Category ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const categoryId = urlParams.get('categoryId');

        window.app = {
            products: [],
            
            init: () => {
                if(!categoryId) {
                    alert("No category selected!");
                    window.location.href = 'manage-categories.html';
                    return;
                }

                // Listen to this specific category document
                const categoryRef = doc(db, 'categories', categoryId);
                
                onSnapshot(categoryRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        document.getElementById('page-title').innerText = `${data.name || 'Category'} Pickles`;
                        
                        // Extract products map into an array
                        const productsMap = data.products || {};
                        app.products = Object.entries(productsMap).map(([id, prodData]) => ({
                            id,
                            ...prodData
                        })).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                        
                        app.render();
                    } else {
                        document.getElementById('page-title').innerText = "Category not found";
                        document.getElementById('products-container').innerHTML = "<p class='col-span-full text-red-500'>This category does not exist.</p>";
                    }
                }, (error) => {
                    console.error("Error fetching products:", error);
                });
            },
            
            render: () => {
                const container = document.getElementById('products-container');
                
                if(app.products.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full bg-white rounded-xl shadow-sm border border-dashed border-gray-300 p-12 text-center">
                            <i class="fas fa-box-open text-4xl text-gray-300 mb-3 block"></i>
                            <p class="text-gray-500 font-medium mb-4">No products found in this category.</p>
                        </div>`;
                    return;
                }
                
                container.innerHTML = app.products.map(prod => {
                    const price = prod.variants && prod.variants.length > 0 ? prod.variants[0].price : (prod.price || 'N/A');
                    const isAvailable = prod.isavailable !== false; 
                    
                    return `
                        <div class="bg-white rounded-xl shadow border border-gray-200 overflow-hidden flex flex-col hover:shadow-md transition-shadow ${!isAvailable ? 'opacity-75 grayscale-[30%]' : ''}">
                            <div class="relative h-48">
                                <img src="${prod.image || 'https://placehold.co/400x300/fef3c7/b45309?text=Pickle'}" class="h-full w-full object-cover">
                            </div>
                            <div class="p-4 flex-grow flex flex-col justify-between">
                                <h3 class="text-lg font-bold text-gray-800 mb-1 leading-tight">${prod.name}</h3>
                                
                                <div class="flex justify-between items-end mt-4 mb-3">
                                    <span class="text-xl font-bold text-green-700">₹${price}</span>
                                    <div class="flex space-x-1">
                                        <button onclick="app.editProduct('${prod.id}')" class="bg-blue-50 text-blue-600 hover:bg-blue-100 p-2 rounded transition-colors" title="Edit">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button onclick="app.deleteProduct('${prod.id}')" class="bg-red-50 text-red-500 hover:bg-red-100 p-2 rounded transition-colors" title="Delete">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>

                                <div class="flex justify-between items-center border-t border-gray-100 pt-3 mt-1">
                                    <span class="text-xs font-bold uppercase tracking-wider ${isAvailable ? 'text-green-600' : 'text-gray-400'}">
                                        ${isAvailable ? 'Available' : 'Hidden'}
                                    </span>
                                    <label class="relative inline-flex items-center cursor-pointer">
                                        <input type="checkbox" class="sr-only peer" ${isAvailable ? 'checked' : ''} 
                                            onchange="app.toggleAvailability('${prod.id}', ${isAvailable})">
                                        <div class="w-10 h-5 bg-gray-200 rounded-full peer peer-focus:ring-2 peer-focus:ring-amber-300 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-green-500"></div>
                                    </label>
                                </div>
                            </div>
                        </div>`;
                }).join('');
            },
            
            // Passes categoryId to product.html
            addProduct: () => window.location.href = `product.html?categoryId=${categoryId}`,
            
            // Passes both id and categoryId to product.html for editing
            editProduct: (id) => window.location.href = `product.html?id=${id}&categoryId=${categoryId}`,
            
            deleteProduct: async (productId) => {
                if(confirm("Are you sure you want to delete this pickle?")) {
                    try {
                        const rootProdRef = doc(db, 'products', productId);
                        const categoryRef = doc(db, 'categories', categoryId);

                        await Promise.all([
                            deleteDoc(rootProdRef),
                            updateDoc(categoryRef, { [`products.${productId}`]: deleteField() })
                        ]);
                    } catch (error) {
                        console.error("Error deleting product:", error);
                        alert("Failed to delete product.");
                    }
                }
            },
            
            toggleAvailability: async (productId, currentState) => {
                try {
                    const newState = !currentState;
                    const rootProdRef = doc(db, 'products', productId);
                    const categoryRef = doc(db, 'categories', categoryId);

                    await Promise.all([
                        updateDoc(rootProdRef, { isavailable: newState }),
                        updateDoc(categoryRef, { [`products.${productId}.isavailable`]: newState })
                    ]);
                } catch (error) {
                    console.error("Error updating product availability: ", error);
                    alert("Failed to update availability.");
                }
            }
        };
        app.init();
    </script>
</body>
</html>
