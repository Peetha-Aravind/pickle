<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Happy NonVeg Pickles – Full Navbar Search</title>
  <!-- Font & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #faf7f2;
      min-height: 150vh;
    }

    /* ----- NAVBAR ----- */
    .navbar {
      background: white;
      box-shadow: 0 4px 14px rgba(0,0,0,0.04);
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 0.75rem 1.2rem;
    }
    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      position: relative;
    }
    .left-group {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .hamburger {
      background: none;
      border: none;
      font-size: 1.8rem;
      color: #4e3622;
      cursor: pointer;
      display: none;
      padding: 0.2rem;
    }
    .logo-area {
      display: flex;
      align-items: center;
      text-decoration: none;
    }
    .logo-desktop { display: block; height: 50px; width: auto; }
    .logo-mobile { display: none; height: 40px; width: auto; }
    .logo-center {
      display: flex;
      align-items: center;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .nav-links a {
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      color: #4a3220;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #c94f2c; }

    /* Desktop search bar */
    .search-wrapper {
      flex: 1;
      max-width: 300px;
      min-width: 180px;
      position: relative;
    }
    .search-bar {
      display: flex;
      align-items: center;
      background: #f5efe8;
      border-radius: 60px;
      padding: 0.5rem 1rem;
      border: 1px solid #e2d6ca;
      transition: all 0.2s;
      width: 100%;
    }
    .search-bar:focus-within {
      border-color: #c94f2c;
      background: white;
      box-shadow: 0 0 0 3px rgba(201,79,44,0.15);
    }
    .search-bar i { color: #b28b65; font-size: 1.1rem; }
    .search-bar input {
      border: none;
      background: transparent;
      padding: 0.3rem 0.8rem;
      width: 100%;
      font-size: 0.9rem;
      outline: none;
      font-family: inherit;
    }
    .search-bar input::placeholder { color: #b79b7c; font-weight: 400; }

    /* Mobile: square search icon + full‑navbar search mode */
    .search-icon-btn {
      display: none;
      background: none;
      border: none;
      font-size: 1.6rem;
      color: #4e3622;
      cursor: pointer;
      transition: transform 0.2s, color 0.2s;
      align-items: center;
    }
    .search-icon-btn:hover {
      color: #c94f2c;
      transform: translateY(-2px);
    }

    /* Full-navbar search overlay (mobile) */
    .navbar-search-overlay {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      align-items: center;
      padding: 0 1rem;
      z-index: 1010;
    }
    .navbar-search-overlay.active {
      display: flex;
    }
    .navbar-search-overlay .back-arrow {
      background: none;
      border: none;
      font-size: 1.8rem;
      color: #4e3622;
      cursor: pointer;
      margin-right: 0.5rem;
      display: flex;
      align-items: center;
    }
    .navbar-search-overlay input {
      flex: 1;
      border: none;
      background: #f5efe8;
      border-radius: 60px;
      padding: 0.5rem 1rem;
      font-size: 0.95rem;
      outline: none;
      font-family: inherit;
    }
    .navbar-search-overlay input::placeholder { color: #b79b7c; }

    .icon-group {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .icon-btn {
      background: none;
      border: none;
      font-size: 1.6rem;
      color: #4e3622;
      cursor: pointer;
      transition: transform 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      text-decoration: none;
    }
    .icon-btn:hover {
      color: #c94f2c;
      transform: translateY(-2px);
    }

    /* ----- OVERLAY & SLIDE‑OUT PANEL ----- */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      display: none;
      transition: opacity 0.3s;
    }
    .overlay.show { display: block; }

    .side-panel {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 280px;
      max-width: 80vw;
      background: white;
      z-index: 2100;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 15px rgba(0,0,0,0.1);
    }
    .side-panel.open { transform: translateX(0); }
    .side-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid #f0e2d4;
    }
    .close-panel {
      background: none;
      border: none;
      font-size: 2rem;
      color: #4e3622;
      cursor: pointer;
      line-height: 1;
    }
    .side-nav {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 0;
    }
    .side-nav a {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      text-decoration: none;
      font-weight: 600;
      color: #4a3220;
      padding: 0.8rem 1.5rem;
      transition: background 0.2s;
      font-size: 1rem;
    }
    .side-nav a i {
      font-size: 1.3rem;
      width: 20px;
      text-align: center;
    }
    .side-nav a:hover,
    .side-nav a.active {
      background: #fef7f0;
      color: #c94f2c;
      border-left: 4px solid #c94f2c;
    }
    .side-user-section {
      border-top: 1px solid #f0e2d4;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .side-user-section a,
    .side-user-section button {
      background: none;
      border: none;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #4a3220;
      cursor: pointer;
      text-decoration: none;
      padding: 0.3rem 0;
      transition: color 0.2s;
    }
    .side-user-section a:hover,
    .side-user-section button:hover { color: #c94f2c; }
    .signout-btn { color: #c94f2c !important; }

    /* ----- POPUP (cart / desktop profile) ----- */
    .popup-fixed {
      position: fixed;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      width: 280px;
      max-height: 70vh;
      overflow-y: auto;
      z-index: 9999;
      display: none;
      border: 1px solid #f0e2d4;
    }
    .popup-header {
      padding: 12px 16px;
      font-weight: 700;
      border-bottom: 1px solid #f0e2d4;
      background: #fffaf5;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .popup-item {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #f3e9e0;
      cursor: pointer;
      transition: background 0.1s;
      flex-wrap: wrap;
    }
    .popup-item:last-child { border-bottom: none; }
    .popup-item:hover { background: #fef7f0; }
    .cart-item-img {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: #f5efe8;
      overflow: hidden;
      flex-shrink: 0;
    }
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-details { flex: 1; font-size: 0.85rem; }
    .cart-item-name { font-weight: 600; }
    .cart-item-price { color: #c94f2c; }
    .empty-cart { padding: 20px; text-align: center; color: #b79b7c; }
    .profile-option i { width: 20px; font-size: 1.2rem; }
    .cart-qty-btn, .cart-remove { cursor: pointer; }

    /* demo products */
    .demo-products {
      max-width: 800px;
      margin: 3rem auto;
      padding: 0 1rem;
    }
    .demo-product {
      background: white;
      border-radius: 16px;
      padding: 1rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .add-to-cart-btn {
      background: #c94f2c;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ----- RESPONSIVE ----- */
    @media (max-width: 880px) {
      .navbar { padding: 0.75rem 1rem; position: relative; }
      .nav-links { display: none; }
      .hamburger { display: block; }
      .left-group { gap: 0.5rem; }
      .logo-center {
        flex: 1;
        justify-content: center;
      }
      .logo-desktop { display: none; }
      .logo-mobile { display: block; height: 40px; }

      /* Hide desktop search bar, show square search icon */
      .search-wrapper {
        max-width: none;
        min-width: auto;
        flex: 0;
      }
      .search-bar {
        display: none;           /* never used on mobile */
      }
      .search-icon-btn {
        display: flex;
      }

      /* Hide wishlist and profile icons from top bar */
      .wishlist-icon-btn,
      .profile-icon-btn {
        display: none !important;
      }
      .icon-group { gap: 1rem; }

      /* When search is active, hide normal navbar contents */
      .navbar.search-active .logo-center,
      .navbar.search-active .hamburger,
      .navbar.search-active .icon-group,
      .navbar.search-active .search-wrapper {
        display: none;
      }
      /* The full-width search overlay is shown */
      .navbar.search-active .navbar-search-overlay {
        display: flex;
      }

      .popup-fixed { width: 260px; }
    }
    @media (max-width: 640px) {
      .nav-container { flex-wrap: wrap; }
      .icon-group { margin-left: auto; }
      .left-group { flex: 0; }
    }
  </style>
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <div class="left-group">
        <button class="hamburger" id="hamburgerBtn" aria-label="Menu"><i class="bx bx-menu"></i></button>
      </div>
      <!-- Logo centered -->
      <div class="logo-center">
        <a href="#" class="logo-area">
          <img src="/assets/logo.png" alt="Happy NonVeg Pickles" class="logo-desktop" />
          <img src="./assets/logo-small.png" alt="Happy NonVeg Pickles" class="logo-mobile" />
        </a>
      </div>
      <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">Categories</a>
      </div>

      <!-- Search: desktop bar (hidden on mobile) + mobile square icon -->
      <div class="search-wrapper" id="searchWrapper">
        <div class="search-bar" id="searchBar">
          <i class="bx bx-search"></i>
          <input type="text" placeholder="search product" id="searchInput" />
        </div>
        <button class="search-icon-btn" id="searchIconBtn" aria-label="Search">
          <i class="bx bx-search"></i>
        </button>
      </div>

      <div class="icon-group">
        <a href="#" class="icon-btn wishlist-icon-btn" aria-label="Wishlist"><i class="bx bx-heart"></i></a>
        <button class="icon-btn" id="cartIconBtn" aria-label="Cart"><i class="bx bx-cart"></i></button>
        <button class="icon-btn profile-icon-btn" id="profileIconBtn" aria-label="Profile"><i class="bx bx-user"></i></button>
      </div>

      <!-- FULL‑WIDTH SEARCH OVERLAY (mobile only) -->
      <div class="navbar-search-overlay" id="navbarSearchOverlay">
        <button class="back-arrow" id="searchBackBtn" aria-label="Close search">
          <i class="bx bx-arrow-back"></i>
        </button>
        <input type="text" placeholder="search product" id="mobileSearchInput" />
      </div>
    </div>
  </nav>

  <!-- ===================== OVERLAY + SLIDE‑OUT PANEL ===================== -->
  <div class="overlay" id="overlay"></div>
  <aside class="side-panel" id="sidePanel">
    <div class="side-panel-header">
      <span style="font-weight:700; font-size:1.1rem;">Menu</span>
      <button class="close-panel" id="closePanelBtn" aria-label="Close menu">&times;</button>
    </div>
    <nav class="side-nav">
      <a href="#" class="active" data-page="home"><i class="bx bx-home"></i> Home</a>
      <a href="#" data-page="shop"><i class="bx bx-store"></i> Shop</a>
      <a href="#" data-page="categories"><i class="bx bx-category"></i> Categories</a>
      <a href="#" data-page="wishlist"><i class="bx bx-heart"></i> Wishlist</a>
    </nav>
    <div class="side-user-section">
      <a href="#" id="sideProfileLink"><i class="bx bx-user-circle"></i> My Profile</a>
      <a href="#" id="sideOrdersLink"><i class="bx bx-package"></i> My Orders</a>
      <button id="sideSignoutBtn" class="signout-btn"><i class="bx bx-log-out"></i> Sign Out</button>
    </div>
  </aside>

  <!-- Fixed popups (cart and desktop profile) -->
  <div id="cartPopup" class="popup-fixed">
    <div class="popup-header">🛒 Your Cart</div>
    <div id="cartPopupContent">Loading...</div>
  </div>
  <div id="profilePopup" class="popup-fixed">
    <div class="popup-header">👤 Account</div>
    <div class="popup-item profile-option" data-action="profile">
      <i class="bx bx-user-circle"></i> My Profile
    </div>
    <div class="popup-item profile-option" data-action="orders">
      <i class="bx bx-package"></i> My Orders
    </div>
    <div class="popup-item profile-option signout-btn" data-action="signout">
      <i class="bx bx-log-out"></i> Sign Out
    </div>
  </div>

  <!-- Demo products -->
  <div class="demo-products">
    <h2 style="margin-bottom:1rem; color:#4a3220;">🔥 Sample Products (click Add to Cart)</h2>
    <div class="demo-product">
      <span><strong>Chicken Pickle</strong> – ₹250</span>
      <button class="add-to-cart-btn" data-id="1" data-name="Chicken Pickle" data-price="250" data-image="https://placehold.co/80/f5e9e7/c0392b?text=Chicken">Add to Cart</button>
    </div>
    <div class="demo-product">
      <span><strong>Mutton Pickle</strong> – ₹350</span>
      <button class="add-to-cart-btn" data-id="2" data-name="Mutton Pickle" data-price="350" data-image="https://placehold.co/80/f5e9e7/c0392b?text=Mutton">Add to Cart</button>
    </div>
    <div class="demo-product">
      <span><strong>Prawn Pickle</strong> – ₹400</span>
      <button class="add-to-cart-btn" data-id="3" data-name="Prawn Pickle" data-price="400" data-image="https://placehold.co/80/f5e9e7/c0392b?text=Prawn">Add to Cart</button>
    </div>
  </div>

  <script>
    // ---------- CART MANAGEMENT ----------
    let cart = [];
    const CART_KEY = 'happyPicklesCart';

    function loadCart() {
      const stored = localStorage.getItem(CART_KEY);
      cart = stored ? JSON.parse(stored) : [];
    }
    function saveCart() {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
    }

    window.addToCart = function(product) {
      const existing = cart.find(item => item.id === product.id);
      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({ ...product, quantity: 1 });
      }
      saveCart();
      renderCartPopup();
    };

    function removeFromCart(productId) {
      cart = cart.filter(item => item.id !== productId);
      saveCart();
      renderCartPopup();
    }

    function updateQuantity(productId, delta) {
      const item = cart.find(i => i.id === productId);
      if (item) {
        item.quantity += delta;
        if (item.quantity <= 0) {
          removeFromCart(productId);
        } else {
          saveCart();
          renderCartPopup();
        }
      }
    }

    function renderCartPopup() {
      const container = document.getElementById('cartPopupContent');
      if (!container) return;
      if (cart.length === 0) {
        container.innerHTML = '<div class="empty-cart">Your cart is empty.</div>';
        return;
      }
      let html = '';
      cart.forEach(item => {
        html += `
          <div class="popup-item" style="flex-wrap: wrap;">
            <div class="cart-item-img">
              <img src="${item.image || 'https://placehold.co/40x40/f5e9e7/c0392b?text=P'}" alt="${escapeHtml(item.name)}" />
            </div>
            <div class="cart-item-details">
              <div class="cart-item-name">${escapeHtml(item.name)}</div>
              <div class="cart-item-price">₹${Math.round(item.price)}</div>
              <div style="display:flex; gap:8px; margin-top:6px; align-items:center;">
                <button class="cart-qty-btn" data-id="${item.id}" data-delta="-1" style="background:#f0e2d4; border:none; width:24px; border-radius:20px;">-</button>
                <span>${item.quantity}</span>
                <button class="cart-qty-btn" data-id="${item.id}" data-delta="1" style="background:#f0e2d4; border:none; width:24px; border-radius:20px;">+</button>
                <button class="cart-remove" data-id="${item.id}" style="background:none; border:none; color:#c94f2c; margin-left:auto;">Remove</button>
              </div>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
      document.querySelectorAll('.cart-qty-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.getAttribute('data-id');
          const delta = parseInt(btn.getAttribute('data-delta'));
          updateQuantity(id, delta);
        });
      });
      document.querySelectorAll('.cart-remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.getAttribute('data-id');
          removeFromCart(id);
        });
      });
    }

    function handleProfileAction(action) {
      if (action === 'profile') alert("My Profile – coming soon");
      else if (action === 'orders') alert("My Orders – coming soon");
      else if (action === 'signout') {
        alert("Signed out successfully!");
        window.location.href = 'index.html';
      }
    }

    // ---------- POPUP POSITIONING (cart & desktop profile) ----------
    let activePopup = null;

    function positionPopup(popupElement, buttonElement) {
      const rect = buttonElement.getBoundingClientRect();
      const popupWidth = popupElement.offsetWidth;
      const popupHeight = popupElement.offsetHeight;
      const margin = 8;
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      let left = rect.left - popupWidth - margin;
      if (left < margin) {
        left = rect.right + margin;
        if (left + popupWidth > vw - margin) {
          left = Math.max(margin, (vw - popupWidth) / 2);
        }
      } else if (left + popupWidth > vw - margin) {
        left = vw - popupWidth - margin;
      }

      let top = rect.bottom + margin;
      if (top + popupHeight > vh - margin) {
        top = rect.top - popupHeight - margin;
        if (top < margin) {
          top = Math.max(margin, (vh - popupHeight) / 2);
        }
      }

      popupElement.style.left = left + 'px';
      popupElement.style.top = top + 'px';
    }

    function showPopup(popupId, buttonElement) {
      const popup = document.getElementById(popupId);
      if (!popup) return;
      if (activePopup === popup && popup.style.display === 'block') {
        popup.style.display = 'none';
        activePopup = null;
        return;
      }
      if (activePopup) activePopup.style.display = 'none';
      popup.style.display = 'block';
      positionPopup(popup, buttonElement);
      activePopup = popup;
    }

    function closeAllPopups() {
      if (activePopup) {
        activePopup.style.display = 'none';
        activePopup = null;
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }

    // ---------- SLIDE‑OUT PANEL LOGIC ----------
    function openSidePanel() {
      document.getElementById('sidePanel').classList.add('open');
      document.getElementById('overlay').classList.add('show');
    }
    function closeSidePanel() {
      document.getElementById('sidePanel').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    }

    function setActiveNavLink(page) {
      document.querySelectorAll('.side-nav a').forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('data-page') === page) link.classList.add('active');
      });
    }

    // ---------- MOBILE FULL‑NAVBAR SEARCH TOGGLE ----------
    function openMobileSearch() {
      document.getElementById('navbar').classList.add('search-active');
      document.getElementById('mobileSearchInput').focus();
    }
    function closeMobileSearch() {
      document.getElementById('navbar').classList.remove('search-active');
      document.getElementById('mobileSearchInput').value = '';
    }

    // ---------- INITIALIZE ----------
    document.addEventListener('DOMContentLoaded', () => {
      loadCart();
      renderCartPopup();

      // Hamburger opens slide-out panel
      document.getElementById('hamburgerBtn').addEventListener('click', openSidePanel);

      // Close panel: X button, overlay click
      document.getElementById('closePanelBtn').addEventListener('click', closeSidePanel);
      document.getElementById('overlay').addEventListener('click', closeSidePanel);

      // Side-nav link clicks
      document.querySelectorAll('.side-nav a').forEach(link => {
        link.addEventListener('click', (e) => {
          const page = link.getAttribute('data-page');
          setActiveNavLink(page);
          closeSidePanel();
        });
      });

      // Side user actions
      document.getElementById('sideProfileLink').addEventListener('click', (e) => {
        e.preventDefault();
        handleProfileAction('profile');
        closeSidePanel();
      });
      document.getElementById('sideOrdersLink').addEventListener('click', (e) => {
        e.preventDefault();
        handleProfileAction('orders');
        closeSidePanel();
      });
      document.getElementById('sideSignoutBtn').addEventListener('click', () => {
        handleProfileAction('signout');
        closeSidePanel();
      });

      // Mobile search: square icon opens full search overlay
      document.getElementById('searchIconBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        openMobileSearch();
      });

      // Back arrow closes full search overlay
      document.getElementById('searchBackBtn').addEventListener('click', () => {
        closeMobileSearch();
      });

      // Cart icon popup
      const cartBtn = document.getElementById('cartIconBtn');
      if (cartBtn) {
        cartBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          showPopup('cartPopup', cartBtn);
          renderCartPopup();
        });
      }

      // Profile icon popup (desktop only, hidden on mobile)
      const profileBtn = document.getElementById('profileIconBtn');
      if (profileBtn) {
        profileBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          showPopup('profilePopup', profileBtn);
        });
      }

      // Profile popup option clicks
      const profilePopup = document.getElementById('profilePopup');
      if (profilePopup) {
        profilePopup.addEventListener('click', (e) => {
          const option = e.target.closest('.profile-option');
          if (option) {
            const action = option.getAttribute('data-action');
            handleProfileAction(action);
            closeAllPopups();
          }
        });
      }

      // Demo add-to-cart
      document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const product = {
            id: btn.getAttribute('data-id'),
            name: btn.getAttribute('data-name'),
            price: parseFloat(btn.getAttribute('data-price')),
            image: btn.getAttribute('data-image'),
          };
          addToCart(product);
        });
      });

      // Close popups when clicking outside
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.icon-btn') && !e.target.closest('.popup-fixed')) {
          closeAllPopups();
        }
      });

      // Reposition active popup on scroll/resize
      function repositionActivePopup() {
        if (!activePopup) return;
        let btnId = null;
        if (activePopup.id === 'cartPopup') btnId = 'cartIconBtn';
        else if (activePopup.id === 'profilePopup') btnId = 'profileIconBtn';
        if (btnId) {
          const btn = document.getElementById(btnId);
          if (btn) positionPopup(activePopup, btn);
        }
      }
      window.addEventListener('scroll', repositionActivePopup);
      window.addEventListener('resize', repositionActivePopup);
    });
  </script>
</body>
</html>
