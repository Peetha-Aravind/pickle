<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Happy NonVeg Pickles – Custom Icons in Slide Menu</title>
  <!-- Font & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #faf7f2;
      min-height: 150vh;
    }

    /* ----- NAVBAR ----- */
    .navbar {
      background: white;
      box-shadow: 0 4px 14px rgba(0,0,0,0.04);
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 0.75rem 1.2rem;
      overflow: hidden;
    }
    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      position: relative;
    }
    .left-group {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .hamburger {
      background: none;
      border: none;
      font-size: 1.8rem;
      color: #4e3622;
      cursor: pointer;
      display: none;
      padding: 0.2rem;
    }
    .logo-area {
      display: flex;
      align-items: center;
      text-decoration: none;
    }
    .logo-desktop { display: block; height: 50px; width: auto; }
    .logo-mobile { display: none; height: 40px; width: auto; }
    .logo-center {
      display: flex;
      align-items: center;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .nav-links a {
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      color: #4a3220;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #c94f2c; }

    /* Desktop search bar */
    .desktop-search {
      flex: 1;
      max-width: 300px;
      min-width: 180px;
    }
    .search-bar {
      display: flex;
      align-items: center;
      background: #f5efe8;
      border-radius: 60px;
      padding: 0.5rem 1rem;
      border: 1px solid #e2d6ca;
      transition: all 0.2s;
    }
    .search-bar:focus-within {
      border-color: #c94f2c;
      background: white;
      box-shadow: 0 0 0 3px rgba(201,79,44,0.15);
    }
    .search-bar i { color: #b28b65; font-size: 1.1rem; }
    .search-bar input {
      border: none;
      background: transparent;
      padding: 0.3rem 0.8rem;
      width: 100%;
      font-size: 0.9rem;
      outline: none;
      font-family: inherit;
    }
    .search-bar input::placeholder { color: #b79b7c; font-weight: 400; }

    .icon-group {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .icon-btn {
      background: none;
      border: none;
      font-size: 1.6rem;
      color: #4e3622;
      cursor: pointer;
      transition: transform 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      text-decoration: none;
    }
    .icon-btn:hover {
      color: #c94f2c;
      transform: translateY(-2px);
    }

    /* Mobile search icon (hidden on desktop) – with a small square background */
    .search-icon-mobile {
      display: none;
      background: #f5efe8;
      border-radius: 8px;
      padding: 0.4rem;
      font-size: 1.4rem;
    }
    .search-icon-mobile:hover {
      background: #e8d9cc;
    }

    /* ----- SEARCH OVERLAY (slides from right on mobile) ----- */
    .search-overlay {
      position: absolute;
      top: 0;
      right: 0;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 1100;
      display: flex;
      align-items: center;
      padding: 0 1rem;
      transform: translateX(100%);
      transition: transform 0.3s ease;
    }
    .search-overlay.active {
      transform: translateX(0);
    }
    .search-overlay .close-search {
      background: none;
      border: none;
      font-size: 2rem;
      color: #4e3622;
      cursor: pointer;
      margin-right: 0.5rem;
      line-height: 1;
    }
    .search-overlay input {
      flex: 1;
      border: none;
      font-size: 1rem;
      padding: 0.5rem 0;
      outline: none;
      font-family: inherit;
      background: transparent;
    }

    /* ----- LEFT SLIDE‑OUT PANEL ----- */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      display: none;
    }
    .overlay.show { display: block; }

    .side-panel {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 280px;
      max-width: 80vw;
      background: white;
      z-index: 2100;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 15px rgba(0,0,0,0.1);
    }
    .side-panel.open { transform: translateX(0); }
    .side-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid #f0e2d4;
    }
    .close-panel {
      background: none;
      border: none;
      font-size: 2rem;
      color: #4e3622;
      cursor: pointer;
      line-height: 1;
    }
    .side-nav {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 0;
    }
    .side-nav a {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      text-decoration: none;
      font-weight: 600;
      color: #4a3220;
      padding: 0.8rem 1.5rem;
      transition: background 0.2s;
      font-size: 1rem;
    }
    /* Style SVGs within side-nav links */
    .side-nav a svg {
      width: 1.3rem;
      height: 1.3rem;
      flex-shrink: 0;
    }
    .side-nav a i {
      font-size: 1.3rem;
      width: 20px;
      text-align: center;
    }
    .side-nav a:hover,
    .side-nav a.active {
      background: #fef7f0;
      color: #c94f2c;
      border-left: 4px solid #c94f2c;
    }
    .side-user-section {
      border-top: 1px solid #f0e2d4;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .side-user-section a,
    .side-user-section button {
      background: none;
      border: none;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #4a3220;
      cursor: pointer;
      text-decoration: none;
      padding: 0.3rem 0;
      transition: color 0.2s;
    }
    .side-user-section a:hover,
    .side-user-section button:hover { color: #c94f2c; }
    .signout-btn { color: #c94f2c !important; }

    /* ----- RIGHT SLIDE CART (mobile) ----- */
    .cart-slide-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 2200;
      display: none;
    }
    .cart-slide-overlay.show { display: block; }

    .cart-slide-panel {
      position: fixed;
      top: 0;
      right: 0;
      height: 100%;
      width: 320px;
      max-width: 85vw;
      background: white;
      z-index: 2300;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      box-shadow: -4px 0 15px rgba(0,0,0,0.1);
    }
    .cart-slide-panel.open {
      transform: translateX(0);
    }
    .cart-slide-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid #f0e2d4;
      font-weight: 700;
    }
    .cart-slide-items {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }
    .cart-slide-footer {
      border-top: 1px solid #f0e2d4;
      padding: 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      background: #fffaf5;
    }
    .cart-total {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .checkout-btn {
      background: #c94f2c;
      color: white;
      border: none;
      padding: 0.75rem;
      border-radius: 30px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s;
    }
    .checkout-btn:hover { background: #a83d22; }

    .cart-slide-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f3e9e0;
      align-items: center;
    }
    .cart-slide-img {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      background: #f5efe8;
      overflow: hidden;
      flex-shrink: 0;
    }
    .cart-slide-img img { width: 100%; height: 100%; object-fit: cover; }
    .cart-slide-details { flex: 1; font-size: 0.9rem; }
    .cart-slide-name { font-weight: 600; }
    .cart-slide-price { color: #c94f2c; font-weight: 600; }
    .cart-slide-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .cart-slide-actions button {
      background: #f0e2d4;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cart-slide-remove {
      background: none !important;
      color: #c94f2c;
      font-weight: 600;
      margin-left: auto;
      width: auto !important;
    }
    .empty-cart-slide {
      text-align: center;
      padding: 2rem;
      color: #b79b7c;
    }

    /* ----- DESKTOP CART POPUP (unchanged) ----- */
    .popup-fixed {
      position: fixed;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      width: 280px;
      max-height: 70vh;
      overflow-y: auto;
      z-index: 9999;
      display: none;
      border: 1px solid #f0e2d4;
    }
    .popup-header {
      padding: 12px 16px;
      font-weight: 700;
      border-bottom: 1px solid #f0e2d4;
      background: #fffaf5;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .popup-item {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #f3e9e0;
      cursor: pointer;
      transition: background 0.1s;
      flex-wrap: wrap;
    }
    .popup-item:last-child { border-bottom: none; }
    .popup-item:hover { background: #fef7f0; }
    .cart-item-img {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: #f5efe8;
      overflow: hidden;
      flex-shrink: 0;
    }
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-details { flex: 1; font-size: 0.85rem; }
    .cart-item-name { font-weight: 600; }
    .cart-item-price { color: #c94f2c; }
    .profile-option i { width: 20px; font-size: 1.2rem; }
    .cart-qty-btn, .cart-remove { cursor: pointer; }

    /* demo products */
    .demo-products {
      max-width: 800px;
      margin: 3rem auto;
      padding: 0 1rem;
    }
    .demo-product {
      background: white;
      border-radius: 16px;
      padding: 1rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .add-to-cart-btn {
      background: #c94f2c;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ----- RESPONSIVE ----- */
    @media (max-width: 880px) {
      .navbar { padding: 0.75rem 1rem; }
      .nav-links { display: none; }
      .hamburger { display: block; }
      .left-group { gap: 0.5rem; }
      .logo-center {
        flex: 1;
        justify-content: center;
      }
      .logo-desktop { display: none; }
      .logo-mobile { display: block; height: 40px; }

      .desktop-search { display: none; }
      .search-icon-mobile { display: flex; }

      .wishlist-icon-btn,
      .profile-icon-btn {
        display: none !important;
      }
      .icon-group { gap: 1rem; }

      .popup-fixed { display: none !important; }
    }
    @media (max-width: 640px) {
      .nav-container { flex-wrap: wrap; }
      .search-icon-mobile { order: 3; margin-left: auto; }
      .icon-group { order: 4; }
      .left-group { flex: 0; }
    }

    @media (min-width: 881px) {
      .search-icon-mobile { display: none; }
      .desktop-search { display: block; }
      .search-overlay { display: none; }
      .cart-slide-overlay, .cart-slide-panel { display: none !important; }
    }
  </style>
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="left-group">
        <button class="hamburger" id="hamburgerBtn" aria-label="Menu"><i class="bx bx-menu"></i></button>
      </div>
      <div class="logo-center">
        <a href="#" class="logo-area">
          <img src="/assets/logo.png" alt="Happy NonVeg Pickles" class="logo-desktop" />
          <img src="./assets/logo-small.png" alt="Happy NonVeg Pickles" class="logo-mobile" />
        </a>
      </div>
      <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">Categories</a>
      </div>

      <div class="desktop-search">
        <div class="search-bar">
          <i class="bx bx-search"></i>
          <input type="text" placeholder="search product" />
        </div>
      </div>

      <div class="icon-group">
        <button class="icon-btn search-icon-mobile" id="searchIconMobile" aria-label="Search">
          <i class="bx bx-search"></i>
        </button>

        <a href="#" class="icon-btn wishlist-icon-btn" aria-label="Wishlist"><i class="bx bx-heart"></i></a>
        <button class="icon-btn" id="cartIconBtn" aria-label="Cart"><i class="bx bx-cart"></i></button>
        <button class="icon-btn profile-icon-btn" id="profileIconBtn" aria-label="Profile"><i class="bx bx-user"></i></button>
      </div>

      <div class="search-overlay" id="searchOverlay">
        <button class="close-search" id="closeSearchBtn">&times;</button>
        <input type="text" placeholder="Search products..." id="mobileSearchInput" />
      </div>
    </div>
  </nav>

  <!-- ===================== LEFT SLIDE‑OUT PANEL ===================== -->
  <div class="overlay" id="overlay"></div>
  <aside class="side-panel" id="sidePanel">
    <div class="side-panel-header">
      <span style="font-weight:700; font-size:1.1rem;">Menu</span>
      <button class="close-panel" id="closePanelBtn" aria-label="Close menu">&times;</button>
    </div>
    <nav class="side-nav">
      <!-- Home with custom SVG -->
      <a href="#" class="active" data-page="home">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="2 2 20 20">
          <path d="M3 13h1v7c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-7h1c.4 0 .77-.24.92-.62.15-.37.07-.8-.22-1.09l-8.99-9a.996.996 0 0 0-1.41 0l-9.01 9c-.29.29-.37.72-.22 1.09s.52.62.92.62Zm7 7v-5h4v5zm2-15.59 6 6V20h-2v-5c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v5H6v-9.59z"></path>
        </svg>
        Home
      </a>
      <!-- Shop with custom SVG -->
      <a href="#" data-page="shop">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="2 2 20 20">
          <path d="M17.31 14H9.72L5.95 2.68A1 1 0 0 0 5 2H2v2h2.28l3.54 10.63A2 2 0 0 0 9.72 16h7.59a2 2 0 0 0 1.87-1.3l2.76-7.35-1.87-.7zM10 18a2 2 0 1 0 0 4 2 2 0 1 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 1 0 0-4"></path><path d="m11.71 7.29-1.42 1.42 2.71 2.7 4.71-4.7-1.42-1.42L13 8.59z"></path>
        </svg>
        Shop
      </a>
      <!-- Categories with grid SVG (already provided) -->
      <a href="#" data-page="categories">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="2 2 20 20">
          <path d="M3 3h4v4H3zm7 0h4v4h-4z"></path><path d="M10 3h4v4h-4zm7 0h4v4h-4zM3 17h4v4H3zm7 0h4v4h-4z"></path><path d="M10 17h4v4h-4zm7 0h4v4h-4zM3 10h4v4H3zm7 0h4v4h-4z"></path><path d="M10 10h4v4h-4zm7 0h4v4h-4z"></path>
        </svg>
        Categories
      </a>
      <!-- Wishlist keeps heart icon -->
      <a href="#" data-page="wishlist"><i class="bx bx-heart"></i> Wishlist</a>
    </nav>
    <div class="side-user-section">
      <a href="#" id="sideProfileLink"><i class="bx bx-user-circle"></i> My Profile</a>
      <a href="#" id="sideOrdersLink"><i class="bx bx-package"></i> My Orders</a>
      <button id="sideSignoutBtn" class="signout-btn"><i class="bx bx-log-out"></i> Sign Out</button>
    </div>
  </aside>

  <!-- ===================== RIGHT CART SLIDE (mobile) ===================== -->
  <div class="cart-slide-overlay" id="cartSlideOverlay"></div>
  <div class="cart-slide-panel" id="cartSlidePanel">
    <div class="cart-slide-header">
      <span>🛒 Your Cart</span>
      <button class="close-panel" id="closeCartSlideBtn">&times;</button>
    </div>
    <div class="cart-slide-items" id="cartSlideItems"></div>
    <div class="cart-slide-footer" id="cartSlideFooter">
      <div class="cart-total">
        <span>Total</span>
        <span id="cartTotalAmount">₹0</span>
      </div>
      <button class="checkout-btn" id="checkoutBtn">Checkout Now</button>
    </div>
  </div>

  <!-- ===================== DESKTOP CART POPUP ===================== -->
  <div id="cartPopup" class="popup-fixed">
    <div class="popup-header">🛒 Your Cart</div>
    <div id="cartPopupContent">Loading...</div>
  </div>
  <div id="profilePopup" class="popup-fixed">
    <div class="popup-header">👤 Account</div>
    <div class="popup-item profile-option" data-action="profile">
      <i class="bx bx-user-circle"></i> My Profile
    </div>
    <div class="popup-item profile-option" data-action="orders">
      <i class="bx bx-package"></i> My Orders
    </div>
    <div class="popup-item profile-option signout-btn" data-action="signout">
      <i class="bx bx-log-out"></i> Sign Out
    </div>
  </div>

  <!-- Demo products -->
  <div class="demo-products">
    <h2 style="margin-bottom:1rem; color:#4a3220;">🔥 Sample Products (click Add to Cart)</h2>
    <div class="demo-product">
      <span><strong>Chicken Pickle</strong> – ₹250</span>
      <button class="add-to-cart-btn" data-id="1" data-name="Chicken Pickle" data-price="250" data-image="https://placehold.co/80/f5e9e7/c0392b?text=Chicken">Add to Cart</button>
    </div>
    <div class="demo-product">
      <span><strong>Mutton Pickle</strong> – ₹350</span>
      <button class="add-to-cart-btn" data-id="2" data-name="Mutton Pickle" data-price="350" data-image="https://placehold.co/80/f5e9e7/c0392b?text=Mutton">Add to Cart</button>
    </div>
    <div class="demo-product">
      <span><strong>Prawn Pickle</strong> – ₹400</span>
      <button class="add-to-cart-btn" data-id="3" data-name="Prawn Pickle" data-price="400" data-image="https://placehold.co/80/f5e9e7/c0392b?text=Prawn">Add to Cart</button>
    </div>
  </div>

  <script>
    // ---------- CART MANAGEMENT ----------
    let cart = [];
    const CART_KEY = 'happyPicklesCart';

    function loadCart() {
      const stored = localStorage.getItem(CART_KEY);
      cart = stored ? JSON.parse(stored) : [];
    }
    function saveCart() {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
    }

    window.addToCart = function(product) {
      const existing = cart.find(item => item.id === product.id);
      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({ ...product, quantity: 1 });
      }
      saveCart();
      renderCartPopup();
      renderMobileCart();
    };

    function removeFromCart(productId) {
      cart = cart.filter(item => item.id !== productId);
      saveCart();
      renderCartPopup();
      renderMobileCart();
    }

    function updateQuantity(productId, delta) {
      const item = cart.find(i => i.id === productId);
      if (item) {
        item.quantity += delta;
        if (item.quantity <= 0) {
          removeFromCart(productId);
        } else {
          saveCart();
          renderCartPopup();
          renderMobileCart();
        }
      }
    }

    // ---------- DESKTOP CART POPUP ----------
    function renderCartPopup() {
      const container = document.getElementById('cartPopupContent');
      if (!container) return;
      if (cart.length === 0) {
        container.innerHTML = '<div class="empty-cart">Your cart is empty.</div>';
        return;
      }
      let html = '';
      cart.forEach(item => {
        html += `
          <div class="popup-item" style="flex-wrap: wrap;">
            <div class="cart-item-img">
              <img src="${item.image || 'https://placehold.co/40x40/f5e9e7/c0392b?text=P'}" alt="${escapeHtml(item.name)}" />
            </div>
            <div class="cart-item-details">
              <div class="cart-item-name">${escapeHtml(item.name)}</div>
              <div class="cart-item-price">₹${Math.round(item.price)}</div>
              <div style="display:flex; gap:8px; margin-top:6px; align-items:center;">
                <button class="cart-qty-btn" data-id="${item.id}" data-delta="-1" style="background:#f0e2d4; border:none; width:24px; border-radius:20px;">-</button>
                <span>${item.quantity}</span>
                <button class="cart-qty-btn" data-id="${item.id}" data-delta="1" style="background:#f0e2d4; border:none; width:24px; border-radius:20px;">+</button>
                <button class="cart-remove" data-id="${item.id}" style="background:none; border:none; color:#c94f2c; margin-left:auto;">Remove</button>
              </div>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
      document.querySelectorAll('.cart-qty-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.getAttribute('data-id');
          const delta = parseInt(btn.getAttribute('data-delta'));
          updateQuantity(id, delta);
        });
      });
      document.querySelectorAll('.cart-remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.getAttribute('data-id');
          removeFromCart(id);
        });
      });
    }

    // ---------- MOBILE CART SLIDE PANEL ----------
    function renderMobileCart() {
      const itemsContainer = document.getElementById('cartSlideItems');
      const totalSpan = document.getElementById('cartTotalAmount');
      if (!itemsContainer || !totalSpan) return;

      if (cart.length === 0) {
        itemsContainer.innerHTML = '<div class="empty-cart-slide">Your cart is empty.</div>';
        totalSpan.textContent = '₹0';
        return;
      }

      let total = 0;
      let html = '';
      cart.forEach(item => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;
        html += `
          <div class="cart-slide-item">
            <div class="cart-slide-img">
              <img src="${item.image || 'https://placehold.co/50x50/f5e9e7/c0392b?text=P'}" alt="${escapeHtml(item.name)}" />
            </div>
            <div class="cart-slide-details">
              <div class="cart-slide-name">${escapeHtml(item.name)}</div>
              <div class="cart-slide-price">₹${Math.round(item.price)}</div>
              <div class="cart-slide-actions">
                <button class="qty-dec" data-id="${item.id}">−</button>
                <span>${item.quantity}</span>
                <button class="qty-inc" data-id="${item.id}">+</button>
                <button class="cart-slide-remove" data-id="${item.id}">Remove</button>
              </div>
            </div>
          </div>
        `;
      });

      itemsContainer.innerHTML = html;
      totalSpan.textContent = '₹' + Math.round(total);

      document.querySelectorAll('.cart-slide-actions .qty-dec').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = btn.dataset.id;
          updateQuantity(id, -1);
        });
      });
      document.querySelectorAll('.cart-slide-actions .qty-inc').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = btn.dataset.id;
          updateQuantity(id, 1);
        });
      });
      document.querySelectorAll('.cart-slide-remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = btn.dataset.id;
          removeFromCart(id);
        });
      });
    }

    function handleProfileAction(action) {
      if (action === 'profile') alert("My Profile – coming soon");
      else if (action === 'orders') alert("My Orders – coming soon");
      else if (action === 'signout') {
        alert("Signed out successfully!");
        window.location.href = 'index.html';
      }
    }

    // ---------- POPUP POSITIONING (desktop profile) ----------
    let activePopup = null;
    function positionPopup(popupElement, buttonElement) {
      const rect = buttonElement.getBoundingClientRect();
      const popupWidth = popupElement.offsetWidth;
      const popupHeight = popupElement.offsetHeight;
      const margin = 8;
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      let left = rect.left - popupWidth - margin;
      if (left < margin) {
        left = rect.right + margin;
        if (left + popupWidth > vw - margin) {
          left = Math.max(margin, (vw - popupWidth) / 2);
        }
      } else if (left + popupWidth > vw - margin) {
        left = vw - popupWidth - margin;
      }

      let top = rect.bottom + margin;
      if (top + popupHeight > vh - margin) {
        top = rect.top - popupHeight - margin;
        if (top < margin) {
          top = Math.max(margin, (vh - popupHeight) / 2);
        }
      }

      popupElement.style.left = left + 'px';
      popupElement.style.top = top + 'px';
    }

    function showPopup(popupId, buttonElement) {
      const popup = document.getElementById(popupId);
      if (!popup) return;
      if (activePopup === popup && popup.style.display === 'block') {
        popup.style.display = 'none';
        activePopup = null;
        return;
      }
      if (activePopup) activePopup.style.display = 'none';
      popup.style.display = 'block';
      positionPopup(popup, buttonElement);
      activePopup = popup;
    }

    function closeAllPopups() {
      if (activePopup) {
        activePopup.style.display = 'none';
        activePopup = null;
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }

    // ---------- LEFT SLIDE PANEL ----------
    function openSidePanel() {
      document.getElementById('sidePanel').classList.add('open');
      document.getElementById('overlay').classList.add('show');
    }
    function closeSidePanel() {
      document.getElementById('sidePanel').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    }
    function setActiveNavLink(page) {
      document.querySelectorAll('.side-nav a').forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('data-page') === page) link.classList.add('active');
      });
    }

    // ---------- MOBILE SEARCH OVERLAY ----------
    function toggleSearchOverlay() {
      const overlay = document.getElementById('searchOverlay');
      if (overlay.classList.contains('active')) {
        closeSearchOverlay();
      } else {
        openSearchOverlay();
      }
    }
    function openSearchOverlay() {
      document.getElementById('searchOverlay').classList.add('active');
      document.getElementById('mobileSearchInput').focus();
    }
    function closeSearchOverlay() {
      document.getElementById('searchOverlay').classList.remove('active');
    }

    // ---------- MOBILE CART SLIDE ----------
    function openCartSlide() {
      document.getElementById('cartSlidePanel').classList.add('open');
      document.getElementById('cartSlideOverlay').classList.add('show');
    }
    function closeCartSlide() {
      document.getElementById('cartSlidePanel').classList.remove('open');
      document.getElementById('cartSlideOverlay').classList.remove('show');
    }

    function isMobile() {
      return window.innerWidth <= 880;
    }

    // ---------- INITIALIZE ----------
    document.addEventListener('DOMContentLoaded', () => {
      loadCart();
      renderCartPopup();
      renderMobileCart();

      document.getElementById('hamburgerBtn').addEventListener('click', openSidePanel);
      document.getElementById('closePanelBtn').addEventListener('click', closeSidePanel);
      document.getElementById('overlay').addEventListener('click', closeSidePanel);

      document.querySelectorAll('.side-nav a').forEach(link => {
        link.addEventListener('click', (e) => {
          const page = link.getAttribute('data-page');
          setActiveNavLink(page);
          closeSidePanel();
        });
      });

      document.getElementById('sideProfileLink').addEventListener('click', (e) => {
        e.preventDefault();
        handleProfileAction('profile');
        closeSidePanel();
      });
      document.getElementById('sideOrdersLink').addEventListener('click', (e) => {
        e.preventDefault();
        handleProfileAction('orders');
        closeSidePanel();
      });
      document.getElementById('sideSignoutBtn').addEventListener('click', () => {
        handleProfileAction('signout');
        closeSidePanel();
      });

      document.getElementById('searchIconMobile').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleSearchOverlay();
      });
      document.getElementById('closeSearchBtn').addEventListener('click', closeSearchOverlay);

      document.addEventListener('click', (e) => {
        const overlay = document.getElementById('searchOverlay');
        if (overlay.classList.contains('active') && !overlay.contains(e.target) && e.target !== document.getElementById('searchIconMobile')) {
          closeSearchOverlay();
        }
      });

      const cartBtn = document.getElementById('cartIconBtn');
      cartBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isMobile()) {
          openCartSlide();
        } else {
          showPopup('cartPopup', cartBtn);
          renderCartPopup();
        }
      });

      document.getElementById('closeCartSlideBtn').addEventListener('click', closeCartSlide);
      document.getElementById('cartSlideOverlay').addEventListener('click', closeCartSlide);

      document.getElementById('checkoutBtn').addEventListener('click', () => {
        if (cart.length === 0) {
          alert('Your cart is empty!');
          return;
        }
        alert('Proceeding to checkout...');
        closeCartSlide();
      });

      const profileBtn = document.getElementById('profileIconBtn');
      if (profileBtn) {
        profileBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          showPopup('profilePopup', profileBtn);
        });
      }
      const profilePopup = document.getElementById('profilePopup');
      if (profilePopup) {
        profilePopup.addEventListener('click', (e) => {
          const option = e.target.closest('.profile-option');
          if (option) {
            const action = option.getAttribute('data-action');
            handleProfileAction(action);
            closeAllPopups();
          }
        });
      }

      document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const product = {
            id: btn.getAttribute('data-id'),
            name: btn.getAttribute('data-name'),
            price: parseFloat(btn.getAttribute('data-price')),
            image: btn.getAttribute('data-image'),
          };
          addToCart(product);
        });
      });

      document.addEventListener('click', (e) => {
        if (!e.target.closest('.icon-btn') && !e.target.closest('.popup-fixed')) {
          closeAllPopups();
        }
      });

      function repositionActivePopup() {
        if (!activePopup) return;
        let btnId = null;
        if (activePopup.id === 'cartPopup') btnId = 'cartIconBtn';
        else if (activePopup.id === 'profilePopup') btnId = 'profileIconBtn';
        if (btnId) {
          const btn = document.getElementById(btnId);
          if (btn) positionPopup(activePopup, btn);
        }
      }
      window.addEventListener('scroll', repositionActivePopup);
      window.addEventListener('resize', () => {
        repositionActivePopup();
        if (isMobile()) {
          closeAllPopups();
          if (document.getElementById('cartSlidePanel').classList.contains('open')) {
            closeCartSlide();
          }
        }
      });
    });
  </script>
</body>
</html>
