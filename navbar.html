<!-- ===================== STANDALONE NAVBAR (Popups fully visible) ===================== -->
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
<style>
  /* ----- NAVBAR STYLES ----- */
  .navbar {
    background: white;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
    position: sticky;
    top: 0;
    z-index: 1000;
    padding: 0.75rem 1.2rem;
    font-family: 'Inter', sans-serif;
  }
  .nav-container {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .left-group {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .hamburger {
    background: none;
    border: none;
    font-size: 1.8rem;
    color: #4e3622;
    cursor: pointer;
    display: none;
    padding: 0.2rem;
  }
  .logo-area {
    display: flex;
    align-items: center;
    text-decoration: none;
  }
  .logo-desktop { display: block; height: 50px; width: auto; }
  .logo-mobile { display: none; height: 40px; width: auto; }
  .nav-links {
    display: flex;
    align-items: center;
    gap: 2rem;
  }
  .nav-links a {
    text-decoration: none;
    font-weight: 600;
    font-size: 1rem;
    color: #4a3220;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: #c94f2c; }
  .search-wrapper {
    flex: 1;
    max-width: 300px;
    min-width: 180px;
  }
  .search-bar {
    display: flex;
    align-items: center;
    background: #f5efe8;
    border-radius: 60px;
    padding: 0.5rem 1rem;
    border: 1px solid #e2d6ca;
    transition: all 0.2s;
  }
  .search-bar:focus-within {
    border-color: #c94f2c;
    background: white;
    box-shadow: 0 0 0 3px rgba(201, 79, 44, 0.15);
  }
  .search-bar i { color: #b28b65; font-size: 1.1rem; }
  .search-bar input {
    border: none;
    background: transparent;
    padding: 0.3rem 0.8rem;
    width: 100%;
    font-size: 0.9rem;
    outline: none;
    font-family: inherit;
  }
  .icon-group {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }
  .icon-btn {
    background: none;
    border: none;
    font-size: 1.6rem;
    color: #4e3622;
    cursor: pointer;
    transition: transform 0.2s, color 0.2s;
    display: flex;
    align-items: center;
  }
  .icon-btn:hover {
    color: #c94f2c;
    transform: translateY(-2px);
  }
  /* ----- FIXED POPUP STYLES (always visible, scrollable if needed) ----- */
  .popup-fixed {
    position: fixed;
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.15);
    width: 320px;
    max-height: 400px;
    z-index: 1100;
    display: none;
    overflow: hidden;
    border: 1px solid #f0e2d4;
  }
  .popup-header {
    padding: 14px 18px;
    font-weight: 700;
    font-size: 1rem;
    border-bottom: 1px solid #f0e2d4;
    background: #fffaf5;
    color: #2c1a0e;
  }
  .popup-content {
    max-height: 350px;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .popup-item {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #f3e9e0;
    cursor: pointer;
    transition: background 0.1s;
  }
  .popup-item:last-child { border-bottom: none; }
  .popup-item:hover { background: #fef7f0; }
  .cart-item-img {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    background: #f5efe8;
    overflow: hidden;
    flex-shrink: 0;
  }
  .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
  .cart-item-details { flex: 1; font-size: 0.85rem; }
  .cart-item-name { font-weight: 600; margin-bottom: 4px; }
  .cart-item-price { color: #c94f2c; font-weight: 500; }
  .empty-cart { padding: 30px; text-align: center; color: #b79b7c; }
  .profile-option i { width: 24px; font-size: 1.2rem; }
  .signout-btn { color: #c94f2c; }
  .cart-qty-btn, .cart-remove { cursor: pointer; }
  .cart-qty-btn {
    background: #f0e2d4;
    border: none;
    width: 28px;
    height: 28px;
    border-radius: 30px;
    font-weight: bold;
  }
  .cart-remove {
    background: none;
    border: none;
    color: #c94f2c;
    font-size: 0.75rem;
    padding: 4px 8px;
  }
  .mobile-menu {
    display: none;
    flex-direction: column;
    background: white;
    padding: 1rem 1.5rem;
    border-top: 1px solid #f0e2d4;
    margin-top: 0.8rem;
    gap: 1rem;
  }
  .mobile-menu a {
    text-decoration: none;
    font-weight: 600;
    color: #4a3220;
    padding: 0.5rem 0;
    border-bottom: 1px solid #f3e9e0;
  }
  .mobile-menu a:last-child { border-bottom: none; }
  .mobile-menu.show { display: flex; }

  @media (max-width: 880px) {
    .navbar { padding: 0.75rem 1rem; }
    .nav-links { display: none; }
    .hamburger { display: block; }
    .logo-desktop { display: none; }
    .logo-mobile { display: block; }
    .search-wrapper { max-width: 220px; }
    .icon-group { gap: 1rem; }
    .popup-fixed { width: 290px; }
  }
  @media (max-width: 640px) {
    .nav-container { flex-wrap: wrap; }
    .search-wrapper { order: 3; max-width: 100%; width: 100%; margin-top: 0.6rem; }
    .icon-group { margin-left: auto; }
    .left-group { flex: 1; }
    .popup-fixed { width: 260px; max-height: 360px; }
  }
</style>

<nav class="navbar">
  <div class="nav-container">
    <div class="left-group">
      <button class="hamburger" id="hamburgerBtn"><i class="bx bx-menu"></i></button>
      <a href="#" class="logo-area">
        <img src="./assets/logo.png" alt="Logo" class="logo-desktop">
        <img src="./assets/logo-small.png" alt="Logo" class="logo-mobile">
      </a>
    </div>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Shop</a>
      <a href="#">Categories</a>
    </div>
    <div class="search-wrapper">
      <div class="search-bar">
        <i class="bx bx-search"></i>
        <input type="text" placeholder="search product">
      </div>
    </div>
    <div class="icon-group">
      <a href="wishlist.html" class="icon-btn"><i class="bx bx-heart"></i></a>
      <button class="icon-btn" id="cartIconBtn"><i class="bx bx-cart"></i></button>
      <button class="icon-btn" id="profileIconBtn"><i class="bx bx-user"></i></button>
    </div>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Categories</a>
  </div>
</nav>

<!-- Popups (placed at end of body, will be positioned dynamically) -->
<div id="cartPopup" class="popup-fixed">
  <div class="popup-header">🛒 Your Cart</div>
  <div class="popup-content" id="cartPopupContent"></div>
</div>
<div id="profilePopup" class="popup-fixed">
  <div class="popup-header">👤 Account</div>
  <div class="popup-content">
    <div class="popup-item profile-option" data-action="profile">
      <i class="bx bx-user-circle"></i> My Profile
    </div>
    <div class="popup-item profile-option" data-action="orders">
      <i class="bx bx-package"></i> My Orders
    </div>
    <div class="popup-item profile-option signout-btn" data-action="signout">
      <i class="bx bx-log-out"></i> Sign Out
    </div>
  </div>
</div>

<script>
  // ---------- CART LOGIC ----------
  let cart = [];
  const CART_KEY = 'happyPicklesCart';

  function loadCart() {
    const stored = localStorage.getItem(CART_KEY);
    cart = stored ? JSON.parse(stored) : [];
  }
  function saveCart() {
    localStorage.setItem(CART_KEY, JSON.stringify(cart));
  }

  window.addToCart = function(product) {
    const existing = cart.find(item => item.id === product.id);
    if (existing) existing.quantity += 1;
    else cart.push({ ...product, quantity: 1 });
    saveCart();
    renderCartPopup();
  };

  function removeFromCart(productId) {
    cart = cart.filter(item => item.id !== productId);
    saveCart();
    renderCartPopup();
  }

  function updateQuantity(productId, delta) {
    const item = cart.find(i => i.id === productId);
    if (item) {
      item.quantity += delta;
      if (item.quantity <= 0) removeFromCart(productId);
      else { saveCart(); renderCartPopup(); }
    }
  }

  function renderCartPopup() {
    const container = document.getElementById('cartPopupContent');
    if (!container) return;
    if (cart.length === 0) {
      container.innerHTML = '<div class="empty-cart">Your cart is empty.</div>';
      return;
    }
    let html = '';
    cart.forEach(item => {
      html += `
        <div class="popup-item" style="flex-wrap: wrap;">
          <div class="cart-item-img">
            <img src="${item.image || 'https://placehold.co/60x60/f5e9e7/c0392b?text='}" alt="${escapeHtml(item.name)}">
          </div>
          <div class="cart-item-details">
            <div class="cart-item-name">${escapeHtml(item.name)}</div>
            <div class="cart-item-price">₹${Math.round(item.price)}</div>
            <div style="display:flex; gap:8px; margin-top:8px; align-items:center;">
              <button class="cart-qty-btn" data-id="${item.id}" data-delta="-1">-</button>
              <span style="min-width: 20px; text-align:center;">${item.quantity}</span>
              <button class="cart-qty-btn" data-id="${item.id}" data-delta="1">+</button>
              <button class="cart-remove" data-id="${item.id}">Remove</button>
            </div>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
    // Attach events
    document.querySelectorAll('.cart-qty-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        const delta = parseInt(btn.getAttribute('data-delta'));
        updateQuantity(id, delta);
      });
    });
    document.querySelectorAll('.cart-remove').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        removeFromCart(id);
      });
    });
  }

  function handleProfileAction(action) {
    if (action === 'profile') alert("My Profile – coming soon");
    else if (action === 'orders') alert("My Orders – coming soon");
    else if (action === 'signout') {
      alert("Signed out successfully!");
      window.location.href = 'index.html';
    }
  }

  // ---------- POSITIONING (popup always visible) ----------
  let activePopup = null;

  function positionPopup(popup, button) {
    const rect = button.getBoundingClientRect();
    const popupWidth = popup.offsetWidth;
    const popupHeight = popup.offsetHeight;
    const margin = 10;
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    // Horizontal: try left, else right, else fit
    let left = rect.left - popupWidth - margin;
    if (left < margin) {
      left = rect.right + margin;
      if (left + popupWidth > vw - margin) {
        left = vw - popupWidth - margin;
      }
    } else if (left + popupWidth > vw - margin) {
      left = vw - popupWidth - margin;
    }

    // Vertical: below or above
    let top = rect.bottom + margin;
    if (top + popupHeight > vh - margin) {
      top = rect.top - popupHeight - margin;
      if (top < margin) top = margin;
    }

    popup.style.left = Math.max(margin, left) + 'px';
    popup.style.top = top + 'px';
  }

  function showPopup(popupId, button) {
    if (activePopup) activePopup.style.display = 'none';
    const popup = document.getElementById(popupId);
    if (!popup) return;
    if (activePopup === popup && popup.style.display === 'block') {
      popup.style.display = 'none';
      activePopup = null;
      return;
    }
    positionPopup(popup, button);
    popup.style.display = 'block';
    activePopup = popup;
  }

  function closeAllPopups() {
    if (activePopup) {
      activePopup.style.display = 'none';
      activePopup = null;
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  // ---------- INIT ----------
  document.addEventListener('DOMContentLoaded', () => {
    loadCart();
    renderCartPopup();

    // Hamburger
    const hamburger = document.getElementById('hamburgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    if (hamburger && mobileMenu) {
      hamburger.addEventListener('click', () => mobileMenu.classList.toggle('show'));
      mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => mobileMenu.classList.remove('show'));
      });
    }

    // Cart button
    const cartBtn = document.getElementById('cartIconBtn');
    if (cartBtn) {
      cartBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        closeAllPopups();
        showPopup('cartPopup', cartBtn);
        renderCartPopup();
      });
    }

    // Profile button
    const profileBtn = document.getElementById('profileIconBtn');
    if (profileBtn) {
      profileBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        closeAllPopups();
        showPopup('profilePopup', profileBtn);
      });
    }

    // Profile option clicks
    const profilePopup = document.getElementById('profilePopup');
    if (profilePopup) {
      profilePopup.addEventListener('click', (e) => {
        const option = e.target.closest('.profile-option');
        if (option) {
          handleProfileAction(option.dataset.action);
          closeAllPopups();
        }
      });
    }

    // Close on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.icon-btn') && !e.target.closest('.popup-fixed')) {
        closeAllPopups();
      }
    });

    // Reposition on scroll/resize
    const reposition = () => {
      if (!activePopup) return;
      let btn = null;
      if (activePopup.id === 'cartPopup') btn = document.getElementById('cartIconBtn');
      else if (activePopup.id === 'profilePopup') btn = document.getElementById('profileIconBtn');
      if (btn) positionPopup(activePopup, btn);
    };
    window.addEventListener('scroll', reposition);
    window.addEventListener('resize', reposition);
  });
</script>
<!-- ===================== END OF NAVBAR ===================== -->
