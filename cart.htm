<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Spicy Delights</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-amber-50 text-gray-800 min-h-screen">
    
    <nav class="bg-white/90 backdrop-blur sticky top-0 z-50 shadow-sm border-b border-amber-200">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center">
            <a href="index.html" class="font-bold text-xl text-amber-900"><i class="fas fa-pepper-hot text-red-600 mr-2"></i>Spicy Delights</a>
            <a href="index.html" class="text-sm font-medium text-amber-700 hover:text-amber-900">&larr; Continue Shopping</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <h2 class="text-3xl font-bold mb-8 border-b pb-4"><i class="fas fa-shopping-basket mr-2 text-amber-600"></i>Your Cart</h2>
        
        <div id="cart-container" class="bg-white rounded-xl shadow overflow-hidden border">
            <div class="p-12 text-center text-gray-500"><i class="fas fa-spinner fa-spin text-2xl"></i> Loading Cart...</div>
        </div>
        
        <div id="totals" class="hidden mt-6 bg-white p-6 rounded-xl shadow flex justify-between items-center">
            <span class="text-xl font-semibold">Total:</span>
            <span id="total-price" class="text-2xl font-bold text-green-600">₹0</span>
        </div>
        
        <div id="checkout" class="hidden mt-6 flex justify-end">
            <button onclick="app.checkout()" class="bg-amber-600 hover:bg-amber-700 text-white px-8 py-3 rounded-lg shadow-md font-bold text-lg">Proceed to Checkout</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM", authDomain: "pickle-fdc54.firebaseapp.com", projectId: "pickle-fdc54" };
        const appFire = initializeApp(firebaseConfig);
        const auth = getAuth(appFire);
        const db = getFirestore(appFire);
        const appId = 'spicy-delights-app';

        window.app = {
            cart: [], user: null,
            init: () => {
                onAuthStateChanged(auth, user => {
                    if(!user) return window.location.href = 'index.html';
                    app.user = user;
                    onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'cart'), snap => {
                        app.cart = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        app.render();
                    });
                });
            },
            render: () => {
                const container = document.getElementById('cart-container');
                if(app.cart.length === 0) {
                    container.innerHTML = `<div class="p-12 text-center"><h3 class="text-xl font-bold mb-2">Cart is empty</h3><a href="index.html" class="text-amber-600 underline">Browse Pickles</a></div>`;
                    document.getElementById('totals').classList.add('hidden');
                    document.getElementById('checkout').classList.add('hidden');
                    return;
                }

                let total = 0;
                container.innerHTML = '<ul class="divide-y">' + app.cart.map(item => {
                    const itemTotal = item.price * item.quantity;
                    total += itemTotal;
                    return `
                        <li class="p-6 flex items-center">
                            <img src="${item.image}" class="h-20 w-20 rounded-lg object-cover border">
                            <div class="ml-4 flex-1">
                                <h4 class="text-lg font-bold">${item.name}</h4>
                                <p class="text-sm text-gray-500">${item.weight}</p>
                                <div class="mt-2 text-green-600 font-bold">₹${item.price} <span class="text-gray-400 font-normal">x ${item.quantity}</span></div>
                            </div>
                            <div class="flex flex-col items-end">
                                <button onclick="app.remove('${item.id}')" class="text-red-400 hover:text-red-600 mb-2"><i class="fas fa-trash"></i></button>
                                <span class="font-bold text-lg">₹${itemTotal}</span>
                            </div>
                        </li>`;
                }).join('') + '</ul>';

                document.getElementById('total-price').innerText = `₹${total}`;
                document.getElementById('totals').classList.remove('hidden');
                document.getElementById('checkout').classList.remove('hidden');
            },
            remove: async (id) => await deleteDoc(doc(db, 'artifacts', appId, 'users', app.user.uid, 'cart', id)),
            checkout: () => {
                alert("Order placed successfully! In a real app this would route to payment.");
                app.cart.forEach(item => app.remove(item.id));
                setTimeout(() => window.location.href = 'index.html', 1000);
            }
        };
        app.init();
    </script>
</body>
</html>
