<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shop – Happy NonVeg Pickles</title>

    <!-- Fonts & Icons (same as landing) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">

    <style>
        /* ═══════════ COPY OF LANDING PAGE STYLES (SIMPLIFIED) ═══════════ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-tap-highlight-color: transparent; }
        body {
            min-height: 100vh;
            background: #fffaf3;
            font-family: "DM Sans", Roboto, sans-serif;
            overflow-x: hidden;
            color: #2c1a0e;
            padding-top: 80px;
        }
        @media (max-width: 768px) { body { padding-top: 70px; } }

        :root {
            --header-height-desktop: 80px;
            --navbar-height-mobile: 70px;
            --brand-primary: #E61D26;
            --brand-secondary: #c01820;
            --brand-gradient: linear-gradient(135deg, #E61D26 0%, #c01820 100%);
            --border-subtle: #e5e5e5;
            --surface-card: #ffffff;
            --surface-hover: #f5f5f5;
            --shadow-sm: 0 2px 8px rgba(28,16,9,.08);
            --shadow-md: 0 8px 32px rgba(28,16,9,.12);
            --r-card: 16px;
            --r-pill: 999px;
            --ff-display: 'Playfair Display', Georgia, serif;
            --ff-body: 'DM Sans', sans-serif;
            --nav-h: 80px;
            --rust: #C0392B;
            --rust-dark: #962d22;
            --ink: #1C1009;
            --ash: #6b5b4e;
        }

        /* ---------- NAVBAR (same as landing) ---------- */
        .d-navbar, .m-navbar, .m-drawer, .cart-drawer, .modal-overlay, #toast-container {
            font-family: "DM Sans", Roboto, sans-serif;
            color: #000;
        }
        .icon-wrap { position: relative; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .icon-wrap img { width: 20px; height: 20px; display: block; position: absolute; top: 0; left: 0; transition: opacity 0.18s; }
        .icon-wrap .icon-fill { opacity: 0; }
        .icon-trigger:hover .icon-wrap .icon-fill,
        .icon-trigger.active .icon-wrap .icon-fill { opacity: 1; }
        .icon-trigger:hover .icon-wrap .icon-default,
        .icon-trigger.active .icon-wrap .icon-default { opacity: 0; }

        .page-desktop { min-height: 0; width: 100%; }
        .d-navbar {
            height: var(--header-height-desktop); background: var(--surface-card);
            border-bottom: 1px solid var(--border-subtle); position: fixed; top: 0; left: 0; right: 0;
            z-index: 1000; box-shadow: var(--shadow-sm);
        }
        .d-navbar-container { max-width: 1440px; margin: 0 auto; height: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .d-navbar-logo { height: 52px; cursor: pointer; }
        .d-nav-links { display: flex; align-items: center; gap: 32px; margin: 0 40px; }
        .d-nav-link { font-size: 15px; font-weight: 600; color: #000; text-decoration: none; padding: 8px 0; position: relative; white-space: nowrap; }
        .d-nav-link:hover, .d-nav-link.active { color: var(--brand-primary); }
        .d-nav-link.active::after { content: ''; position: absolute; bottom: -4px; left: 0; right: 0; height: 2px; background: var(--brand-primary); border-radius: 1px; }
        .d-search-container { flex: 1; max-width: 400px; position: relative; }
        .d-search-bar { width: 100%; padding: 12px 16px 12px 44px; border: 1px solid var(--border-subtle); border-radius: 10px; background: #f9f9f9; font-family: "DM Sans", sans-serif; font-size: 14px; outline: none; transition: all 0.2s; }
        .d-search-bar:focus { background: #fff; border-color: var(--brand-primary); box-shadow: 0 0 0 3px rgba(230,29,38,0.1); }
        .d-search-icon-wrap { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; pointer-events: none; }
        .d-action-icons { display: flex; align-items: center; gap: 20px; }
        .d-icon-btn { width: 40px; height: 40px; border-radius: 10px; background: #f9f9f9; border: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .d-icon-btn:hover { background: var(--surface-hover); border-color: var(--brand-primary); }
        .cart-badge, .wishlist-badge { position: absolute; top: -6px; right: -6px; background: var(--brand-primary); color: white; font-size: 11px; font-weight: 700; min-width: 20px; height: 20px; padding: 0 4px; border-radius: 10px; display: none; align-items: center; justify-content: center; border: 2px solid #fff; }
        .cart-popup { /* ... (abbreviated) */ }
        /* Mobile nav styles omitted for brevity (keep same as landing) */

        /* PRODUCT GRID STYLES (reused from landing) */
        .section { max-width: 1440px; margin: 0 auto; padding: 60px 5vw; }
        .section-heading { font-family: var(--ff-display); font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 900; color: var(--ink); margin-bottom: 24px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 24px; }
        .product-card { background: #fff; border-radius: var(--r-card); overflow: hidden; border: 1px solid rgba(28,16,9,.1); box-shadow: var(--shadow-sm); transition: transform .25s, box-shadow .25s; cursor: pointer; }
        .product-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-md); }
        .product-card-img { aspect-ratio: 1/1; overflow: hidden; background: #f5ede4; position: relative; }
        .product-card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s; }
        .product-card:hover .product-card-img img { transform: scale(1.07); }
        .product-card-body { padding: 16px; }
        .product-card-name { font-weight: 700; font-size: 15px; color: var(--ink); margin-bottom: 8px; }
        .product-card-price-range { font-size: 14px; color: var(--rust); font-weight: 600; }
        .product-card-cta { margin: 0 16px 16px; background: var(--ink); color: #fff; padding: 11px; border-radius: 10px; font-size: 14px; font-weight: 700; text-align: center; transition: background .2s; display: block; text-decoration: none; }
        .product-card:hover .product-card-cta { background: var(--rust); }

        /* Skeleton loading */
        .skeleton-card { background: #fff; border-radius: var(--r-card); overflow: hidden; border: 1px solid rgba(28,16,9,.1); }
        .skeleton-img { aspect-ratio: 1/1; background: #e2d6ca; }
        .skeleton-text { height: 16px; background: #e2d6ca; margin: 16px 16px 8px; border-radius: 8px; }
        .skeleton-price { height: 20px; width: 80px; background: #e2d6ca; margin: 8px 16px 16px; border-radius: 8px; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        .skeleton-card { animation: pulse 1.2s infinite; }

        .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--ash); }

        @media (max-width: 768px) {
            .product-grid { grid-template-columns: repeat(2,1fr); gap: 14px; }
            .product-card-body { padding: 12px; }
            .product-card-cta { margin: 0 12px 12px; }
            .d-navbar-container { padding: 0 20px; }
            .page-mobile { display: block; }
            .page-desktop { display: none; }
        }
        @media (min-width: 769px) {
            .page-mobile { display: none; }
            .page-desktop { display: block; }
        }
    </style>
</head>
<body>

<!-- ═══════════ DESKTOP NAVBAR ═══════════ -->
<div class="page-desktop">
    <nav class="d-navbar">
        <div class="d-navbar-container">
            <img class="d-navbar-logo" src="./assets/logo.png" alt="Happy NonVeg pickles" onclick="window.location.href='index.html'" />
            <div class="d-nav-links">
                <a href="index.html" class="d-nav-link">Home</a>
                <a href="shop.html" class="d-nav-link active">Shop</a>
            </div>
            <div class="d-action-icons">
                <a href="#" class="d-icon-btn icon-trigger" onclick="handleWishlistClick(event)">
                    <span class="icon-wrap"><img src="./assets/heart.svg" class="icon-default"><img src="./assets/heart-fill.svg" class="icon-fill"></span>
                </a>
                <a href="#" class="d-icon-btn icon-trigger" onclick="toggleCart()">
                    <span class="icon-wrap"><img src="./assets/cart.svg" class="icon-default"><img src="./assets/cart-fill.svg" class="icon-fill"></span>
                </a>
            </div>
        </div>
    </nav>
</div>

<!-- ═══════════ MOBILE NAVBAR (simplified) ═══════════ -->
<div class="page-mobile">
    <!-- Include same mobile navbar as landing for consistency (omitted for brevity) -->
</div>

<!-- ═══════════ SHOP CONTENT ═══════════ -->
<main>
    <section class="section">
        <h1 class="section-heading">All Pickles</h1>
        <div class="product-grid" id="shopProductGrid">
            <!-- Skeleton loaders -->
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div><div class="skeleton-price"></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div><div class="skeleton-price"></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div><div class="skeleton-price"></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div><div class="skeleton-price"></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div><div class="skeleton-price"></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-text"></div><div class="skeleton-price"></div></div>
        </div>
    </section>
</main>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    // ═══════════ FIREBASE CONFIG (pickle-fdc54 project) ═══════════
    const firebaseConfig = {
        apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM",
        authDomain: "pickle-fdc54.firebaseapp.com",
        projectId: "pickle-fdc54",
        storageBucket: "pickle-fdc54.firebasestorage.app",
        messagingSenderId: "650348710985",
        appId: "1:650348710985:web:b8eedb551a79b536578398",
        measurementId: "G-B40NG5KQDL"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ═══════════ UTILS ═══════════
    function fmtPrice(price) {
        if (price === undefined || price === null) return '';
        return `₹${Math.round(parseFloat(price))}`;
    }

    // ═══════════ MAIN SHOP LOGIC ═══════════
    async function loadShopProducts() {
        const grid = document.getElementById('shopProductGrid');
        try {
            const categoriesSnap = await db.collection('categories').get();
            const productMap = new Map(); // productId -> product summary object

            // Aggregate all products from each category's `products` map
            categoriesSnap.docs.forEach(doc => {
                const data = doc.data();
                if (data.products && typeof data.products === 'object') {
                    Object.values(data.products).forEach(product => {
                        if (product && product.id && !productMap.has(product.id)) {
                            productMap.set(product.id, product);
                        }
                    });
                }
            });

            // Convert to array
            const products = Array.from(productMap.values());

            // If empty, show message
            if (products.length === 0) {
                grid.innerHTML = '<div class="empty-state">No products found. Please check back later.</div>';
                return;
            }

            // Clear skeleton and render cards
            grid.innerHTML = '';
            products.forEach(prod => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => window.location.href = `view.html?id=${prod.id}`;

                // Determine price display
                let priceDisplay = '';
                const hasMin = prod.minPrice !== undefined && prod.minPrice !== null;
                const hasMax = prod.maxPrice !== undefined && prod.maxPrice !== null;
                if (hasMin && hasMax && prod.minPrice !== prod.maxPrice) {
                    priceDisplay = `${fmtPrice(prod.minPrice)} – ${fmtPrice(prod.maxPrice)}`;
                } else if (hasMin) {
                    priceDisplay = fmtPrice(prod.minPrice);
                } else if (hasMax) {
                    priceDisplay = fmtPrice(prod.maxPrice);
                } else {
                    priceDisplay = 'Price not set';
                }

                card.innerHTML = `
                    <div class="product-card-img">
                        <img src="${prod.image || 'https://placehold.co/400x400/f5e9e7/C0392B?text=Pickle'}" 
                             alt="${prod.name}" 
                             loading="lazy" 
                             onerror="this.src='https://placehold.co/400x400/e2d6ca/5a3a2a?text=Oops'">
                    </div>
                    <div class="product-card-body">
                        <div class="product-card-name">${prod.name || 'Unnamed Pickle'}</div>
                        <div class="product-card-price-range">${priceDisplay}</div>
                    </div>
                    <a href="view.html?id=${prod.id}" class="product-card-cta" onclick="event.stopPropagation()">View Product</a>
                `;
                grid.appendChild(card);
            });
        } catch (error) {
            console.error('Error loading shop products:', error);
            grid.innerHTML = '<div class="empty-state">Something went wrong while loading products.</div>';
        }
    }

    // Start loading when DOM ready
    document.addEventListener('DOMContentLoaded', loadShopProducts);
</script>

</body>
</html>
