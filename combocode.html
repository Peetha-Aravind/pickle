<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Combo Section Only</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
    
    <style>
        /* ═══════════════════════════ CSS VARIABLES & RESET ═══════════════════════════ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #fffaf3;
            font-family: "DM Sans", sans-serif;
            color: #1C1009;
        }

        :root {
            --rust: #C0392B;
            --rust-dark: #962d22;
            --ink: #1C1009;
            --ash: #6b5b4e;
            --ff-display: 'Playfair Display', Georgia, serif;
            --ff-body: 'DM Sans', sans-serif;
        }

        /* ═══════════════════════════ COMBO SECTION STYLES ═══════════════════════════ */
        .combo-section { background: #fef7e8; padding: 0; }
        .combo-section .combo-inner { max-width: 1440px; margin: 0 auto; padding: 80px 5vw; }
        
        .section-label { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--rust); margin-bottom: 14px; }
        .section-label::before { content: ''; width: 28px; height: 2px; background: var(--rust); }
        .section-heading { font-family: var(--ff-display); font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 900; line-height: 1.15; color: var(--ink); margin-bottom: 8px; }
        .section-sub { font-size: 15px; color: var(--ash); margin-bottom: 40px; max-width: 500px; }

        .combo-card-wrapper { background: white; border-radius: 36px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; }
        .combo-card-layout { display: flex; flex-wrap: wrap; }
        
        .combo-banner-panel { flex: 1.2; min-width: 260px; background-size: cover; background-position: center; background-repeat: no-repeat; position: relative; background-color: #2c1a0e; min-height: 340px; }
        .combo-banner-text { position: absolute; bottom: 30px; left: 24px; right: 24px; z-index: 2; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .combo-banner-text h3 { font-family: var(--ff-display); font-size: 2rem; font-weight: 900; margin-bottom: 8px; }
        .combo-banner-text p { font-size: 0.9rem; opacity: 0.9; }
        
        .combo-picker-panel { flex: 2; padding: 1.8rem 2rem 2rem; background: #fffcf8; }
        .combo-picker-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; border-bottom: 2px dashed #f0e2d4; padding-bottom: 16px; }
        
        .combo-counter-circle { background: var(--rust); width: 80px; height: 80px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; box-shadow: 0 8px 20px rgba(192,57,43,0.3); flex-shrink: 0; }
        .combo-counter-number { font-size: 2rem; font-weight: 800; line-height: 1; }
        .combo-counter-label { font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; }
        
        .combo-picker-title { font-family: var(--ff-display); font-size: 1.5rem; font-weight: 700; color: var(--ink); }
        
        .combo-pickle-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin: 1.5rem 0 1rem; }
        .combo-pickle-item { display: flex; align-items: center; gap: 1rem; background: white; border-radius: 80px; padding: 0.5rem 1rem 0.5rem 0.5rem; cursor: pointer; transition: all 0.2s ease; border: 1px solid #f0e2d4; box-shadow: 0 2px 6px rgba(0,0,0,0.03); }
        .combo-pickle-item:hover { background: #fff5ea; transform: translateY(-2px); }
        .combo-pickle-img-circle { width: 70px; height: 70px; border-radius: 50%; overflow: hidden; background: #e9ddd0; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border: 2px solid #fff; }
        .combo-pickle-img-circle img { width: 100%; height: 100%; object-fit: cover; }
        .combo-pickle-info { flex: 1; }
        .combo-pickle-name { font-weight: 700; font-size: 1rem; color: var(--ink); margin-bottom: 4px; }
        .combo-pickle-price { font-size: 0.8rem; font-weight: 600; color: var(--rust); }
        .combo-pickle-item.selected { background: #ffede3; border-left: 5px solid var(--rust); box-shadow: 0 6px 14px rgba(192,57,43,0.2); }
        .combo-pickle-grid.limit-reached .combo-pickle-item:not(.selected) { filter: blur(3px); opacity: 0.6; pointer-events: none; }
        
        .combo-status-msg { text-align: right; font-size: 0.85rem; font-weight: 500; color: var(--rust); margin: 8px 0 16px; min-height: 20px; }
        
        .combo-actions { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 12px; }
        .combo-btn { border: none; padding: 10px 28px; border-radius: 60px; font-weight: 700; font-size: 0.9rem; cursor: pointer; font-family: var(--ff-body); transition: background .2s, transform .15s; }
        .combo-btn-primary { background: var(--rust); color: white; }
        .combo-btn-primary:hover { background: var(--rust-dark); transform: translateY(-2px); }
        .combo-btn-secondary { background: var(--ink); color: white; }
        .combo-btn-secondary:hover { background: #1f1108; transform: translateY(-2px); }
        .combo-btn-hidden { display: none !important; }

        /* Skeletons */
        .combo-skeleton-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin: 1.5rem 0; }
        .combo-skeleton-item { display: flex; align-items: center; gap: 1rem; background: #f0ece7; border-radius: 80px; padding: 0.5rem 1rem 0.5rem 0.5rem; animation: pulse 1.2s infinite; }
        .combo-skeleton-img { width: 70px; height: 70px; border-radius: 50%; background: #ddd2c6; flex-shrink: 0; }
        .combo-skeleton-txt { height: 18px; width: 60%; background: #ddd2c6; border-radius: 20px; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        @media (max-width: 760px) {
            .combo-banner-panel { min-height: 220px; }
            .combo-pickle-img-circle { width: 55px; height: 55px; }
            .combo-counter-circle { width: 65px; height: 65px; }
            .combo-pickle-grid { grid-template-columns: 1fr; }
            .combo-section .combo-inner { padding: 40px 5vw; }
        }
    </style>
</head>
<body>

<div class="combo-section" id="comboSection">
    <div class="combo-inner">
        <div class="section-label">Limited Offer</div>
        <h2 class="section-heading">Build Your Combo Box</h2>
        <p class="section-sub">Mix and match your favourites — curate your perfect pickle box at one great price.</p>

        <div class="combo-card-wrapper" id="comboCardWrapper">
            <div class="combo-card-layout">
                <div class="combo-banner-panel" id="comboBannerPanel" style="background-image: url('https://images.unsplash.com/photo-1604152135912-00a2f9bc68df?q=80&w=1000&auto=format&fit=crop');">
                    <div class="combo-banner-text">
                        <h3 id="comboBannerTitle">Loading…</h3>
                        <p id="comboBannerDesc"></p>
                    </div>
                </div>

                <div class="combo-picker-panel">
                    <div class="combo-picker-header">
                        <div class="combo-counter-circle">
                            <span class="combo-counter-number" id="comboSelectedCount">0</span>
                            <span class="combo-counter-label">/ <span id="comboMaxSpan">4</span></span>
                        </div>
                        <div class="combo-picker-title">✨ Pick Your Pickles</div>
                    </div>

                    <div id="comboPickleGridContainer">
                        <div class="combo-skeleton-grid">
                            <div class="combo-skeleton-item"><div class="combo-skeleton-img"></div><div class="combo-skeleton-txt"></div></div>
                            <div class="combo-skeleton-item"><div class="combo-skeleton-img"></div><div class="combo-skeleton-txt"></div></div>
                            <div class="combo-skeleton-item"><div class="combo-skeleton-img"></div><div class="combo-skeleton-txt"></div></div>
                            <div class="combo-skeleton-item"><div class="combo-skeleton-img"></div><div class="combo-skeleton-txt"></div></div>
                        </div>
                    </div>
                    
                    <div class="combo-status-msg" id="comboStatusMsg">Loading combo...</div>

                    <div class="combo-actions">
                        <button class="combo-btn combo-btn-secondary combo-btn-hidden" id="comboBuyNowBtn">Buy Now →</button>
                        <button class="combo-btn combo-btn-primary combo-btn-hidden" id="comboAddToCartBtn">Add to Cart 🛒</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
(function() {
    // 1. FIREBASE SETUP
    const landingConfig = {
        apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM",
        authDomain: "pickle-fdc54.firebaseapp.com",
        projectId: "pickle-fdc54",
        storageBucket: "pickle-fdc54.firebasestorage.app",
        messagingSenderId: "650348710985",
        appId: "1:650348710985:web:b8eedb551a79b536578398",
        measurementId: "G-B40NG5KQDL"
    };
    
    let landingDb;
    if (!firebase.apps.length) {
        firebase.initializeApp(landingConfig);
        landingDb = firebase.firestore();
    } else {
        const landingApp = firebase.initializeApp(landingConfig, 'landingApp');
        landingDb = firebase.firestore(landingApp);
    }

    // 2. STATE VARIABLES
    let comboAllPickles = [];
    let comboSelectedIds = [];
    let comboMaxSelect = 4;

    // 3. HELPER FUNCTIONS
    function comboEscapeHtml(str) { 
        return str ? str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])) : ''; 
    }

    function comboUpdateUI() {
        const count = comboSelectedIds.length;
        document.getElementById('comboSelectedCount').textContent = count;
        const limitReached = count === comboMaxSelect;
        
        const gridEl = document.querySelector('.combo-pickle-grid');
        if (gridEl) gridEl.classList.toggle('limit-reached', limitReached);
        
        document.querySelectorAll('.combo-pickle-item').forEach(item => {
            item.classList.toggle('selected', comboSelectedIds.includes(item.dataset.id));
        });
        
        const addBtn = document.getElementById('comboAddToCartBtn');
        const buyBtn = document.getElementById('comboBuyNowBtn');
        const msgEl = document.getElementById('comboStatusMsg');
        
        if (count === comboMaxSelect) {
            addBtn.classList.remove('combo-btn-hidden');
            buyBtn.classList.remove('combo-btn-hidden');
            msgEl.textContent = '🎉 Perfect combo! You can now checkout.';
        } else {
            addBtn.classList.add('combo-btn-hidden');
            buyBtn.classList.add('combo-btn-hidden');
            const remaining = comboMaxSelect - count;
            msgEl.textContent = remaining > 0 ? ` Select ${remaining} more pickle${remaining > 1 ? 's' : ''} to unlock.` : '';
        }
    }

    function comboTogglePickle(pickleId) {
        const idx = comboSelectedIds.indexOf(pickleId);
        if (idx !== -1) {
            comboSelectedIds.splice(idx, 1);
        } else {
            if (comboSelectedIds.length >= comboMaxSelect) {
                const msgEl = document.getElementById('comboStatusMsg');
                msgEl.textContent = `⚠️ You can only select ${comboMaxSelect} pickles. Remove one first.`;
                setTimeout(() => {
                    const rem = comboMaxSelect - comboSelectedIds.length;
                    msgEl.textContent = rem > 0 ? `Select ${rem} more pickle${rem > 1 ? 's' : ''}.` : (comboSelectedIds.length === comboMaxSelect ? '🎉 Perfect combo!' : '');
                }, 1500);
                return;
            }
            comboSelectedIds.push(pickleId);
        }
        comboUpdateUI();
    }

    function comboRenderGrid() {
        const container = document.getElementById('comboPickleGridContainer');
        if (!comboAllPickles.length) {
            container.innerHTML = `<div style="text-align:center; padding: 2rem; color: #6b5b4e;">🍃 No pickles available in combo right now.</div>`;
            return;
        }
        
        const gridEl = document.createElement('div');
        gridEl.className = 'combo-pickle-grid';
        
        comboAllPickles.forEach(pickle => {
            const item = document.createElement('div');
            item.className = 'combo-pickle-item';
            if (comboSelectedIds.includes(pickle.id)) item.classList.add('selected');
            item.dataset.id = pickle.id;
            item.innerHTML = `
                <div class="combo-pickle-img-circle"><img src="${pickle.imageUrl}" alt="${comboEscapeHtml(pickle.name)}"></div>
                <div class="combo-pickle-info">
                    <div class="combo-pickle-name">${comboEscapeHtml(pickle.name)}</div>
                    <div class="combo-pickle-price">${pickle.price}</div>
                </div>`;
            item.addEventListener('click', (e) => { e.stopPropagation(); comboTogglePickle(pickle.id); });
            gridEl.appendChild(item);
        });
        
        container.innerHTML = '';
        container.appendChild(gridEl);
        comboUpdateUI();
    }

    async function comboFetchFromFirestore() {
        try {
            const snapshot = await landingDb.collection('combos').get();
            if (snapshot.empty) throw new Error('No combos found');

            const data = snapshot.docs[0].data();
            comboAllPickles = (data.items || []).slice(0, 8).map(item => ({
                id: item.id || `item_${Math.random()}`,
                name: item.name || 'Unnamed Pickle',
                price: item.price || '₹199',
                imageUrl: item.imageUrl || 'https://placehold.co/400x400/f5e9e7/C0392B?text=Pickle'
            }));

            document.getElementById('comboBannerTitle').textContent = data.title || 'Special Combo';
            document.getElementById('comboBannerDesc').textContent = data.description || 'Select your favourite pickles';
            if (data.maxSelect) comboMaxSelect = data.maxSelect;
            document.getElementById('comboMaxSpan').textContent = comboMaxSelect;
            
            comboRenderGrid();
        } catch (err) {
            console.error('Combo error:', err);
            // Fallback mock data if Firestore fails
            comboAllPickles = [
                { id: '1', name: 'Chicken Pickle', price: '₹299', imageUrl: 'https://placehold.co/400/e2d6ca/5a3a2a?text=Chicken' },
                { id: '2', name: 'Mutton Pickle', price: '₹399', imageUrl: 'https://placehold.co/400/e2d6ca/5a3a2a?text=Mutton' },
                { id: '3', name: 'Prawn Pickle', price: '₹349', imageUrl: 'https://placehold.co/400/e2d6ca/5a3a2a?text=Prawns' },
                { id: '4', name: 'Fish Pickle', price: '₹249', imageUrl: 'https://placehold.co/400/e2d6ca/5a3a2a?text=Fish' }
            ];
            comboRenderGrid();
        }
    }

    // 4. INITIALIZATION & EVENTS
    document.addEventListener('DOMContentLoaded', () => {
        comboFetchFromFirestore();

        // Combo Button Events
        document.getElementById('comboAddToCartBtn').addEventListener('click', () => {
            const names = comboAllPickles.filter(p => comboSelectedIds.includes(p.id)).map(i => i.name).join(', ');
            alert(`🍯 Combo added to cart!\nSelected: ${names}`);
        });
        document.getElementById('comboBuyNowBtn').addEventListener('click', () => {
            const names = comboAllPickles.filter(p => comboSelectedIds.includes(p.id)).map(i => i.name).join(', ');
            alert(`🚀 Proceeding to checkout!\nSelected: ${names}`);
        });
    });
})();
</script>
</body>
</html>
