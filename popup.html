<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Popup - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #fffbeb; font-family: sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-gray-800 min-h-screen pb-20">
    <nav class="glass-panel sticky top-0 z-50 shadow-sm border-b border-amber-200">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center">
            <a href="index.html" class="font-bold text-xl text-amber-900"><i class="fas fa-pepper-hot text-red-600 mr-2"></i>Spicy Delights Admin</a>
            <a href="index.html" class="text-sm font-medium text-gray-600 hover:text-gray-900">Back to Dashboard</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8 space-y-8">
        
        <div class="bg-white rounded-xl shadow-sm border border-amber-200 p-6 flex flex-col sm:flex-row justify-between sm:items-center gap-4">
            <div>
                <h2 class="text-3xl font-bold"><i class="fas fa-window-restore mr-2 text-amber-600"></i>Promotional Popup</h2>
                <p class="text-gray-600 mt-1">Configure the popup that appears when customers visit your site.</p>
            </div>
            <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg border border-gray-200">
                <span class="font-bold text-gray-700" id="popup-status-text">Disabled</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="popup-toggle" class="sr-only peer" onchange="app.togglePopup(event)">
                    <div class="w-14 h-7 bg-gray-300 rounded-full peer peer-focus:ring-2 peer-focus:ring-amber-300 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-green-600"></div>
                </label>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="md:col-span-2 space-y-6">
                
                <section class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-5">
                    <h3 class="text-xl font-bold text-gray-800 border-b pb-2"><i class="fas fa-image text-gray-400 mr-2"></i>Content Settings</h3>
                    
                    <div>
                        <label class="text-sm font-bold text-gray-700 block mb-1">Popup Image URL</label>
                        <input type="text" id="p-image" class="w-full px-4 py-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-amber-400 focus:outline-none" placeholder="https://...">
                        <p class="text-xs text-amber-600 mt-1 font-medium"><i class="fas fa-info-circle"></i> Tip: If you use a fully designed image flyer, leave the Title and Message blank below.</p>
                    </div>

                    <div>
                        <label class="text-sm font-bold text-gray-700 block mb-1">Popup Title</label>
                        <input type="text" id="p-title" class="w-full px-4 py-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-amber-400 focus:outline-none" placeholder="e.g., Massive Diwali Sale!">
                    </div>

                    <div>
                        <label class="text-sm font-bold text-gray-700 block mb-1">Popup Message</label>
                        <textarea id="p-message" rows="3" class="w-full px-4 py-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-amber-400 focus:outline-none" placeholder="Get 20% off on all pickles this weekend."></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-sm font-bold text-gray-700 block mb-1">Button Text</label>
                            <input type="text" id="p-btn-text" class="w-full px-4 py-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-amber-400 focus:outline-none" placeholder="Shop Now">
                        </div>
                        <div>
                            <label class="text-sm font-bold text-gray-700 block mb-1">Button Link</label>
                            <input type="text" id="p-btn-link" class="w-full px-4 py-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-amber-400 focus:outline-none" placeholder="/products.html">
                        </div>
                    </div>
                </section>

                <section class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-5">
                    <h3 class="text-xl font-bold text-gray-800 border-b pb-2"><i class="fas fa-clock text-gray-400 mr-2"></i>Display Rules</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-sm font-bold text-gray-700 block mb-1">Delay (Seconds)</label>
                            <div class="relative">
                                <input type="number" id="p-delay" min="0" class="w-full px-4 py-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-amber-400 focus:outline-none" placeholder="3">
                                <span class="absolute right-3 top-2 text-gray-400 font-medium">sec</span>
                            </div>
                        </div>
                        <div>
                            <label class="text-sm font-bold text-gray-700 block mb-1">Frequency</label>
                            <select id="p-frequency" class="w-full px-4 py-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-amber-400 focus:outline-none">
                                <option value="always">Always Show (Every Page Load)</option>
                                <option value="session">Once Per Session (Browser Close)</option>
                                <option value="daily">Once Per Day</option>
                            </select>
                        </div>
                    </div>
                </section>

            </div>

            <div class="space-y-4">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 sticky top-24">
                    <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Actions</h3>
                    <div class="space-y-3">
                        <button onclick="app.saveSettings()" id="save-btn" class="w-full bg-green-600 hover:bg-green-700 text-white px-4 py-3 rounded-lg font-bold shadow-lg transition-transform transform hover:scale-105 flex justify-center items-center">
                            <i class="fas fa-save mr-2"></i> Save Popup
                        </button>
                        <button onclick="app.resetToDefault()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 border border-gray-300 px-4 py-2 rounded-lg font-medium transition-colors">
                            <i class="fas fa-undo mr-2"></i> Reset to Default
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM", authDomain: "pickle-fdc54.firebaseapp.com", projectId: "pickle-fdc54" };
        const db = getFirestore(initializeApp(firebaseConfig));

        // ─── Single document reference ───────────────────────────────────────────
        const MASTER_DOC = doc(db, 'landing_page', 'master');

        const DEFAULT_SETTINGS = {
            isEnabled: false,
            image: '',
            title: 'Welcome to Spicy Delights!',
            message: 'Sign up today and get a flat 10% discount on your first pickle order.',
            btnText: 'Shop Now',
            btnLink: '/index.html',
            delay: 3,
            frequency: 'session'
        };

        window.app = {
            init: async () => {
                try {
                    // ONE READ — grab only the popup_config sub-field from master
                    const snap = await getDoc(MASTER_DOC);
                    if (snap.exists() && snap.data().popup_config) {
                        const data = snap.data().popup_config;
                        app.populateFields(data);
                        app.updateToggleUI(data.isEnabled);
                    } else {
                        app.populateFields(DEFAULT_SETTINGS);
                        app.updateToggleUI(false);
                    }
                } catch (error) {
                    console.error("Error loading popup config:", error);
                    app.populateFields(DEFAULT_SETTINGS);
                    app.updateToggleUI(false);
                }
            },

            populateFields: (data) => {
                document.getElementById('p-image').value = data.image || '';
                document.getElementById('p-title').value = data.title || '';
                document.getElementById('p-message').value = data.message || '';
                document.getElementById('p-btn-text').value = data.btnText || '';
                document.getElementById('p-btn-link').value = data.btnLink || '';
                document.getElementById('p-delay').value = data.delay !== undefined ? data.delay : 3;
                document.getElementById('p-frequency').value = data.frequency || 'session';
            },

            updateToggleUI: (isEnabled) => {
                const toggle = document.getElementById('popup-toggle');
                const statusText = document.getElementById('popup-status-text');
                toggle.checked = isEnabled === true;
                statusText.innerText = isEnabled ? "Enabled" : "Disabled";
                statusText.className = `font-bold ${isEnabled ? 'text-green-600' : 'text-gray-500'}`;
            },

            // Instant toggle — writes only popup_config.isEnabled, rest of master untouched
            togglePopup: async (event) => {
                const isEnabled = event.target.checked;
                app.updateToggleUI(isEnabled);
                try {
                    await setDoc(MASTER_DOC, {
                        popup_config: { isEnabled }
                    }, { merge: true });
                } catch (error) {
                    console.error("Error toggling popup:", error);
                    alert("Failed to update status.");
                    event.target.checked = !isEnabled;
                    app.updateToggleUI(!isEnabled);
                }
            },

            // Writes only to popup_config sub-field — config and hero_slides untouched
            saveSettings: async () => {
                const btn = document.getElementById('save-btn');
                const originalHtml = btn.innerHTML;
                btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Saving...`;
                btn.disabled = true;

                const popupData = {
                    isEnabled: document.getElementById('popup-toggle').checked,
                    image: document.getElementById('p-image').value.trim(),
                    title: document.getElementById('p-title').value.trim(),
                    message: document.getElementById('p-message').value.trim(),
                    btnText: document.getElementById('p-btn-text').value.trim(),
                    btnLink: document.getElementById('p-btn-link').value.trim(),
                    delay: Number(document.getElementById('p-delay').value) || 0,
                    frequency: document.getElementById('p-frequency').value,
                    updatedAt: Date.now()
                };

                try {
                    await setDoc(MASTER_DOC, {
                        popup_config: popupData
                    }, { merge: true });

                    btn.innerHTML = `<i class="fas fa-check mr-2"></i> Saved!`;
                    btn.classList.replace('bg-green-600', 'bg-blue-600');
                    setTimeout(() => {
                        btn.innerHTML = originalHtml;
                        btn.classList.replace('bg-blue-600', 'bg-green-600');
                        btn.disabled = false;
                    }, 2000);
                } catch (error) {
                    console.error("Error saving popup config:", error);
                    alert("Failed to save settings. Check console.");
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                }
            },

            resetToDefault: () => {
                if (confirm("Are you sure you want to reset all fields to default values?")) {
                    app.populateFields(DEFAULT_SETTINGS);
                    app.saveSettings();
                }
            }
        };

        app.init();
    </script>
</body>
</html>
