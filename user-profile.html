<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Profile | Happy NonVeg Pickles</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ═══════════════════════════ GLOBAL RESET & VARIABLES (same as landing page) ═══════════════════════════ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-tap-highlight-color: transparent; }
        body {
            min-height: 100vh;
            background: #fffaf3;
            font-family: "DM Sans", Roboto, sans-serif;
            overflow-x: hidden;
            color: #2c1a0e;
            padding-top: 80px;
            transition: padding-top 0.2s ease;
        }
        @media (max-width: 768px) { body { padding-top: 70px; } }
        :root {
            --header-height-desktop: 80px;
            --navbar-height-mobile: 70px;
            --page-bg: #ffffff;
            --text-primary: #000000;
            --text-secondary: #333333;
            --text-light: #666666;
            --brand-primary: #E61D26;
            --brand-secondary: #c01820;
            --brand-gradient: linear-gradient(135deg, #E61D26 0%, #c01820 100%);
            --progress-color: #E61D26;
            --progress-bg: rgba(230, 29, 38, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(230, 29, 38, 0.1);
            --circle-bg: #fff5f5;
            --circle-border: #ffd6d8;
            --border-subtle: #e5e5e5;
            --surface-light: #f9f9f9;
            --surface-card: #ffffff;
            --surface-hover: #f5f5f5;
            --product-card-bg: #ffffff;
            --success-color: #4a9c7d;
            --shadow-premium: 0 10px 25px -5px rgba(0,0,0,0.08), 0 5px 10px -5px rgba(0,0,0,0.04);
            --shadow-light: 0 2px 10px rgba(0,0,0,0.05);
            --shadow-medium: 0 8px 30px rgba(0,0,0,0.10);
            --shadow-modal: 0 25px 50px -12px rgba(0,0,0,0.20);
            --rust: #C0392B;
            --rust-dark: #962d22;
            --rust-light: #f5e9e7;
            --turmeric: #E8A020;
            --cream: #FDF6EC;
            --ink: #1C1009;
            --ash: #6b5b4e;
            --border: rgba(28,16,9,.1);
            --shadow-sm: 0 2px 8px rgba(28,16,9,.08);
            --shadow-md: 0 8px 32px rgba(28,16,9,.12);
            --shadow-lg: 0 20px 60px rgba(28,16,9,.18);
            --r-card: 16px;
            --r-pill: 999px;
            --ff-display: 'Playfair Display', Georgia, serif;
            --ff-body: 'DM Sans', sans-serif;
            --nav-h: 80px;
        }
        @media (max-width: 768px) { :root { --nav-h: 70px; } }

        /* ---------- NAVBAR STYLES (same as before) ---------- */
        .d-navbar, .m-navbar, .m-drawer, .cart-drawer, .modal-overlay, #toast-container {
            font-family: "DM Sans", Roboto, sans-serif;
            color: var(--text-primary);
        }
        .icon-wrap {
            position: relative; width: 20px; height: 20px;
            display: inline-flex; align-items: center; justify-content: center;
            flex-shrink: 0; pointer-events: none;
        }
        .icon-wrap .icon-default, .icon-wrap .icon-fill {
            width: 20px; height: 20px; display: block; position: absolute; top: 0; left: 0;
            transition: opacity 0.18s ease;
        }
        .icon-wrap .icon-fill   { opacity: 0; }
        .icon-wrap .icon-default { opacity: 1; }
        .icon-trigger:hover   .icon-wrap .icon-fill,
        .icon-trigger.active  .icon-wrap .icon-fill  { opacity: 1; }
        .icon-trigger:hover   .icon-wrap .icon-default,
        .icon-trigger.active  .icon-wrap .icon-default { opacity: 0; }
        .icon-wrap.icon-white .icon-default, .icon-wrap.icon-white .icon-fill { filter: brightness(0) invert(1); }
        .icon-wrap.icon-muted .icon-default { filter: invert(45%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(90%) contrast(90%); }
        .icon-trigger:hover .icon-wrap.icon-muted .icon-fill { filter: invert(16%) sepia(97%) saturate(4500%) hue-rotate(345deg) brightness(90%) contrast(110%); }
        .icon-wrap.icon-danger .icon-default, .icon-wrap.icon-danger .icon-fill { filter: invert(16%) sepia(97%) saturate(4500%) hue-rotate(345deg) brightness(90%) contrast(110%); }
        .icon-wrap.icon-success .icon-default, .icon-wrap.icon-success .icon-fill { filter: invert(52%) sepia(47%) saturate(490%) hue-rotate(112deg) brightness(89%) contrast(87%); }
        .m-nav-link.active .icon-wrap .icon-fill, .d-nav-link.active .icon-wrap .icon-fill { opacity: 1; }
        .m-nav-link.active .icon-wrap .icon-default, .d-nav-link.active .icon-wrap .icon-default { opacity: 0; }
        .m-categories-toggle.active .chevron-wrap .icon-default { opacity: 0; }
        .m-categories-toggle.active .chevron-wrap .icon-fill { opacity: 1; filter: invert(16%) sepia(97%) saturate(4500%) hue-rotate(345deg) brightness(90%) contrast(110%); }
        .chevron-wrap { transition: transform 0.2s ease; }
        .m-categories-toggle.active .chevron-wrap { transform: rotate(90deg); }

        .page-desktop { min-height: 0; width: 100%; }
        .d-navbar {
            height: var(--header-height-desktop); background: var(--surface-card);
            border-bottom: 1px solid var(--border-subtle); position: fixed; top: 0; left: 0; right: 0;
            z-index: 1000; box-shadow: var(--shadow-light);
        }
        .d-navbar-container {
            max-width: 1440px; margin: 0 auto; height: 100%;
            display: flex; align-items: center; justify-content: space-between; padding: 0 40px;
        }
        .d-navbar-logo { height: 52px; width: auto; object-fit: contain; cursor: pointer; }
        .d-nav-links { display: flex; align-items: center; gap: 32px; margin: 0 40px; }
        .d-nav-link {
            font-size: 15px; font-weight: 600; color: var(--text-primary);
            text-decoration: none; padding: 8px 0; position: relative; transition: color 0.2s ease; white-space: nowrap;
        }
        .d-nav-link:hover, .d-nav-link.active { color: var(--brand-primary); }
        .d-nav-link.active::after {
            content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
            height: 2px; background: var(--brand-primary); border-radius: 1px;
        }
        .d-categories-dropdown { position: relative; }
        .d-categories-content {
            position: absolute; top: 100%; left: -20px; background: var(--surface-card);
            border: 1px solid var(--border-subtle); border-radius: 12px; padding: 12px 0; min-width: 220px;
            box-shadow: var(--shadow-premium); opacity: 0; visibility: hidden; transform: translateY(10px);
            transition: all 0.2s ease; z-index: 100;
        }
        .d-categories-dropdown:hover .d-categories-content { opacity: 1; visibility: visible; transform: translateY(0); }
        .d-category-item {
            display: block; padding: 12px 24px; color: var(--text-primary);
            text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.2s ease;
        }
        .d-category-item:hover { background: var(--surface-hover); color: var(--brand-primary); padding-left: 28px; }
        .d-action-icons { display: flex; align-items: center; gap: 20px; }
        .d-icon-btn {
            position: relative; width: 40px; height: 40px; border-radius: 10px;
            background: var(--surface-light); border: 1px solid var(--border-subtle);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease; text-decoration: none; color: inherit;
        }
        .d-icon-btn:hover { background: var(--surface-hover); border-color: var(--brand-primary); transform: translateY(-1px); }
        .cart-badge, .wishlist-badge {
            position: absolute; top: -6px; right: -6px; background: var(--brand-primary); color: white;
            font-size: 11px; font-weight: 700; min-width: 20px; height: 20px; padding: 0 4px;
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--surface-card); box-sizing: border-box;
        }
        .d-profile-dropdown { position: relative; }
        .d-profile-btn {
            width: 44px; height: 44px; border-radius: 10px; overflow: hidden;
            border: 1px solid var(--border-subtle); background: var(--surface-light);
            cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center;
        }
        .d-profile-btn:hover { border-color: var(--brand-primary); transform: translateY(-1px); background: var(--surface-hover); }
        .profile-popup {
            position: absolute; top: calc(100% + 10px); right: 0; background: var(--surface-card);
            border: 1px solid var(--border-subtle); border-radius: 16px; padding: 20px; min-width: 280px;
            box-shadow: var(--shadow-premium); opacity: 0; visibility: hidden; transform: translateY(10px);
            transition: all 0.2s ease; z-index: 1000;
        }
        .profile-popup.show { opacity: 1; visibility: visible; transform: translateY(0); }
        .profile-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border-subtle); }
        .profile-info { flex: 1; }
        .profile-name { font-weight: 700; font-size: 16px; color: var(--text-primary); margin-bottom: 4px; }
        .profile-email { font-size: 14px; color: var(--text-light); }
        .profile-links { display: flex; flex-direction: column; gap: 8px; }
        .profile-link {
            display: flex; align-items: center; padding: 12px 16px; color: var(--text-primary);
            text-decoration: none; border-radius: 10px; font-weight: 500; transition: all 0.2s ease; cursor: pointer; gap: 12px;
        }
        .profile-link:hover { background: var(--surface-hover); color: var(--brand-primary); padding-left: 20px; transform: translateX(2px); }
        /* MOBILE NAVBAR (unchanged) */
        .page-mobile { display: none; width: 100%; }
        .m-navbar {
            height: var(--navbar-height-mobile); background: var(--surface-card);
            border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center;
            justify-content: space-between; padding: 0 16px; position: fixed; top: 0; left: 0; right: 0;
            z-index: 1000; box-shadow: var(--shadow-light);
        }
        .m-menu-btn {
            width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border-subtle);
            background: var(--surface-light); display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; transition: all 0.2s ease; z-index: 2; min-width: 40px;
        }
        .m-menu-btn:hover { background: var(--surface-hover); }
        .m-logo { height: 50px; width: auto; object-fit: contain; position: absolute; left: calc(42.5%); transform: translateX(-50%); }
        .m-right-icons { display: flex; align-items: center; gap: 12px; z-index: 2; min-width: 92px; justify-content: flex-end; }
        .m-icon-btn {
            width: 40px; height: 40px; border-radius: 10px; background: var(--surface-light);
            border: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease; position: relative;
        }
        .m-icon-btn:hover { background: var(--surface-hover); }
        .mobile-cart-badge, .mobile-wishlist-badge {
            position: absolute; top: -4px; right: -4px; background: var(--brand-primary);
            color: white; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px;
            padding: 0 3px; border-radius: 9px; display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--surface-card); box-sizing: border-box;
        }
        .m-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);
            opacity: 0; pointer-events: none; transition: opacity 0.25s ease-out; z-index: 2000;
        }
        .m-overlay.open { opacity: 1; pointer-events: auto; }
        .m-drawer {
            position: absolute; left: 0; top: 0; width: 320px; max-width: 90vw; height: 100%;
            background: var(--surface-card); display: flex; flex-direction: column;
            transform: translateX(-100%); transition: transform 0.25s ease-out;
            overflow-y: auto; box-shadow: 2px 0 20px rgba(0,0,0,0.1);
        }
        .m-overlay.open .m-drawer { transform: translateX(0); }
        .m-drawer-header {
            height: 72px; min-height: 72px; border-bottom: 1px solid var(--border-subtle);
            display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
            background: var(--surface-card); position: relative; z-index: 10;
        }
        .m-drawer-logo { height: 42px; width: auto; object-fit: contain; display: block; }
        .m-drawer-close {
            width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border-subtle);
            background: var(--surface-light); display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; transition: all 0.2s ease;
        }
        .m-drawer-close:hover { background: var(--surface-hover); border-color: var(--brand-primary); }
        .m-drawer-nav { padding: 24px 16px 10px; display: flex; flex-direction: column; flex: 1; overflow-y: auto; }
        .nav-section { padding-bottom: 0; margin-bottom: 0; border: none; }
        .m-nav-link, .m-categories-toggle {
            display: flex; align-items: center; justify-content: space-between;
            height: 54px; padding: 0 16px; margin-bottom: 8px; color: var(--text-primary); text-decoration: none;
            font-size: 16px; font-weight: 500; border-radius: 12px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: transparent; border: 1px solid transparent;
        }
        .m-link-content { display: flex; align-items: center; flex: 1; gap: 14px; }
        .m-nav-link:hover, .m-categories-toggle:hover { background: var(--surface-hover); border-color: rgba(230, 29, 38, 0.05); transform: translateX(4px); }
        .m-nav-link.active, .m-categories-toggle.active { background: #fff0f0; color: var(--brand-primary); border-color: rgba(230, 29, 38, 0.1); font-weight: 600; }
        .m-categories-dropdown { margin: 2px 0 8px; }
        .m-categories-content { display: none; margin-left: 20px; padding-left: 16px; border-left: 2px solid var(--border-subtle); margin-top: 4px; margin-bottom: 12px; }
        .m-categories-content.show { display: block; animation: slideDown 0.2s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .m-category-item {
            display: flex; align-items: center; height: 44px; padding: 0 16px;
            color: var(--text-secondary); text-decoration: none; font-size: 15px; font-weight: 400;
            border-radius: 8px; transition: all 0.15s ease; margin-bottom: 2px;
        }
        .m-category-item:hover { background: var(--surface-hover); color: var(--brand-primary); padding-left: 20px; }
        .m-drawer-profile {
            padding: 20px 24px; border-top: 1px solid var(--border-subtle);
            background: var(--surface-light); flex-shrink: 0; cursor: pointer; position: relative;
        }
        .m-profile-popup-menu {
            position: absolute; bottom: 100%; left: 20px; right: 20px;
            background: var(--surface-card); border: 1px solid var(--border-subtle);
            border-radius: 16px; padding: 8px; box-shadow: var(--shadow-modal);
            display: none; flex-direction: column; gap: 4px; margin-bottom: 12px; z-index: 200;
        }
        .m-profile-popup-menu.active { display: flex; animation: slideUpFade 0.2s ease-out; }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .m-profile-option {
            padding: 12px 16px; border-radius: 8px; font-size: 15px; font-weight: 500;
            color: var(--text-primary); text-decoration: none; display: flex; align-items: center; gap: 12px; transition: background 0.2s;
        }
        .m-profile-option:hover { background: var(--surface-hover); color: var(--brand-primary); }
        .m-profile-option.logout { color: #E61D26; }
        .m-profile-option.logout:hover { background: #fff0f0; }

        /* PAGE SPECIFIC STYLES */
        .profile-container {
            max-width: 720px;
            margin: 40px auto;
            padding: 0 5vw;
        }
        .profile-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow-md);
        }
        .profile-card h2 {
            font-family: var(--ff-display);
            font-size: 2rem;
            color: var(--ink);
            margin-bottom: 24px;
        }
        .profile-field {
            margin-bottom: 24px;
        }
        .profile-field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--ash);
            margin-bottom: 6px;
        }
        .profile-field p {
            font-size: 18px;
            color: var(--ink);
            font-weight: 500;
        }
        .logout-btn {
            background: var(--brand-primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
        @media (max-width: 768px) {
            .profile-card { padding: 24px; }
        }
    </style>
</head>
<body>

</div>

    <nav class="m-navbar">
        <button class="m-menu-btn icon-trigger" id="m-menu-toggle" aria-label="Open menu">

    <div class="m-overlay" id="m-overlay">

                <img class="m-drawer-logo" src="./assets/logo.png" alt="Logo" />
                <button class="m-drawer-close icon-trigger" id="m-drawer-close" aria-label="Close menu">
                    <span class="icon-wrap"><img src="./assets/close.svg" class="icon-default" alt=""><img src="./assets/close-fill.svg" class="icon-fill" alt=""></span>
                </button>
            </div>
            <nav class="m-drawer-nav">
                <div class="nav-section">
                    <a href="landing.html" class="m-nav-link icon-trigger">
                        <div class="m-link-content">
                            <span class="icon-wrap"><img src="./assets/home.svg" class="icon-default" alt=""><img src="./assets/home-fill.svg" class="icon-fill" alt=""></span>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    // Main Firebase App (happynonvegpickles)
    const firebaseConfig = {
        apiKey: "AIzaSyCZbCr-Zt5KQblRQ8Pk58KuinCVP-TlXGo",
        authDomain: "happynonvegpickles-f2636.firebaseapp.com",
        projectId: "happynonvegpickles-f2636",
        storageBucket: "happynonvegpickles-f2636.firebasestorage.app",
        messagingSenderId: "802823212924",
        appId: "1:802823212924:web:d82c92737ffa950798def9"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Reuse shared navbar & cart logic from landing page
    let cart = JSON.parse(localStorage.getItem('vastramaya_cart')) || [];
    let currentUser = null;
    let wishlist = [];

    function renderCart() {
        const desktopBody = document.getElementById('cart-items-desktop');
        const mobileBody = document.getElementById('cart-items-mobile');
        const badgeDesktop = document.getElementById('cart-badge-desktop');
        const badgeMobile = document.getElementById('cart-badge-mobile');
        const totalDesktop = document.getElementById('cart-total-desktop');
        const totalMobile = document.getElementById('cart-total-mobile');
        const countDesktop = document.getElementById('cart-count-desktop');
        const countMobile = document.getElementById('cart-count-mobile');
        let total = 0, count = 0, html = '';
        if (cart.length === 0) {
            html = '<div class="empty-cart-msg">Your cart is empty</div>';
        } else {
            cart.forEach(item => {
                total += item.price * item.quantity;
                count += item.quantity;
                html += `<div class="cart-item">
                    <img src="${item.image}" alt="${item.name}" class="cart-item-img">
                    <div class="cart-item-details">
                        <div class="cart-item-title">${item.name}</div>
                        <div class="cart-item-price">₹${item.price}</div>
                        <div class="cart-item-quantity">
                            <div class="quantity-btn" onclick="updateQuantity('${item.uniqueId}', -1)">−</div>
                            <div class="quantity-value">${item.quantity}</div>
                            <div class="quantity-btn" onclick="updateQuantity('${item.uniqueId}', 1)">+</div>
                        </div>
                    </div>
                    <div class="cart-item-remove" onclick="removeFromCart('${item.uniqueId}')">×</div>
                </div>`;
            });
        }
        if (desktopBody) desktopBody.innerHTML = html;
        if (mobileBody) mobileBody.innerHTML = html;
        if (badgeDesktop) { badgeDesktop.textContent = count; badgeDesktop.style.display = count > 0 ? 'flex' : 'none'; }
        if (badgeMobile) { badgeMobile.textContent = count; badgeMobile.style.display = count > 0 ? 'flex' : 'none'; }
        if (totalDesktop) totalDesktop.textContent = `₹${total.toFixed(2)}`;
        if (totalMobile) totalMobile.textContent = `₹${total.toFixed(2)}`;
        if (countDesktop) countDesktop.textContent = `${count} item${count !== 1 ? 's' : ''}`;
        if (countMobile) countMobile.textContent = `Your Cart (${count})`;
    }

    function removeFromCart(uniqueId) {
        cart = cart.filter(item => String(item.uniqueId) !== String(uniqueId));
        saveCart(true);
        renderCart();
    }
    function updateQuantity(uniqueId, change) {
        const item = cart.find(item => String(item.uniqueId) === String(uniqueId));
        if (item) {
            item.quantity += change;
            if (item.quantity <= 0) removeFromCart(uniqueId);
            else { saveCart(true); renderCart(); }
        }
    }
    function saveCart(syncDB) {
        localStorage.setItem('vastramaya_cart', JSON.stringify(cart));
        if (syncDB && currentUser) {
            db.collection('users').doc(currentUser.uid).update({ cart }).catch(() => {});
        }
    }

    function initNavbarUI() {
        // Desktop cart toggle
        const dCartToggle = document.getElementById('d-cart-toggle');
        const cartPopup = document.getElementById('cart-popup');
        if (dCartToggle && cartPopup) {
            dCartToggle.onclick = e => { e.stopPropagation(); cartPopup.classList.toggle('show'); };
            cartPopup.onclick = e => e.stopPropagation();
            document.addEventListener('click', () => cartPopup.classList.remove('show'));
        }
        // Desktop profile toggle
        const pToggle = document.getElementById('d-profile-toggle');
        const pPopup = document.getElementById('profile-popup');
        if (pToggle) {
            pToggle.onclick = e => { e.stopPropagation(); pPopup.classList.toggle('show'); };
            document.onclick = () => pPopup.classList.remove('show');
        }
        // Mobile menu & cart overlays
        const mMenuToggle = document.getElementById('m-menu-toggle');
        const mOverlay = document.getElementById('m-overlay');
        const mDrawerClose = document.getElementById('m-drawer-close');
        if (mMenuToggle) mMenuToggle.onclick = () => mOverlay.classList.add('open');
        if (mDrawerClose) mDrawerClose.onclick = () => mOverlay.classList.remove('open');
        if (mOverlay) mOverlay.onclick = e => { if (e.target === mOverlay) mOverlay.classList.remove('open'); };

        const mCartToggle = document.getElementById('m-cart-toggle');
        const cartOverlay = document.getElementById('cart-overlay');
        const cartDrawerClose = document.getElementById('cart-drawer-close');
        if (mCartToggle && cartOverlay) {
            mCartToggle.onclick = () => cartOverlay.classList.add('open');
            cartDrawerClose.onclick = () => cartOverlay.classList.remove('open');
            cartOverlay.onclick = e => { if (e.target === cartOverlay) cartOverlay.classList.remove('open'); };
        }
        // Mobile categories toggle
        const mCatToggle = document.getElementById('m-categories-toggle');
        const mCatContent = document.getElementById('mobile-nav-categories');
        if (mCatToggle) {
            mCatToggle.onclick = () => {
                const open = mCatContent.style.display === 'block';
                mCatContent.style.display = open ? 'none' : 'block';
                mCatToggle.classList.toggle('active', !open);
            };
        }
        // Mobile profile popup
        const mProfileTrig = document.getElementById('mobile-profile-trigger');
        const mProfilePopup = document.getElementById('m-profile-popup');
        if (mProfileTrig) {
            mProfileTrig.onclick = (e) => {
                if (e.target.closest('.m-profile-popup-menu')) return;
                mProfilePopup.classList.toggle('active');
            };
        }
        document.getElementById('mobile-logout-btn')?.addEventListener('click', () => auth.signOut());
    }

    // Load categories for navbar dropdown
    async function loadCategories() {
        try {
            const snapshot = await db.collection('categories').get();
            const categories = snapshot.docs.map(d => ({ id: d.id, ...d.data() })).filter(c => c.enabled !== false);
            const dHtml = categories.map(c => `<a href="shop.html?category=${encodeURIComponent(c.name)}" class="d-category-item">${c.name}</a>`).join('');
            const mHtml = categories.map(c => `<a href="shop.html?category=${encodeURIComponent(c.name)}" class="m-category-item">${c.name}</a>`).join('');
            document.getElementById('desktop-nav-categories').innerHTML = dHtml;
            document.getElementById('mobile-nav-categories').innerHTML = mHtml;
        } catch (err) { console.error('Categories load error', err); }
    }

    // Auth state & profile display
    auth.onAuthStateChanged(async user => {
        currentUser = user;
        renderCart();
        loadCategories();
        initNavbarUI();

        const authOnly = document.querySelectorAll('.auth-only');
        const loginTrigDesktop = document.getElementById('login-trigger-desktop');
        const mobileProfileTrig = document.getElementById('mobile-profile-trigger');
        const userNameDesktop = document.getElementById('user-name');
        const userEmailDesktop = document.getElementById('user-email');
        const userNameMobile = document.getElementById('user-name-mobile');
        const userPhoneMobile = document.getElementById('user-phone-mobile');

        if (user) {
            authOnly.forEach(el => el.classList.remove('auth-hidden'));
            // Fetch user doc for display name & email
            const userDoc = await db.collection('users').doc(user.uid).get();
            const data = userDoc.exists ? userDoc.data() : {};
            const name = data.name || user.displayName || 'User';
            const email = user.email;
            const createdAt = data.createdAt ? data.createdAt.toDate().toLocaleDateString('en-IN', { year:'numeric', month:'long', day:'numeric' }) : 'N/A';

            document.getElementById('profile-content').innerHTML = `
                <div class="profile-field"><label>Full Name</label><p>${name}</p></div>
                <div class="profile-field"><label>Email</label><p>${email}</p></div>
                <div class="profile-field"><label>Member Since</label><p>${createdAt}</p></div>
            `;

            // Navbar info
            if (userNameDesktop) { userNameDesktop.textContent = name; userEmailDesktop.textContent = email; }
            if (userNameMobile) { userNameMobile.textContent = name; userPhoneMobile.textContent = email; }
            if (loginTrigDesktop) {
                loginTrigDesktop.innerHTML = `<span class="icon-wrap"><img src="./assets/logout.svg" class="icon-default" alt=""><img src="./assets/logout-fill.svg" class="icon-fill" alt=""></span> Sign Out`;
                loginTrigDesktop.onclick = (e) => { e.preventDefault(); auth.signOut(); };
            }
            if (mobileProfileTrig) {
                mobileProfileTrig.onclick = (e) => {
                    if (e.target.closest('.m-profile-popup-menu')) return;
                    document.getElementById('m-profile-popup').classList.toggle('active');
                };
            }
            document.getElementById('profile-logout').onclick = () => auth.signOut();
        } else {
            authOnly.forEach(el => el.classList.add('auth-hidden'));
            document.getElementById('profile-content').innerHTML = `<p style="color:var(--ash);">Please <a href="#" onclick="auth.signInAnonymously()">sign in</a> to view your profile.</p>`;
            if (loginTrigDesktop) {
                loginTrigDesktop.innerHTML = `<span class="icon-wrap"><img src="./assets/login.svg" class="icon-default" alt=""><img src="./assets/login-fill.svg" class="icon-fill" alt=""></span> Sign In`;
                loginTrigDesktop.onclick = (e) => { e.preventDefault(); window.location.href = 'landing.html?login=true'; };
            }
            if (mobileProfileTrig) {
                mobileProfileTrig.onclick = (e) => { e.preventDefault(); window.location.href = 'landing.html?login=true'; };
            }
            if (userNameDesktop) userNameDesktop.textContent = 'Guest';
            if (userNameMobile) userNameMobile.textContent = 'Guest';
        }
    });
</script>
</body>
