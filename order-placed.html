
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Order Placed Successfully!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background-color: #C0392B; /* Matches your core brand red color precisely */
      font-family: 'IBM Plex Sans', sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* Dynamic container that auto-adjusts layout presentation between devices */
    .animation-wrapper {
      width: 100%;
      max-width: 600px; /* Perfect square/portrait desktop card ratio layout boundary */
      aspect-ratio: 4 / 3; /* Matches your specific delivery video frame structure */
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 24px;
      overflow: hidden;
      /* Smoothly blend background matching to eliminate edge lines */
      background-color: #C0392B; 
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Keeps video details seamlessly fitted into corners without bars */
      display: block;
    }

    /* Mobile view structural responsiveness override */
    @media (max-width: 600px) {
      body {
        padding: 0; /* Remove boundaries to take up entire glass surface area */
      }
      .animation-wrapper {
        max-width: 100vw;
        height: 100vh;
        border-radius: 0; /* Full edge-to-edge coverage on phone screens */
        aspect-ratio: auto;
      }
      video {
        object-fit: contain; /* Prevents crucial truck graphics from cropping on narrow phones */
      }
    }
  </style>
</head>
<body>

<div class="animation-wrapper">
  <video id="successAnimation" autoplay playsinline webkit-playsinline muted preload="auto">
    <source src="large-thumbnail20250211-1846070-1x65j2q.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM",
    authDomain: "pickle-fdc54.firebaseapp.com",
    projectId: "pickle-fdc54",
    storageBucket: "pickle-fdc54.firebasestorage.app",
    messagingSenderId: "650348710985",
    appId: "1:650348710985:web:b8eedb551a79b536578398",
    measurementId: "G-B40NG5KQDL"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function uploadOrderToFirebase() {
    try {
      const rawData = sessionStorage.getItem('checkoutData');
      if (!rawData) return;

      const orderPayload = JSON.parse(rawData);
      orderPayload.createdAt = serverTimestamp(); // Inject database accurate timing

      await addDoc(collection(db, "orders"), orderPayload);

      // Clear your cart and session memory data upon successful submission
      sessionStorage.removeItem('checkoutData');
      localStorage.removeItem('vastramaya_cart');
    } catch (err) {
      console.error("Firebase database insertion failed:", err);
    }
  }

  // Fire data transaction cycle silently during active rendering
  uploadOrderToFirebase();

  const video = document.getElementById('successAnimation');
  const redirectPage = 'index.html'; // Your store home target

  if (video) {
    // When the delivery truck reaches the destination and finish playing, go home
    video.onended = () => { 
      window.location.href = redirectPage; 
    };
    
    // Safety Fallback (10 seconds): Guarantees user safe-exit routing in case network lag freezes media thread
    setTimeout(() => { 
      window.location.href = redirectPage; 
    }, 10000);
  } else {
    window.location.href = redirectPage;
  }
</script>
</body>
</html>
