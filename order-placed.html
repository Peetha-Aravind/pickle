<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Order Placed – Happy NonVeg Pickles</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: black;
      overflow: hidden;
      font-family: sans-serif;
    }

    /* Full‑screen video container */
    .video-frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #animationVideo {
      width: 100%;
      height: 100%;
      display: block;
      background: black;
    }

    /* ─── Desktop: fill the entire screen (cover) ──────── */
    @media (min-width: 768px) {
      #animationVideo {
        object-fit: cover;  /* fills whole screen, may crop edges */
      }
    }

    /* ─── Mobile: show full video without zooming ────── */
    @media (max-width: 767px) {
      #animationVideo {
        object-fit: contain;  /* entire video visible, no crop/zoom */
      }
    }

    /* ─── Fallback overlay for audio autoplay ──────────── */
    #audioUnlock {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.01);
      z-index: 10;
      display: none;
      cursor: pointer;
    }
    #audioUnlock.show {
      display: block;
    }
  </style>
</head>
<body>

  <div class="video-frame">
    <video id="animationVideo" autoplay playsinline>
      <source src="./assets/video.mp4" type="video/mp4">
    </video>
  </div>

  <div id="audioUnlock"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, doc, updateDoc, increment, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM",
      authDomain: "pickle-fdc54.firebaseapp.com",
      projectId: "pickle-fdc54",
      storageBucket: "pickle-fdc54.firebasestorage.app",
      messagingSenderId: "650348710985",
      appId: "1:650348710985:web:b8eedb551a79b536578398",
      measurementId: "G-B40NG5KQDL"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ─── Background Firestore save ─────────────────────
    const checkoutData = JSON.parse(sessionStorage.getItem('checkoutData'));
    if (checkoutData) {
      (async () => {
        try {
          const ordersRef = collection(db, 'orders');
          const docRef = await addDoc(ordersRef, {
            ...checkoutData,
            createdAt: serverTimestamp(),
            status: 'pending'
          });
          if (checkoutData.coupon?.code) {
            await updateDoc(doc(db, 'coupons', checkoutData.coupon.code.toUpperCase()), {
              usage: increment(1)
            });
          }
          if (!new URLSearchParams(window.location.search).get('id')) {
            localStorage.removeItem('vastramaya_cart');
          }
          sessionStorage.removeItem('checkoutData');
        } catch (error) {
          console.error("Order save failed:", error);
        }
      })();
    }

    // ─── Handle autoplay with sound ──────────────────
    const video = document.getElementById('animationVideo');
    const unlockOverlay = document.getElementById('audioUnlock');

    const playPromise = video.play();
    if (playPromise !== undefined) {
      playPromise.catch(() => {
        unlockOverlay.classList.add('show');
      });
    }

    unlockOverlay.addEventListener('click', () => {
      video.play();
      unlockOverlay.classList.remove('show');
    }, { once: true });

    video.addEventListener('play', () => {
      unlockOverlay.classList.remove('show');
    });
  </script>
</body>
</html>
