<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Order Placed Successfully!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background-color: #C0392B; /* Matches your core brand red exactly */
      font-family: 'IBM Plex Sans', sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .animation-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #C0392B;
    }

    video {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Desktop layout rendering optimizations */
    @media (min-width: 601px) {
      video {
        object-fit: contain; /* Prevents letterboxing stretch lines on wide monitors */
        max-width: 800px;
        max-height: 600px;
      }
    }

    /* Mobile layout rendering optimizations */
    @media (max-width: 600px) {
      video {
        object-fit: cover; /* Forces the red video background to scale beautifully edge-to-edge on phones */
      }
    }
  </style>
</head>
<body>

<div class="animation-wrapper">
  <video id="successAnimation" autoplay playsinline webkit-playsinline muted preload="auto">
    <source src="large-thumbnail20250211-1846070-1x65j2q.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM",
    authDomain: "pickle-fdc54.firebaseapp.com",
    projectId: "pickle-fdc54",
    storageBucket: "pickle-fdc54.firebasestorage.app",
    messagingSenderId: "650348710985",
    appId: "1:650348710985:web:b8eedb551a79b536578398",
    measurementId: "G-B40NG5KQDL"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function uploadOrderToFirebase() {
    try {
      const rawData = sessionStorage.getItem('checkoutData');
      if (!rawData) return;

      const orderPayload = JSON.parse(rawData);
      orderPayload.createdAt = serverTimestamp();

      await addDoc(collection(db, "orders"), orderPayload);

      // Clear volatile states instantly upon success
      sessionStorage.removeItem('checkoutData');
      localStorage.removeItem('vastramaya_cart');
    } catch (err) {
      console.error("Firebase tracking write failed:", err);
    }
  }

  // Submit background operations asynchronously
  uploadOrderToFirebase();

  const video = document.getElementById('successAnimation');
  const redirectPage = 'index.html';

  if (video) {
    // FORCE PLAYBACK: Resolves strict device engine autoplay blocks immediately upon mount
    document.addEventListener('DOMContentLoaded', () => {
      video.load();
      const playPromise = video.play();
      
      if (playPromise !== undefined) {
        playPromise.catch(error => {
          console.warn("Autoplay context interrupted. Falling back to timer route...", error);
          // If video file is flat out missing or blocked, redirect after 5 seconds instead of getting stuck
          setTimeout(() => {
            window.location.href = redirectPage;
          }, 5000);
        });
      }
    });

    // Fallback: If it plays normally, redirect the exact millisecond the truck stops animating
    video.onended = () => { 
      window.location.href = redirectPage; 
    };

    // Global safety timer in case the track lags or loops infinitely
    setTimeout(() => { 
      window.location.href = redirectPage; 
    }, 9500);
  } else {
    window.location.href = redirectPage;
  }
</script>
</body>
</html>
