<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Order Placed – Happy NonVeg Pickles</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: black; /* fallback behind video */
      overflow: hidden;
    }
    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;   /* fills the screen, crops if needed */
      z-index: 1;
    }
  </style>
</head>
<body>
  <!-- Full‑screen video, autoplay, no controls -->
  <video 
    id="animationVideo" 
    autoplay 
    muted 
    playsinline
  >
    <source src="./assets/video.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, doc, updateDoc, increment, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM",
      authDomain: "pickle-fdc54.firebaseapp.com",
      projectId: "pickle-fdc54",
      storageBucket: "pickle-fdc54.firebasestorage.app",
      messagingSenderId: "650348710985",
      appId: "1:650348710985:web:b8eedb551a79b536578398",
      measurementId: "G-B40NG5KQDL"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const checkoutData = JSON.parse(sessionStorage.getItem('checkoutData'));
    if (checkoutData) {
      // Save order in background – no UI feedback
      (async () => {
        try {
          const ordersRef = collection(db, 'orders');
          const docRef = await addDoc(ordersRef, {
            ...checkoutData,
            createdAt: serverTimestamp(),
            status: 'pending'
          });
          if (checkoutData.coupon?.code) {
            await updateDoc(doc(db, 'coupons', checkoutData.coupon.code.toUpperCase()), {
              usage: increment(1)
            });
          }
          // Clear cart / session silently
          if (!new URLSearchParams(window.location.search).get('id')) {
            localStorage.removeItem('vastramaya_cart');
          }
          sessionStorage.removeItem('checkoutData');
        } catch (error) {
          console.error("Order save failed:", error);
        }
      })();
    } else {
      console.error("No checkout data found – order cannot be saved.");
    }
  </script>
</body>
</html>
