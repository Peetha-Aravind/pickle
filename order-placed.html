<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Order Placed – Happy NonVeg Pickles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --rust: #C0392B; --rust-dark: #962d22; --rust-light: #f5e9e7;
      --turmeric: #E8A020; --cream: #FDF6EC; --ink: #1C1009;
      --success: #2e7d32;
      --ff-body: 'IBM Plex Sans', sans-serif;
    }
    body {
      background: linear-gradient(145deg, #fff9f2 0%, var(--cream) 100%);
      color: var(--ink);
      font-family: var(--ff-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(28,16,9,0.08), 0 4px 12px rgba(0,0,0,0.04);
      padding: 48px 32px;
      position: relative;
      overflow: hidden;
    }
    .order-summary-box {
      margin: 24px 0;
      text-align: left;
      background: #faf7f2;
      padding: 18px;
      border-radius: 16px;
      font-size: 0.9rem;
    }
    .summary-line {
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }
    .summary-line strong { color: var(--rust); }

    /* Animation wrapper */
    .animation-stage {
      position: relative;
      height: 180px;
      margin: 20px auto;
    }

    /* Checkmark SVG */
    .checkmark-svg {
      width: 120px;
      height: 120px;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .checkmark-svg.show {
      opacity: 1;
    }

    .checkmark-circle {
      stroke-dasharray: 315;
      stroke-dashoffset: 315;
      stroke: var(--success);
      stroke-width: 3;
      fill: none;
      animation: draw-circle 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    .checkmark-check {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      stroke: var(--success);
      stroke-width: 4;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      animation: draw-check 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0.6s forwards;
    }

    @keyframes draw-circle {
      to { stroke-dashoffset: 0; }
    }
    @keyframes draw-check {
      to { stroke-dashoffset: 0; }
    }

    /* Floating sparkles (subtle) */
    .sparkle {
      position: absolute;
      background: var(--turmeric);
      border-radius: 50%;
      width: 6px;
      height: 6px;
      opacity: 0;
      animation: sparkle-float 1.2s ease-out forwards;
    }
    @keyframes sparkle-float {
      0% { transform: translate(0, 0) scale(0); opacity: 1; }
      100% { transform: translate(var(--x), var(--y)) scale(1); opacity: 0; }
    }

    .status-text {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--ink);
      margin-top: 24px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.6s ease 0.8s;
    }
    .status-text.show {
      opacity: 1;
      transform: translateY(0);
    }
    .order-id {
      font-weight: 700;
      color: var(--rust);
      font-size: 1rem;
      margin-top: 8px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.6s ease 1s;
    }
    .order-id.show {
      opacity: 1;
      transform: translateY(0);
    }
    .sub-message {
      color: var(--ash);
      margin-top: 12px;
      opacity: 0;
      transform: translateY(6px);
      transition: all 0.6s ease 1.2s;
    }
    .sub-message.show {
      opacity: 1;
      transform: translateY(0);
    }

    .home-btn {
      margin-top: 28px;
      background: var(--rust);
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 40px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.2s, transform 0.2s;
      box-shadow: 0 4px 12px rgba(192,57,43,0.2);
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.6s ease 1.4s;
    }
    .home-btn.show {
      opacity: 1;
      transform: translateY(0);
    }
    .home-btn:hover { background: var(--rust-dark); transform: translateY(-2px); }
  </style>
</head>
<body>
<div class="container" id="animationContainer">
  <!-- Summary of order (dynamic) -->
  <div class="order-summary-box" id="orderSummary"></div>

  <!-- Animated checkmark area -->
  <div class="animation-stage" id="animationStage">
    <svg class="checkmark-svg" id="checkmarkSvg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle class="checkmark-circle" cx="50" cy="50" r="48" fill="none"/>
      <path class="checkmark-check" d="M30 50 l12 12 22-24" fill="none"/>
    </svg>
  </div>

  <!-- Text reveals after animation -->
  <div class="status-text" id="statusText">Order Placed!</div>
  <div class="order-id" id="orderIdDisplay">Order ID: ...</div>
  <p class="sub-message" id="subMessage">We’ll send you updates on your phone and email.</p>
  <a href="index.html" class="home-btn" id="homeBtn">Continue Shopping</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { 
    getFirestore, doc, updateDoc, increment, collection, addDoc, serverTimestamp 
  } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM",
    authDomain: "pickle-fdc54.firebaseapp.com",
    projectId: "pickle-fdc54",
    storageBucket: "pickle-fdc54.firebasestorage.app",
    messagingSenderId: "650348710985",
    appId: "1:650348710985:web:b8eedb551a79b536578398",
    measurementId: "G-B40NG5KQDL"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function formatPrice(p) { return `₹${Math.round(Number(p) || 0)}`; }

  // ─── Retrieve checkout data ─────────────────────────────────
  const checkoutData = JSON.parse(sessionStorage.getItem('checkoutData'));

  if (!checkoutData) {
    document.body.innerHTML = `
      <div class="container" style="text-align:center; padding:40px;">
        <h2>No order data found</h2>
        <p>Please return to checkout and try again.</p>
        <a href="index.html" class="home-btn show" style="opacity:1; transform:translateY(0);">Back to Home</a>
      </div>
    `;
    throw new Error("No checkout data");
  }

  // ─── Populate order summary ─────────────────────────────────
  const summaryDiv = document.getElementById('orderSummary');
  if (summaryDiv) {
    const itemList = checkoutData.items.map(i => 
      `<div class="summary-line"><span>${i.name} (${i.variant}) × ${i.quantity}</span><span>${formatPrice(i.totalPrice)}</span></div>`
    ).join('');
    summaryDiv.innerHTML = `
      <div class="summary-line"><strong>Total</strong><strong>${formatPrice(checkoutData.total)}</strong></div>
      ${itemList}
      <div class="summary-line" style="margin-top:8px; font-size:0.8rem; color:var(--ash);">
        <span>Payment</span><span>${checkoutData.paymentMethod}</span>
      </div>
    `;
  }

  // ─── Start animation sequence ──────────────────────────────
  window.addEventListener('load', () => {
    const checkmarkSvg = document.getElementById('checkmarkSvg');
    const statusText = document.getElementById('statusText');
    const orderIdDisplay = document.getElementById('orderIdDisplay');
    const subMessage = document.getElementById('subMessage');
    const homeBtn = document.getElementById('homeBtn');

    // Trigger checkmark animation
    checkmarkSvg.classList.add('show');

    // After circle draws, show text elements sequentially (CSS transitions handle delays)
    statusText.classList.add('show');
    orderIdDisplay.classList.add('show');
    subMessage.classList.add('show');
    homeBtn.classList.add('show');

    // Add tiny sparkles (optional delight)
    const stage = document.getElementById('animationStage');
    for (let i = 0; i < 8; i++) {
      setTimeout(() => {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        const angle = Math.random() * 2 * Math.PI;
        const distance = 50 + Math.random() * 40;
        sparkle.style.setProperty('--x', `${Math.cos(angle)*distance}px`);
        sparkle.style.setProperty('--y', `${Math.sin(angle)*distance}px`);
        sparkle.style.left = '50%';
        sparkle.style.top = '50%';
        sparkle.style.marginLeft = '-3px';
        sparkle.style.marginTop = '-3px';
        stage.appendChild(sparkle);
        sparkle.addEventListener('animationend', () => sparkle.remove());
      }, i * 150);
    }

    // ─── Save order to Firestore ──────────────────────────────────
    saveOrderToFirestore(checkoutData);
  });

  async function saveOrderToFirestore(data) {
    try {
      const ordersRef = collection(db, 'orders');
      const orderData = {
        ...data,
        createdAt: serverTimestamp(),
        status: 'pending'
      };
      const docRef = await addDoc(ordersRef, orderData);

      // Increment coupon usage if any
      if (data.coupon && data.coupon.code) {
        await updateDoc(doc(db, 'coupons', data.coupon.code.toUpperCase()), {
          usage: increment(1)
        });
      }

      // Show Firestore order ID
      document.getElementById('orderIdDisplay').textContent = `Order ID: ${docRef.id}`;

      // Clear cart (if the flow came from cart, not direct product)
      if (!new URLSearchParams(window.location.search).get('id')) {
        localStorage.removeItem('vastramaya_cart');
      }

      // Remove checkout data from sessionStorage
      sessionStorage.removeItem('checkoutData');

    } catch (error) {
      console.error("Order save failed:", error);
      document.getElementById('orderIdDisplay').textContent = 'Order ID: (save error, contact support)';
    }
  }
</script>
</body>
</html>
