<div class="container">
    <button class="back-btn" id="backBtn" style="display: none;"><i class="fas fa-arrow-left"></i> Back to all pickles</button>

    <div id="productListingView" class="product-listing active">
        <h1 style="font-size: 2rem; margin-bottom: 28px;">🍯 Our Authentic Pickles</h1>
        <div id="productsGrid" class="products-grid">
            <div class="loader">Loading delicious pickles...</div>
        </div>
    </div>

    <!-- Product Detail View -->
    <div id="productDetailView" class="product-detail">
        <div id="detailContent"></div>
    </div>
</div>
<footer>
    <p>© 2025 Pickle Paradise | Authentic Indian Pickles</p>
</footer>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getFirestore, collection, getDocs, getDoc, doc, query, where, limit } from "firebase/firestore";

    // Firebase configuration (provided by user)
    const firebaseConfig = {
        apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM",
        authDomain: "pickle-fdc54.firebaseapp.com",
        projectId: "pickle-fdc54",
        storageBucket: "pickle-fdc54.firebasestorage.app",
        messagingSenderId: "650348710985",
        appId: "1:650348710985:web:b8eedb551a79b536578398",
        measurementId: "G-B40NG5KQDL"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // DOM elements
    const listingView = document.getElementById("productListingView");
    const detailView = document.getElementById("productDetailView");
    const backBtn = document.getElementById("backBtn");
    const productsGrid = document.getElementById("productsGrid");

    let currentProductId = null;

    // Load all products from "products" collection
    async function loadAllProducts() {
        try {
            productsGrid.innerHTML = '<div class="loader">Loading pickles...</div>';
            const querySnapshot = await getDocs(collection(db, "products"));
            if (querySnapshot.empty) {
                productsGrid.innerHTML = '<div class="loader">No products found. Please add products to Firestore "products" collection.</div>';
                return;
            }
            productsGrid.innerHTML = "";
            querySnapshot.forEach(docSnap => {
                const product = { id: docSnap.id, ...docSnap.data() };
                const card = document.createElement("div");
                card.className = "product-card";
                const firstImage = product.images && product.images.length ? product.images[0] : "https://picsum.photos/id/108/300/200";
                // Get price from first variant or fallback
                const price = product.variants && product.variants[0] ? product.variants[0].price : (product.price || 0);
                const mrp = product.variants && product.variants[0] ? product.variants[0].mrp : (product.mrp || 0);
                card.innerHTML = `
                    <img class="product-img" src="${firstImage}" alt="${product.name}">
                    <div class="product-info-card">
                        <div class="product-title">${product.name}</div>
                        <div><span class="product-price">₹${price}</span><span class="product-mrp">₹${mrp}</span></div>
                        <button class="view-product-btn" data-id="${product.id}">View Product →</button>
                    </div>
                `;
                const viewBtn = card.querySelector(".view-product-btn");
                viewBtn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    showProductDetail(product.id);
                });
                productsGrid.appendChild(card);
            });
        } catch (error) {
            console.error("Error loading products:", error);
            productsGrid.innerHTML = '<div class="loader">Error loading products. Check Firestore rules and network.</div>';
        }
    }

    // Show detail view for a specific product ID
    async function showProductDetail(productId) {
        currentProductId = productId;
        const docRef = doc(db, "products", productId);
        const docSnap = await getDoc(docRef);
        if (!docSnap.exists()) {
            alert("Product not found");
            return;
        }
        const product = { id: docSnap.id, ...docSnap.data() };
        renderProductDetail(product);
        // Switch views
        listingView.classList.remove("active");
        listingView.style.display = "none";
        detailView.classList.add("active");
        detailView.style.display = "block";
        backBtn.style.display = "inline-block";
        window.scrollTo(0, 0);
    }

    function renderProductDetail(product) {
        const container = document.getElementById("detailContent");
        // Prepare variants
        let variants = product.variants || [];
        if (variants.length === 0 && product.price && product.mrp) {
            variants = [{ weight: "Standard", price: product.price, mrp: product.mrp }];
        }
        const images = product.images && product.images.length ? product.images : ["https://picsum.photos/id/108/700/550"];
        const currentVariant = variants[0];
        const discountPercent = Math.round(((currentVariant.mrp - currentVariant.price) / currentVariant.mrp) * 100);
        const rating = product.rating || 4.5;
        const fullStars = Math.floor(rating);
        const halfStar = rating % 1 >= 0.5 ? "½" : "";
        const starString = "★".repeat(fullStars) + halfStar + "☆".repeat(5 - fullStars - (halfStar ? 1 : 0));

        container.innerHTML = `
            <div class="detail-grid">
                <div class="gallery" id="detailGallery">
                    <div class="thumb-carousel-wrapper">
                        <button class="arrow-btn" id="detailThumbPrev"><i class="fas fa-chevron-up"></i></button>
                        <div class="thumb-list-container"><div class="thumb-list" id="detailThumbList"></div></div>
                        <button class="arrow-btn" id="detailThumbNext"><i class="fas fa-chevron-down"></i></button>
                    </div>
                    <div class="main-img" id="detailMainImage"><img id="detailMainImg" src="${images[0]}"></div>
                    <div class="mobile-dots" id="detailMobileDots"></div>
                </div>
                <div class="product-info">
                    <h1 class="product-name">${product.name}</h1>
                    <div class="rating"><span class="stars">${starString}</span><span class="rating-value">${rating}</span><span class="reviews-count">(${product.reviewsCount || 1284} reviews)</span></div>
                    <div class="price-section"><span class="current-price" id="detailSellPrice">₹${currentVariant.price}</span><span class="mrp" id="detailMrpPrice">₹${currentVariant.mrp}</span><span class="discount-badge" id="detailDiscount">${discountPercent}% OFF</span></div>
                    <div class="quantity-selector"><span class="qty-label">Quantity:</span><div class="qty-control"><button class="qty-btn" id="detailDecQty">−</button><span class="qty-num" id="detailQtyValue">1</span><button class="qty-btn" id="detailIncQty">+</button></div></div>
                    <div class="variants-title">🍯 Choose Size & Weight :</div>
                    <div class="variants-grid" id="detailVariantsContainer"></div>
                    <div class="action-buttons-row"><button class="btn-cart" id="detailAddToCart"><i class="fas fa-shopping-cart"></i> Add to Cart</button><button class="btn-wishlist" id="detailWishlist"><i class="far fa-heart"></i> Wishlist</button></div>
                    <button class="btn-buynow" id="detailBuyNow"><i class="fas fa-bolt"></i> Buy Now</button>
                    <div class="red-icons"><div class="icon-item"><i class="fas fa-truck"></i><span>Fast Shipping</span></div><div class="icon-item"><i class="fas fa-leaf"></i><span>100% Natural</span></div><div class="icon-item"><i class="fas fa-undo-alt"></i><span>Easy Returns</span></div><div class="icon-item"><i class="fas fa-medal"></i><span>Authentic</span></div><div class="icon-item"><i class="fas fa-shield-alt"></i><span>Safe Pack</span></div></div>
                    <div class="shipping-refund"><i class="fas fa-shipping-fast"></i> <strong>Shipping:</strong> Dispatched in 24h | Free above ₹499<br><i class="fas fa-exchange-alt"></i> <strong>Return/Refund:</strong> 7-day replacement</div>
                    <div class="desc"><strong>📖 Description:</strong> ${product.description || "Authentic homemade pickle made with traditional spices. No preservatives, pure taste."}</div>
                </div>
            </div>
            <div class="related-section"><div class="section-title">✨ More from ${product.category || 'this'} category</div><div class="related-grid" id="relatedProductsGrid"></div></div>
        `;

        // ---------- Gallery with thumbs / swipe ----------
        let activeIndex = 0;
        let thumbStart = 0;
        const visibleThumbCount = 3;
        const thumbListDiv = document.getElementById("detailThumbList");
        const mainImgEl = document.getElementById("detailMainImg");
        const mobileDotsDiv = document.getElementById("detailMobileDots");
        const prevBtn = document.getElementById("detailThumbPrev");
        const nextBtn = document.getElementById("detailThumbNext");

        function renderThumbs() {
            thumbListDiv.innerHTML = "";
            const end = Math.min(thumbStart + visibleThumbCount, images.length);
            for (let i = thumbStart; i < end; i++) {
                const div = document.createElement("div");
                div.className = "thumb";
                if (i === activeIndex) div.classList.add("active-thumb");
                const img = document.createElement("img");
                img.src = images[i];
                div.appendChild(img);
                div.onclick = () => setActiveImage(i);
                thumbListDiv.appendChild(div);
            }
            if (prevBtn && nextBtn && window.innerWidth >= 1024) {
                prevBtn.disabled = thumbStart <= 0;
                nextBtn.disabled = thumbStart + visibleThumbCount >= images.length;
            }
        }

        function setActiveImage(idx) {
            if (idx < 0) idx = images.length - 1;
            if (idx >= images.length) idx = 0;
            activeIndex = idx;
            mainImgEl.src = images[activeIndex];
            if (window.innerWidth >= 1024) {
                if (activeIndex < thumbStart) thumbStart = activeIndex;
                else if (activeIndex >= thumbStart + visibleThumbCount) thumbStart = activeIndex - visibleThumbCount + 1;
                if (thumbStart < 0) thumbStart = 0;
                renderThumbs();
            } else {
                updateMobileDots();
            }
        }

        function updateMobileDots() {
            mobileDotsDiv.innerHTML = "";
            for (let i = 0; i < images.length; i++) {
                const dot = document.createElement("button");
                dot.classList.add("dot");
                if (i === activeIndex) dot.classList.add("active");
                dot.onclick = () => setActiveImage(i);
                mobileDotsDiv.appendChild(dot);
            }
        }

        if (prevBtn && nextBtn) {
            prevBtn.onclick = () => {
                if (thumbStart > 0) {
                    thumbStart--;
                    renderThumbs();
                }
            };
            nextBtn.onclick = () => {
                if (thumbStart + visibleThumbCount < images.length) {
                    thumbStart++;
                    renderThumbs();
                }
            };
        }
        renderThumbs();
        if (window.innerWidth < 1024) updateMobileDots();

        // Handle resize to switch between desktop thumbs and mobile dots
        const resizeHandler = () => {
            if (window.innerWidth >= 1024) {
                renderThumbs();
                mobileDotsDiv.style.display = "none";
            } else {
                mobileDotsDiv.style.display = "flex";
                updateMobileDots();
            }
        };
        window.addEventListener("resize", resizeHandler);

        // ---------- Variants logic ----------
        let selectedVariant = { ...currentVariant };
        let quantity = 1;
        const variantsContainer = document.getElementById("detailVariantsContainer");
        const sellSpan = document.getElementById("detailSellPrice");
        const mrpSpan = document.getElementById("detailMrpPrice");
        const discountSpan = document.getElementById("detailDiscount");
        const qtySpan = document.getElementById("detailQtyValue");

        function updatePriceAndDiscount() {
            sellSpan.innerText = `₹${selectedVariant.price}`;
            mrpSpan.innerText = `₹${selectedVariant.mrp}`;
            const disc = Math.round(((selectedVariant.mrp - selectedVariant.price) / selectedVariant.mrp) * 100);
            discountSpan.innerText = `${disc}% OFF`;
        }

        function renderVariants() {
            variantsContainer.innerHTML = "";
            variants.forEach(v => {
                const card = document.createElement("div");
                card.className = "variant-card";
                if (selectedVariant.weight === v.weight) card.classList.add("active-variant");
                card.innerHTML = `
                    <div class="variant-weight">${v.weight}</div>
                    <div class="variant-price-details">
                        <span class="variant-price">₹${v.price}</span>
                        <span class="variant-mrp">₹${v.mrp}</span>
                        <span class="variant-discount">${Math.round(((v.mrp - v.price) / v.mrp) * 100)}% off</span>
                    </div>
                `;
                card.onclick = () => {
                    selectedVariant = v;
                    updatePriceAndDiscount();
                    renderVariants();
                };
                variantsContainer.appendChild(card);
            });
        }

        renderVariants();
        updatePriceAndDiscount();

        // Quantity buttons
        document.getElementById("detailIncQty").onclick = () => {
            if (quantity < 15) {
                quantity++;
                qtySpan.innerText = quantity;
            }
        };
        document.getElementById("detailDecQty").onclick = () => {
            if (quantity > 1) {
                quantity--;
                qtySpan.innerText = quantity;
            }
        };

        // Action buttons (demo alerts)
        document.getElementById("detailAddToCart").onclick = () => alert(`🛒 Added ${quantity} x ${selectedVariant.weight} ${product.name} to cart`);
        document.getElementById("detailWishlist").onclick = () => alert(`❤️ ${product.name} added to wishlist`);
        document.getElementById("detailBuyNow").onclick = () => alert(`⚡ Proceeding to checkout: ${quantity} x ${selectedVariant.weight}`);

        // Load related products based on category
        loadRelatedProducts(product.category || product.name.split(' ')[0], product.id);
    }

    async function loadRelatedProducts(category, excludeId) {
        const relatedGrid = document.getElementById("relatedProductsGrid");
        relatedGrid.innerHTML = '<div class="loader">Loading related pickles...</div>';
        try {
            const q = query(collection(db, "products"), where("category", "==", category), limit(6));
            const snap = await getDocs(q);
            const related = [];
            snap.forEach(doc => {
                if (doc.id !== excludeId) related.push({ id: doc.id, ...doc.data() });
            });
            if (related.length === 0) {
                relatedGrid.innerHTML = '<div style="text-align:center; padding:20px;">No related products found.</div>';
                return;
            }
            relatedGrid.innerHTML = "";
            related.forEach(prod => {
                const card = document.createElement("div");
                card.className = "related-card";
                const firstImg = prod.images?.[0] || "https://picsum.photos/id/108/300/200";
                const price = prod.variants?.[0]?.price || prod.price || 0;
                const mrp = prod.variants?.[0]?.mrp || prod.mrp || 0;
                const discount = Math.round(((mrp - price) / mrp) * 100);
                card.innerHTML = `
                    <div class="discount-tag">${discount}% OFF</div>
                    <img class="related-img" src="${firstImg}">
                    <div class="related-info">
                        <div class="related-name">${prod.name}</div>
                        <div class="related-price"><span class="rel-current">₹${price}</span><span class="rel-mrp">₹${mrp}</span></div>
                        <button class="view-btn" data-id="${prod.id}">View Product →</button>
                    </div>
                `;
                const btn = card.querySelector(".view-btn");
                btn.onclick = () => showProductDetail(prod.id);
                relatedGrid.appendChild(card);
            });
        } catch (err) {
            console.error(err);
            relatedGrid.innerHTML = '<div class="loader">Error loading related products</div>';
        }
    }

    // Back button handler
    backBtn.onclick = () => {
        listingView.classList.add("active");
        listingView.style.display = "block";
        detailView.classList.remove("active");
        detailView.style.display = "none";
        backBtn.style.display = "none";
        window.scrollTo(0, 0);
    };

    // Initial load
    loadAllProducts();
</script>
</body>
</html>
