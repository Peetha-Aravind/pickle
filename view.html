<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Product View – Happy NonVeg Pickles</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Boxicons -->
  <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #fffaf3;
      color: #2c1a0e;
      overflow-x: hidden;
    }

    /* ---------- ENHANCED NAVBAR (identical to landing page) ---------- */
    .navbar {
      background: white;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 0.75rem 1.2rem;
      font-family: 'Inter', sans-serif;
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .left-group {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .hamburger {
      background: none;
      border: none;
      font-size: 1.8rem;
      color: #4e3622;
      cursor: pointer;
      display: none;
      padding: 0.2rem;
    }

    .logo-area {
      display: flex;
      align-items: center;
      text-decoration: none;
    }
    .logo-desktop {
      display: block;
      height: 50px;
      width: auto;
    }
    .logo-mobile {
      display: none;
      height: 40px;
      width: auto;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .nav-links a {
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      color: #4a3220;
      transition: color 0.2s;
    }
    .nav-links a:hover {
      color: #c94f2c;
    }

    .search-wrapper {
      flex: 1;
      max-width: 300px;
      min-width: 180px;
    }
    .search-bar {
      display: flex;
      align-items: center;
      background: #f5efe8;
      border-radius: 60px;
      padding: 0.5rem 1rem;
      border: 1px solid #e2d6ca;
      transition: all 0.2s;
    }
    .search-bar:focus-within {
      border-color: #c94f2c;
      background: white;
      box-shadow: 0 0 0 3px rgba(201, 79, 44, 0.15);
    }
    .search-bar i {
      color: #b28b65;
      font-size: 1.1rem;
    }
    .search-bar input {
      border: none;
      background: transparent;
      padding: 0.3rem 0.8rem;
      width: 100%;
      font-size: 0.9rem;
      outline: none;
      font-family: inherit;
    }

    .icon-group {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .icon-btn {
      background: none;
      border: none;
      font-size: 1.6rem;
      color: #4e3622;
      cursor: pointer;
      transition: transform 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      position: relative;
    }
    .icon-btn:hover {
      color: #c94f2c;
      transform: translateY(-2px);
    }

    /* Popup styles */
    .popup {
      position: absolute;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      width: 280px;
      z-index: 1100;
      display: none;
      overflow: hidden;
      border: 1px solid #f0e2d4;
      transform: translateX(-50%);
      left: 50%;
    }
    .popup-header {
      padding: 12px 16px;
      font-weight: 700;
      border-bottom: 1px solid #f0e2d4;
      background: #fffaf5;
    }
    .popup-item {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #f3e9e0;
      cursor: pointer;
      transition: background 0.1s;
    }
    .popup-item:last-child { border-bottom: none; }
    .popup-item:hover { background: #fef7f0; }
    .cart-item-img {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: #f5efe8;
      overflow: hidden;
    }
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-details { flex: 1; font-size: 0.85rem; }
    .cart-item-name { font-weight: 600; }
    .cart-item-price { color: #c94f2c; }
    .empty-cart { padding: 20px; text-align: center; color: #b79b7c; }
    .profile-option i { width: 20px; font-size: 1.2rem; }
    .signout-btn { color: #c94f2c; }
    .cart-qty-btn, .cart-remove { cursor: pointer; }

    .mobile-menu {
      display: none;
      flex-direction: column;
      background: white;
      padding: 1rem 1.5rem;
      border-top: 1px solid #f0e2d4;
      margin-top: 0.8rem;
      gap: 1rem;
    }
    .mobile-menu a {
      text-decoration: none;
      font-weight: 600;
      color: #4a3220;
      padding: 0.5rem 0;
      border-bottom: 1px solid #f3e9e0;
    }
    .mobile-menu a:last-child { border-bottom: none; }
    .mobile-menu.show { display: flex; }

    /* ---------- VIEW PAGE SPECIFIC STYLES ---------- */
    :root {
      --rust: #C0392B;
      --rust-dark: #962d22;
      --rust-light: #f5e9e7;
      --ink: #1C1009;
      --ash: #6b5b4e;
      --border: rgba(28,16,9,0.1);
      --shadow-sm: 0 2px 8px rgba(28,16,9,0.08);
      --shadow-md: 0 8px 32px rgba(28,16,9,0.12);
      --r-card: 16px;
      --r-pill: 999px;
      --ff-body: 'DM Sans', sans-serif;
      --nav-h: 70px;
    }

    .product-view {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 5vw;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
    }
    .product-gallery img {
      width: 100%;
      border-radius: var(--r-card);
      box-shadow: var(--shadow-sm);
    }
    .product-info h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 12px;
    }
    .product-price {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--rust);
      margin-bottom: 16px;
    }
    .product-description {
      color: var(--ash);
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .variant-selector {
      margin-bottom: 24px;
    }
    .variant-label {
      font-weight: 600;
      margin-bottom: 8px;
    }
    .variant-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .variant-btn {
      background: white;
      border: 2px solid var(--border);
      border-radius: 40px;
      padding: 8px 20px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .variant-btn.active {
      border-color: var(--rust);
      background: var(--rust-light);
      color: var(--rust);
    }
    .quantity-selector {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }
    .quantity-btn {
      background: #f0e2d4;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
    }
    .quantity-input {
      width: 60px;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
    }
    .add-to-cart-btn {
      background: var(--rust);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      max-width: 250px;
    }
    .add-to-cart-btn:hover {
      background: var(--rust-dark);
      transform: translateY(-2px);
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--ash);
      text-decoration: none;
    }
    .back-link:hover {
      color: var(--rust);
    }
    .loading, .error {
      text-align: center;
      padding: 60px;
      font-size: 1.2rem;
    }

    @media (max-width: 800px) {
      .product-view {
        grid-template-columns: 1fr;
        gap: 32px;
      }
    }
    @media (max-width: 880px) {
      .navbar { padding: 0.75rem 1rem; }
      .nav-links { display: none; }
      .hamburger { display: block; }
      .logo-desktop { display: none; }
      .logo-mobile { display: block; }
      .search-wrapper { max-width: 220px; }
      .icon-group { gap: 1rem; }
    }
    @media (max-width: 640px) {
      .nav-container { flex-wrap: wrap; }
      .search-wrapper { order: 3; max-width: 100%; width: 100%; margin-top: 0.6rem; }
      .icon-group { margin-left: auto; }
      .left-group { flex: 1; }
    }
  </style>
</head>
<body>

    <div class="left-group">

<!-- ===================== PRODUCT VIEW CONTENT ===================== -->
<main id="productViewRoot">
  <div class="loading">Loading product...</div>
</main>

<script>
  // ---------- CART & POPUP MANAGEMENT (same as landing page) ----------
  let cart = [];
  const CART_KEY = 'happyPicklesCart';

  function loadCart() {
    const stored = localStorage.getItem(CART_KEY);
    cart = stored ? JSON.parse(stored) : [];
  }
  function saveCart() {
    localStorage.setItem(CART_KEY, JSON.stringify(cart));
  }

  function addToCart(product) {
    const existing = cart.find(item => item.id === product.id);
    if (existing) existing.quantity += product.quantity;
    else cart.push({ ...product });
    saveCart();
    renderCartPopup();
  }

  function removeFromCart(productId) {
    cart = cart.filter(item => item.id !== productId);
    saveCart();
    renderCartPopup();
  }

  function updateQuantity(productId, delta) {
    const item = cart.find(i => i.id === productId);
    if (item) {
      item.quantity += delta;
      if (item.quantity <= 0) removeFromCart(productId);
      else { saveCart(); renderCartPopup(); }
    }
  }

  function renderCartPopup() {
    const container = document.getElementById('cartPopupContent');
    if (!container) return;
    if (cart.length === 0) {
      container.innerHTML = '<div class="empty-cart">Your cart is empty.</div>';
      return;
    }
    let html = '';
    cart.forEach(item => {
      html += `
        <div class="popup-item" style="flex-wrap: wrap;">
          <div class="cart-item-img">
            <img src="${item.image}" alt="${item.name}" onerror="this.src='https://placehold.co/40x40/f5e9e7/c0392b?text='">
          </div>
          <div class="cart-item-details">
            <div class="cart-item-name">${escapeHtml(item.name)}</div>
            <div class="cart-item-price">₹${Math.round(item.price)}</div>
            <div style="display:flex; gap:8px; margin-top:6px;">
              <button class="cart-qty-btn" data-id="${item.id}" data-delta="-1">-</button>
              <span>${item.quantity}</span>
              <button class="cart-qty-btn" data-id="${item.id}" data-delta="1">+</button>
              <button class="cart-remove" data-id="${item.id}">Remove</button>
            </div>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
    document.querySelectorAll('.cart-qty-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        const delta = parseInt(btn.getAttribute('data-delta'));
        updateQuantity(id, delta);
      });
    });
    document.querySelectorAll('.cart-remove').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        removeFromCart(id);
      });
    });
  }

  function handleProfileAction(action) {
    if (action === 'profile') alert("My Profile – coming soon");
    else if (action === 'orders') alert("My Orders – coming soon");
    else if (action === 'signout') {
      alert("Signed out successfully!");
      window.location.href = 'index.html';
    }
  }

  let activePopup = null;
  function positionPopup(popupElement, buttonElement) {
    const rect = buttonElement.getBoundingClientRect();
    const popupWidth = popupElement.offsetWidth;
    let left = rect.left + (rect.width / 2) - (popupWidth / 2);
    left = Math.min(Math.max(left, 10), window.innerWidth - popupWidth - 10);
    popupElement.style.left = left + 'px';
    popupElement.style.top = (rect.bottom + window.scrollY + 8) + 'px';
  }
  function showPopup(popupId, buttonElement) {
    if (activePopup) activePopup.style.display = 'none';
    const popup = document.getElementById(popupId);
    if (!popup) return;
    if (activePopup === popup && popup.style.display === 'block') {
      popup.style.display = 'none';
      activePopup = null;
      return;
    }
    positionPopup(popup, buttonElement);
    popup.style.display = 'block';
    activePopup = popup;
  }
  function closeAllPopups() {
    if (activePopup) {
      activePopup.style.display = 'none';
      activePopup = null;
    }
  }

  // Initialize popup events
  document.addEventListener('DOMContentLoaded', () => {
    loadCart();
    renderCartPopup();

    const cartBtn = document.getElementById('cartIconBtn');
    if (cartBtn) cartBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      closeAllPopups();
      showPopup('cartPopup', cartBtn);
      renderCartPopup();
    });
    const profileBtn = document.getElementById('profileIconBtn');
    if (profileBtn) profileBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      closeAllPopups();
      showPopup('profilePopup', profileBtn);
    });
    const profilePopup = document.getElementById('profilePopup');
    if (profilePopup) profilePopup.addEventListener('click', (e) => {
      const option = e.target.closest('.profile-option');
      if (option) {
        handleProfileAction(option.getAttribute('data-action'));
        closeAllPopups();
      }
    });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.icon-btn') && !e.target.closest('.popup')) closeAllPopups();
    });
    window.addEventListener('resize', () => {
      if (activePopup) {
        let btnId = activePopup.id === 'cartPopup' ? 'cartIconBtn' : 'profileIconBtn';
        const btn = document.getElementById(btnId);
        if (btn) positionPopup(activePopup, btn);
      }
    });
  });

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }
</script>

<!-- Firebase & product detail logic -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM",
    authDomain: "pickle-fdc54.firebaseapp.com",
    projectId: "pickle-fdc54",
    storageBucket: "pickle-fdc54.firebasestorage.app",
    messagingSenderId: "650348710985",
    appId: "1:650348710985:web:b8eedb551a79b536578398",
    measurementId: "G-B40NG5KQDL"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function fmt(price) { return `₹${Math.round(Number(price))}`; }

  async function loadProduct() {
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    if (!productId) {
      document.getElementById('productViewRoot').innerHTML = '<div class="error">No product ID specified.</div>';
      return;
    }
    try {
      const prodRef = doc(db, "products", productId);
      const prodSnap = await getDoc(prodRef);
      if (!prodSnap.exists()) {
        document.getElementById('productViewRoot').innerHTML = '<div class="error">Product not found.</div>';
        return;
      }
      const product = { id: prodSnap.id, ...prodSnap.data() };
      renderProductPage(product);
    } catch (err) {
      console.error(err);
      document.getElementById('productViewRoot').innerHTML = '<div class="error">Failed to load product. Please try again.</div>';
    }
  }

  let currentVariant = null;
  let quantity = 1;

  function renderProductPage(product) {
    const variants = product.variants || [];
    let selectedVariant = variants.length > 0 ? variants[0] : null;
    currentVariant = selectedVariant;
    const price = selectedVariant ? selectedVariant.price : (product.price || 0);
    const image = product.mainImage || product.image || "https://placehold.co/600x600/f5e9e7/c0392b?text=Pickle";

    const variantHtml = variants.length > 0 ? `
      <div class="variant-selector">
        <div class="variant-label">Select Size:</div>
        <div class="variant-buttons" id="variantButtons">
          ${variants.map((v, idx) => `<button class="variant-btn ${idx === 0 ? 'active' : ''}" data-weight="${v.weight}" data-price="${v.price}">${v.weight} - ${fmt(v.price)}</button>`).join('')}
        </div>
      </div>
    ` : '';

    const html = `
      <div class="product-view">
        <div class="product-gallery">
          <img src="${image}" alt="${product.name}" onerror="this.src='https://placehold.co/600x600/f5e9e7/c0392b?text=Pickle'">
        </div>
        <div class="product-info">
          <h1>${escapeHtml(product.longName || product.name)}</h1>
          <div class="product-price" id="productPrice">${fmt(price)}</div>
          <div class="product-description">${escapeHtml(product.description || "A traditional pickle made with authentic spices and love. Perfect with any meal.")}</div>
          ${variantHtml}
          <div class="quantity-selector">
            <button class="quantity-btn" id="decrQty">-</button>
            <input type="number" id="qtyInput" class="quantity-input" value="${quantity}" min="1" step="1">
            <button class="quantity-btn" id="incrQty">+</button>
          </div>
          <button class="add-to-cart-btn" id="addToCartBtn">Add to Cart</button>
          <a href="index.html" class="back-link">← Back to Shop</a>
        </div>
      </div>
    `;
    const root = document.getElementById('productViewRoot');
    root.innerHTML = html;

    // Variant button logic
    if (variants.length > 0) {
      const variantBtns = document.querySelectorAll('.variant-btn');
      variantBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          variantBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const weight = btn.getAttribute('data-weight');
          const newPrice = parseFloat(btn.getAttribute('data-price'));
          currentVariant = variants.find(v => v.weight === weight);
          document.getElementById('productPrice').innerText = fmt(newPrice);
        });
      });
    }

    // Quantity controls
    const qtyInput = document.getElementById('qtyInput');
    const decrBtn = document.getElementById('decrQty');
    const incrBtn = document.getElementById('incrQty');
    const updateQty = () => {
      let val = parseInt(qtyInput.value);
      if (isNaN(val) || val < 1) val = 1;
      quantity = val;
      qtyInput.value = quantity;
    };
    decrBtn.addEventListener('click', () => {
      if (quantity > 1) quantity--;
      qtyInput.value = quantity;
    });
    incrBtn.addEventListener('click', () => {
      quantity++;
      qtyInput.value = quantity;
    });
    qtyInput.addEventListener('change', updateQty);

    // Add to Cart
    const addBtn = document.getElementById('addToCartBtn');
    addBtn.addEventListener('click', () => {
      const finalPrice = currentVariant ? currentVariant.price : (product.price || 0);
      const variantName = currentVariant ? currentVariant.weight : 'Standard';
      const cartItem = {
        id: product.id + (currentVariant ? `_${currentVariant.weight}` : ''),
        name: `${product.name} (${variantName})`,
        price: finalPrice,
        quantity: quantity,
        image: image,
        variant: variantName
      };
      window.addToCartGlobal(cartItem);
      addBtn.innerText = '✓ Added!';
      setTimeout(() => { addBtn.innerText = 'Add to Cart'; }, 800);
    });
  }

  // Expose addToCart from the global scope
  window.addToCartGlobal = (product) => {
    // This function is defined in the earlier script (cart management)
    const existing = cart.find(item => item.id === product.id);
    if (existing) existing.quantity += product.quantity;
    else cart.push({ ...product });
    saveCart();
    renderCartPopup();
  };

  loadProduct();
</script>

<!-- Navbar hamburger toggle -->
<script>
  const hamburger = document.getElementById('hamburgerBtn');
  const mobileMenu = document.getElementById('mobileMenu');
  if (hamburger && mobileMenu) {
    hamburger.addEventListener('click', () => {
      mobileMenu.classList.toggle('show');
    });
    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.remove('show');
      });
    });
  }
</script>

</body>
</html>
