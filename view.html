<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pickle Details – Happy NonVeg Pickles</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
    <style>
        /* ========== GLOBAL & VIEW PAGE STYLES ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #fefaf5;
            color: #1e1e2a;
            line-height: 1.4;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
        }
        .product-row {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            margin-bottom: 3rem;
        }
        .image-column {
            flex: 1.2;
            position: sticky;
            top: 100px;
            align-self: flex-start;
            transition: all 0.2s;
        }
        .image-column.stop-sticky {
            position: relative;
            top: 0;
        }
        .desktop-gallery {
            display: flex;
            gap: 1.2rem;
            flex-direction: row;
        }
        .thumb-vertical {
            width: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }
        .thumb-scroll-area {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-height: 380px;
            overflow-y: auto;
            scrollbar-width: thin;
            padding-right: 4px;
        }
        .thumb-scroll-area img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 14px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .thumb-scroll-area img.active-thumb {
            border-color: #c41e2e;
            box-shadow: 0 4px 10px rgba(196,30,46,0.2);
        }
        .arrow-btn {
            background: #f0ede8;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
            color: #a3222f;
            transition: 0.2s;
        }
        .arrow-btn:hover {
            background: #e2d9d0;
        }
        .main-img-box {
            flex: 1;
            background: #fff9f2;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 460px;
        }
        .main-img-box img {
            width: 100%;
            height: auto;
            max-height: 520px;
            object-fit: contain;
        }
        .details-column {
            flex: 1.2;
        }
        .product-name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .stars i {
            color: #ffb81c;
            margin-right: 2px;
        }
        .rating-value {
            font-weight: 600;
        }
        .price-block {
            margin: 0.75rem 0;
        }
        .current-price {
            font-size: 1.8rem;
            font-weight: 800;
            color: #c41e2e;
        }
        .mrp {
            font-size: 1rem;
            color: #6c5e53;
            text-decoration: line-through;
            margin-left: 0.75rem;
        }
        .discount-badge {
            background: #fee2e2;
            color: #b91c1c;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-left: 0.75rem;
        }
        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.2rem 0;
            background: #f3efea;
            width: fit-content;
            padding: 0.5rem 1rem;
            border-radius: 60px;
        }
        .quantity-selector button {
            background: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .quantity-selector span {
            font-weight: 600;
            font-size: 1.2rem;
            min-width: 40px;
            text-align: center;
        }
        .variants-title {
            margin: 1rem 0 0.8rem;
            font-weight: 600;
        }
        .variants-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 1.8rem;
        }
        .variant-card {
            border: 2px solid #e2cfbf;
            border-radius: 18px;
            padding: 10px 8px;
            background: white;
            transition: all 0.2s;
            cursor: pointer;
            text-align: left;
        }
        .variant-card:hover {
            border-color: #c41e2e;
            transform: translateY(-2px);
        }
        .variant-card.active-variant {
            border-color: #c41e2e;
            background: #fff1ef;
            box-shadow: 0 4px 12px rgba(196,30,46,0.15);
        }
        .variant-weight {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 6px;
            display: inline-block;
            background: #f7ede5;
            padding: 2px 10px;
            border-radius: 30px;
        }
        .variant-price {
            font-weight: 800;
            color: #b82b2b;
            font-size: 1.1rem;
        }
        .variant-mrp {
            font-size: 0.75rem;
            color: #847468;
            text-decoration: line-through;
            margin-left: 5px;
        }
        .variant-disc {
            font-size: 0.7rem;
            background: #ffe2dd;
            display: inline-block;
            padding: 2px 6px;
            border-radius: 20px;
            margin-left: 6px;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 20px 0 12px;
            flex-wrap: wrap;
        }
        .cart-btn, .wishlist-btn, .buy-btn {
            flex: 1;
            padding: 12px 0;
            border-radius: 40px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            font-size: 1rem;
        }
        .cart-btn {
            background: #1e1e2a;
            color: white;
        }
        .cart-btn:hover {
            background: #2d2d3a;
            transform: scale(0.98);
        }
        .wishlist-btn {
            background: white;
            color: #c41e2e;
            border: 1px solid #c41e2e;
        }
        .wishlist-btn:hover {
            background: #c41e2e;
            color: white;
        }
        .buy-btn {
            background: #c41e2e;
            color: white;
            width: 100%;
            margin-top: 8px;
        }
        .buy-btn:hover {
            background: #a01826;
            transform: scale(0.98);
        }
        .demo-icons {

            flex-wrap: wrap;
            gap: 1rem;
            justify-content: space-between;
            margin: 1.5rem 0;
            color: #c41e2e;

        .demo-icons i {
            font-size: 1.6rem;

        .demo-icons span {
            font-size: 0.8rem;
            font-weight: 500;
            color: #2c241e;
        }
        .ship-refund, .description {
            margin: 1rem 0;
            background: #fff8f0;
            padding: 1rem;
            border-radius: 20px;
        }
        .related-title {
            font-size: 1.6rem;
            margin: 2rem 0 1rem;
        }
        .related-scroll {
            display: flex;
            gap: 1.2rem;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding-bottom: 1rem;
        }
        .related-card {
            flex: 0 0 240px;
            background: white;
            border-radius: 24px;
            padding: 0.8rem;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            scroll-snap-align: start;
            position: relative;
        }
        .discount-tag {
            position: absolute;
            top: 8px;
            left: 8px;
            background: #c41e2e;
            color: white;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: bold;
        }
        .related-img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 18px;
        }
        .related-name {
            font-weight: 700;
            margin: 8px 0 4px;
        }
        .related-price {
            font-weight: 800;
            color: #bb2e3e;
        }
        .related-mrp {
            font-size: 0.7rem;
            text-decoration: line-through;
            color: gray;
        }
        .view-product-btn {
            background: #f3ede7;
            border: none;
            padding: 6px;
            width: 100%;
            border-radius: 40px;
            margin-top: 8px;
            font-weight: 500;
            cursor: pointer;
        }
        footer {
            background: #c41e2e;
            color: white;
            text-align: center;
            padding: 1.5rem;
            border-radius: 30px 30px 0 0;
            margin-top: 2rem;
        }
        /* mobile swipe gallery */
        .mobile-swiper {
            display: none;
            margin-bottom: 1.5rem;
        }
        .swiper-container {
            position: relative;
        }
        .swiper-main-img {
            width: 100%;
            border-radius: 28px;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #f9efea;
        }
        .dot-indicators {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #bdb2a6;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }
        .dot.active-dot {
            background: #c41e2e;
            width: 22px;
            border-radius: 10px;
        }
        @media (max-width: 860px) {
            .container {
                padding: 0.8rem;
            }
            .product-row {
                flex-direction: column;
            }
            .image-column {
                position: relative;
                top: 0;
                width: 100%;
            }
            .desktop-gallery {
                display: none;
            }
            .mobile-swiper {
                display: block;
            }
            .variants-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }
            .demo-icons {
                justify-content: center;
                gap: 1rem;
                flex-wrap: wrap;
            }
            .related-scroll {
                gap: 1rem;
            }
            .related-card {
                flex: 0 0 200px;
            }
        }
        @media (min-width: 861px) {
            .mobile-swiper {
                display: none;
            }
        }
        button {
            cursor: pointer;
        }
        .dynamic-effect:active {
            transform: scale(0.96);
        }
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            font-size: 1.2rem;
            color: #c41e2e;
        }

        /* ========== COMBO SECTION STYLES ========== */
        .combo-section {
            background: #fef7e8;
            padding: 0;
            margin: 60px 0 0;
            border-radius: 36px;
        }
        .combo-section .combo-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 40px 0 20px;
        }
        .combo-section .section-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #C0392B;
            margin-bottom: 14px;
        }
        .combo-section .section-label::before {
            content: '';
            width: 28px;
            height: 2px;
            background: #C0392B;
        }
        .combo-section .section-heading {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-weight: 900;
            line-height: 1.15;
            color: #1C1009;
            margin-bottom: 8px;
        }
        .combo-section .section-sub {
            font-size: 15px;
            color: #6b5b4e;
            margin-bottom: 40px;
            max-width: 500px;
        }
        .combo-card-wrapper {
            background: white;
            border-radius: 36px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .combo-card-layout {
            display: flex;
            flex-wrap: wrap;
        }
        .combo-banner-panel {
            flex: 1.2;
            min-width: 260px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            background-color: #2c1a0e;
            min-height: 340px;
        }
        .combo-banner-text {
            position: absolute;
            bottom: 30px;
            left: 24px;
            right: 24px;
            z-index: 2;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .combo-banner-text h3 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 8px;
        }
        .combo-banner-text p {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .combo-picker-panel {
            flex: 2;
            padding: 1.8rem 2rem 2rem;
            background: #fffcf8;
        }
        .combo-picker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            border-bottom: 2px dashed #f0e2d4;
            padding-bottom: 16px;
        }
        .combo-counter-circle {
            background: #C0392B;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 8px 20px rgba(192,57,43,0.3);
            flex-shrink: 0;
        }
        .combo-counter-number {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
        }
        .combo-counter-label {
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .combo-picker-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1C1009;
        }
        .combo-pickle-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin: 1.5rem 0 1rem;
        }
        .combo-pickle-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: white;
            border-radius: 80px;
            padding: 0.5rem 1rem 0.5rem 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #f0e2d4;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }
        .combo-pickle-item:hover {
            background: #fff5ea;
            transform: translateY(-2px);
        }
        .combo-pickle-img-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            overflow: hidden;
            background: #e9ddd0;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 2px solid #fff;
        }
        .combo-pickle-img-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .combo-pickle-info {
            flex: 1;
        }
        .combo-pickle-name {
            font-weight: 700;
            font-size: 1rem;
            color: #1C1009;
            margin-bottom: 4px;
        }
        .combo-pickle-price {
            font-size: 0.8rem;
            font-weight: 600;
            color: #C0392B;
        }
        .combo-pickle-item.selected {
            background: #ffede3;
            border-left: 5px solid #C0392B;
            box-shadow: 0 6px 14px rgba(192,57,43,0.2);
        }
        .combo-pickle-grid.limit-reached .combo-pickle-item:not(.selected) {
            filter: blur(3px);
            opacity: 0.6;
            pointer-events: none;
        }
        .combo-status-msg {
            text-align: right;
            font-size: 0.85rem;
            font-weight: 500;
            color: #C0392B;
            margin: 8px 0 16px;
            min-height: 20px;
        }
        .combo-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 12px;
        }
        .combo-btn {
            border: none;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background .2s, transform .15s;
        }
        .combo-btn-primary {
            background: #C0392B;
            color: white;
        }
        .combo-btn-primary:hover {
            background: #962d22;
            transform: translateY(-2px);
        }
        .combo-btn-secondary {
            background: #1C1009;
            color: white;
        }
        .combo-btn-secondary:hover {
            background: #1f1108;
            transform: translateY(-2px);
        }
        .combo-btn-hidden {
            display: none !important;
        }
        .combo-skeleton-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .combo-skeleton-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: #f0ece7;
            border-radius: 80px;
            padding: 0.5rem 1rem 0.5rem 0.5rem;
            animation: pulse 1.2s infinite;
        }
        .combo-skeleton-img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #ddd2c6;
            flex-shrink: 0;
        }
        .combo-skeleton-txt {
            height: 18px;
            width: 60%;
            background: #ddd2c6;
            border-radius: 20px;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        @media (max-width: 760px) {
            .combo-banner-panel {
                min-height: 220px;
            }
            .combo-pickle-img-circle {
                width: 55px;
                height: 55px;
            }
            .combo-counter-circle {
                width: 65px;
                height: 65px;
            }
            .combo-pickle-grid {
                grid-template-columns: 1fr;
            }
            .combo-section .combo-inner {
                padding: 20px 0;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- PRODUCT VIEW SECTION -->
    <div class="product-row" id="productMainRow">
        <div class="image-column" id="imageColumn">
            <div class="desktop-gallery" id="desktopGallery"></div>
            <div class="mobile-swiper" id="mobileSwiper"></div>
        </div>
        <div class="details-column" id="detailsColumn">
            <div class="loading-spinner" id="viewLoader"><i class="fas fa-spinner fa-pulse"></i> Loading pickle...</div>
            <div id="productDetailsContent" style="display:none;"></div>
        </div>
    </div>

    <!-- RELATED PRODUCTS SECTION (above combo) -->
    <div id="relatedProductsSection" style="display:none;">
        <h2 class="related-title">✨ You may also like ✨</h2>
        <div class="related-scroll" id="relatedScroll"></div>
    </div>

    <!-- COMBO SECTION (below related) -->
    <div class="combo-section" id="comboSection">
        <div class="combo-inner">
            <div class="section-label">Limited Offer</div>
            <h2 class="section-heading">Build Your Combo Box</h2>
            <p class="section-sub">Mix and match your favourites — curate your perfect pickle box at one great price.</p>

            <div class="combo-card-wrapper" id="comboCardWrapper">
                <div class="combo-card-layout">
                    <div class="combo-banner-panel" id="comboBannerPanel" style="background-image: url('https://images.unsplash.com/photo-1604152135912-00a2f9bc68df?q=80&w=1000&auto=format&fit=crop');">
                        <div class="combo-banner-text">
                            <h3 id="comboBannerTitle">Loading…</h3>
                            <p id="comboBannerDesc"></p>
                        </div>
                    </div>

                    <div class="combo-picker-panel">
                        <div class="combo-picker-header">
                            <div class="combo-counter-circle">
                                <span class="combo-counter-number" id="comboSelectedCount">0</span>
                                <span class="combo-counter-label">/ <span id="comboMaxSpan">4</span></span>
                            </div>
                            <div class="combo-picker-title">✨ Pick Your Pickles</div>
                        </div>

                        <div id="comboPickleGridContainer">
                            <div class="combo-skeleton-grid">
                                <div class="combo-skeleton-item"><div class="combo-skeleton-img"></div><div class="combo-skeleton-txt"></div></div>
                                <div class="combo-skeleton-item"><div class="combo-skeleton-img"></div><div class="combo-skeleton-txt"></div></div>
                                <div class="combo-skeleton-item"><div class="combo-skeleton-img"></div><div class="combo-skeleton-txt"></div></div>
                                <div class="combo-skeleton-item"><div class="combo-skeleton-img"></div><div class="combo-skeleton-txt"></div></div>
                            </div>
                        </div>

                        <div class="combo-status-msg" id="comboStatusMsg">Loading combo...</div>

                        <div class="combo-actions">
                            <button class="combo-btn combo-btn-secondary combo-btn-hidden" id="comboBuyNowBtn">Buy Now →</button>
                            <button class="combo-btn combo-btn-primary combo-btn-hidden" id="comboAddToCartBtn">Add to Cart 🛒</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <i class="fas fa-jar"></i> The Real Pickle House — tradition since 1998 | <i class="fas fa-heart"></i> Handmade with love
    </footer>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js"></script>

    // ========== FIREBASE INIT ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM",
        authDomain: "pickle-fdc54.firebaseapp.com",
        projectId: "pickle-fdc54",
        storageBucket: "pickle-fdc54.firebasestorage.app",
        messagingSenderId: "650348710985",
        appId: "1:650348710985:web:b8eedb551a79b536578398",
        measurementId: "G-B40NG5KQDL"
    };
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // ========== PRODUCT VIEW LOGIC ==========
    const loaderDiv = document.getElementById('viewLoader');
    const detailsContainer = document.getElementById('productDetailsContent');
    const relatedSection = document.getElementById('relatedProductsSection');
    const relatedScroll = document.getElementById('relatedScroll');

    let currentProduct = null;
    let allImages = [];
    let currentImageIndex = 0;
    let currentVariant = null;
    let productQuantity = 1;
    let variantList = [];

    function renderStars(rating) {
        const full = Math.floor(rating);
        const half = rating % 1 >= 0.5;
        let html = '';
        for (let i = 0; i < full; i++) html += '<i class="fas fa-star"></i>';
        if (half) html += '<i class="fas fa-star-half-alt"></i>';
        const empty = 5 - full - (half ? 1 : 0);
        for (let i = 0; i < empty; i++) html += '<i class="far fa-star"></i>';
        return html;
    }

    function updatePriceFromVariant() {
        const priceEl = document.getElementById('currentPrice');
        const mrpEl = document.getElementById('mrpText');
        const discountEl = document.getElementById('discountPercent');
        if (priceEl) priceEl.innerText = `₹${currentVariant.price}`;
        if (mrpEl) mrpEl.innerText = `₹${currentVariant.mrp}`;
        let discountVal = Math.round(((currentVariant.mrp - currentVariant.price) / currentVariant.mrp) * 100);
        if (discountEl) discountEl.innerText = `${discountVal}% off`;
    }

    let thumbStartIdx = 0;
    const MAX_THUMBS_VISIBLE = 3;
    function renderThumbnails() {
        const thumbArea = document.getElementById('thumbScrollArea');
        if (!thumbArea) return;
        const total = allImages.length;
        const endIdx = Math.min(thumbStartIdx + MAX_THUMBS_VISIBLE, total);
        const visible = allImages.slice(thumbStartIdx, endIdx);
        thumbArea.innerHTML = '';
        visible.forEach((imgSrc, idx) => {
            const thumbImg = document.createElement('img');
            thumbImg.src = imgSrc;
            thumbImg.classList.toggle('active-thumb', (thumbStartIdx + idx) === currentImageIndex);
            thumbImg.addEventListener('click', () => {
                currentImageIndex = thumbStartIdx + idx;
                updateMainImage();
                renderThumbnails();
                syncMobileDotsAndImage();
            });
            thumbArea.appendChild(thumbImg);
        });
        const upBtn = document.getElementById('thumbUpBtn');
        const downBtn = document.getElementById('thumbDownBtn');
        if (upBtn) upBtn.disabled = thumbStartIdx === 0;
        if (downBtn) downBtn.disabled = endIdx === total;
    }

    function updateMainImage() {
        const mainDesktop = document.getElementById('mainDesktopImg');
        const mobileMain = document.getElementById('mobileMainImg');
        if (mainDesktop && allImages[currentImageIndex]) mainDesktop.src = allImages[currentImageIndex];
        if (mobileMain && allImages[currentImageIndex]) mobileMain.src = allImages[currentImageIndex];
        renderThumbnails();
        syncMobileDots();
    }

    function syncMobileDots() {
        const dots = document.querySelectorAll('.dot');
        dots.forEach((dot, idx) => {
            if (idx === currentImageIndex) dot.classList.add('active-dot');
            else dot.classList.remove('active-dot');
        });
    }
    function syncMobileDotsAndImage() {
        const mobileImg = document.getElementById('mobileMainImg');
        if (mobileImg && allImages[currentImageIndex]) mobileImg.src = allImages[currentImageIndex];
        syncMobileDots();
    }
    function buildMobileDots() {
        const dotContainer = document.getElementById('dotContainer');
        if (!dotContainer) return;
        dotContainer.innerHTML = '';
        allImages.forEach((_, idx) => {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            if (idx === currentImageIndex) dot.classList.add('active-dot');
            dot.addEventListener('click', () => {
                currentImageIndex = idx;
                updateMainImage();
            });
            dotContainer.appendChild(dot);
        });
    }
    function initSwipe() {
        const swiperDiv = document.querySelector('.mobile-swiper');
        if (!swiperDiv) return;
        let touchStartX = 0;
        swiperDiv.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; });
        swiperDiv.addEventListener('touchend', (e) => {
            const endX = e.changedTouches[0].screenX;
            const diff = endX - touchStartX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) { currentImageIndex = (currentImageIndex - 1 + allImages.length) % allImages.length; }
                else { currentImageIndex = (currentImageIndex + 1) % allImages.length; }
                updateMainImage();
                syncMobileDotsAndImage();
            }
        });
    }

    function renderVariants(variants, activeVarId) {
        const grid = document.getElementById('variantsGrid');
        if (!grid) return;
        grid.innerHTML = '';
        variants.forEach(v => {
            const card = document.createElement('div');
            card.className = `variant-card ${activeVarId === v.id ? 'active-variant' : ''}`;
            card.innerHTML = `
                <div class="variant-weight">${escapeHtml(v.weight)}</div>
                <div><span class="variant-price">₹${v.price}</span><span class="variant-mrp">₹${v.mrp}</span><span class="variant-disc">${Math.round(((v.mrp - v.price)/v.mrp)*100)}%</span></div>
            `;
            card.addEventListener('click', () => {
                currentVariant = v;
                updatePriceFromVariant();
                renderVariants(variants, v.id);
            });
            grid.appendChild(card);
        });
    }

    function buildDetailsHTML() {
        if (!currentProduct) return '';
        const prod = currentProduct;
        const firstVar = currentVariant || (prod.variants && prod.variants[0]) || { price: 0, mrp: 0 };
        const discountVal = firstVar.mrp ? Math.round(((firstVar.mrp - firstVar.price) / firstVar.mrp) * 100) : 0;
        return `
            <h1 class="product-name">${escapeHtml(prod.name)}</h1>
            <div class="rating">
                <span class="stars">${renderStars(prod.rating || 4.5)}</span>
                <span class="rating-value">${prod.rating || 4.5} (${prod.reviewCount || 120} reviews)</span>
            </div>
            <div class="price-block">
                <span class="current-price" id="currentPrice">₹${firstVar.price}</span>
                <span class="mrp" id="mrpText">₹${firstVar.mrp}</span>
                <span class="discount-badge" id="discountPercent">${discountVal}% off</span>
            </div>
            <div class="quantity-selector">
                <button id="decrementQty"><i class="fas fa-minus"></i></button>
                <span id="qtyValue">1</span>
                <button id="incrementQty"><i class="fas fa-plus"></i></button>
            </div>
            <div class="variants-title">Choose variant (weight / price)</div>
            <div class="variants-grid" id="variantsGrid"></div>
            <div class="action-buttons">
                <button class="cart-btn dynamic-effect" id="addToCartBtn"><i class="fas fa-shopping-cart"></i> Add to Cart</button>
                <button class="wishlist-btn dynamic-effect" id="wishlistBtn"><i class="far fa-heart"></i> Wishlist</button>
            </div>
            <button class="buy-btn dynamic-effect" id="buyNowBtn"><i class="fas fa-bolt"></i> Buy Now</button>
            <div class="demo-icons">
                <span><i class="fas fa-pepper-hot"></i> <span>Authentic</span></span>
                <span><i class="fas fa-leaf"></i> <span>Natural</span></span>
                <span><i class="fas fa-clock"></i> <span>Fresh</span></span>
                <span><i class="fas fa-truck"></i> <span>Express</span></span>
                <span><i class="fas fa-award"></i> <span>Premium</span></span>
            </div>
            <div class="ship-refund">
                <i class="fas fa-shipping-fast"></i> <strong>Shipping:</strong> Free delivery on orders above ₹499 | <i class="fas fa-undo-alt"></i> <strong>Refund:</strong> 7-day easy replacement
            </div>
            <div class="description" id="descriptionText">
                ${escapeHtml(prod.description || 'Tangy & spicy traditional pickle, handcrafted with farm fresh ingredients.')}
            </div>
        `;
    }

    function attachEventListeners() {
        const decrement = document.getElementById('decrementQty');
        const increment = document.getElementById('incrementQty');
        const qtySpan = document.getElementById('qtyValue');
        if (decrement && increment && qtySpan) {
            decrement.onclick = () => { if (productQuantity > 1) productQuantity--; qtySpan.innerText = productQuantity; };
            increment.onclick = () => { productQuantity++; qtySpan.innerText = productQuantity; };
        }
        const addCart = document.getElementById('addToCartBtn');
        if (addCart) addCart.onclick = () => alert(`🛒 Added to cart: ${productQuantity} x ${currentVariant?.weight || ''} ${currentProduct.name} at ₹${currentVariant?.price}`);
        const wishlist = document.getElementById('wishlistBtn');
        if (wishlist) wishlist.onclick = () => alert(`❤️ ${currentProduct.name} added to wishlist!`);
        const buyNow = document.getElementById('buyNowBtn');
        if (buyNow) buyNow.onclick = () => alert(`⚡ Proceeding to checkout: ${productQuantity} x ${currentVariant?.weight} ${currentProduct.name}`);
    }

    function buildGallery() {
        const desktopGalleryDiv = document.getElementById('desktopGallery');
        const mobileSwiperDiv = document.getElementById('mobileSwiper');
        if (!desktopGalleryDiv || !mobileSwiperDiv) return;
        desktopGalleryDiv.innerHTML = `
            <div class="thumb-vertical">
                <button class="arrow-btn" id="thumbUpBtn"><i class="fas fa-chevron-up"></i></button>
                <div class="thumb-scroll-area" id="thumbScrollArea"></div>
                <button class="arrow-btn" id="thumbDownBtn"><i class="fas fa-chevron-down"></i></button>
            </div>
            <div class="main-img-box">
                <img id="mainDesktopImg" alt="main pickle">
            </div>
        `;
        mobileSwiperDiv.innerHTML = `
            <div class="swiper-container">
                <img id="mobileMainImg" class="swiper-main-img" alt="main pickle">
                <div class="dot-indicators" id="dotContainer"></div>
            </div>
        `;
        const upBtn = document.getElementById('thumbUpBtn');
        const downBtn = document.getElementById('thumbDownBtn');
        if (upBtn && downBtn) {
            upBtn.addEventListener('click', () => { if (thumbStartIdx > 0) thumbStartIdx--; renderThumbnails(); });
            downBtn.addEventListener('click', () => { if (thumbStartIdx + MAX_THUMBS_VISIBLE < allImages.length) thumbStartIdx++; renderThumbnails(); });
        }
        if (allImages.length) {
            const mainDesktop = document.getElementById('mainDesktopImg');
            const mobileMain = document.getElementById('mobileMainImg');
            if (mainDesktop) mainDesktop.src = allImages[0];
            if (mobileMain) mobileMain.src = allImages[0];
        }
        renderThumbnails();
        buildMobileDots();
        initSwipe();
    }

    async function loadRelatedProducts(categoryIdOrName, excludeId) {
        if (!categoryIdOrName) {
            relatedSection.style.display = 'none';
            return;
        }
        try {
            let productIds = null;
            const categoryDocRef = db.collection("categories").doc(categoryIdOrName);
            const catSnap = await categoryDocRef.get();
            if (catSnap.exists && catSnap.data().productIds && Array.isArray(catSnap.data().productIds)) {
                productIds = catSnap.data().productIds;
            } else {
                const q = db.collection("products").where("category", "==", categoryIdOrName);
                const snap = await q.get();
                productIds = snap.docs.map(d => d.id);
            }
            if (!productIds || productIds.length === 0) {
                relatedSection.style.display = 'none';
                return;
            }
            const products = [];
            for (const pid of productIds) {
                if (pid === excludeId) continue;
                const prodRef = db.collection("products").doc(pid);
                const prodSnap = await prodRef.get();
                if (prodSnap.exists) {
                    products.push({ id: prodSnap.id, ...prodSnap.data() });
                }
            }
            if (products.length === 0) {
                relatedSection.style.display = 'none';
                return;
            }
            relatedSection.style.display = 'block';
            relatedScroll.innerHTML = '';
            products.slice(0, 8).forEach(prod => {
                const firstVar = prod.variants?.[0] || { price: '199', mrp: '299' };
                const discountTag = firstVar.mrp ? Math.round(((firstVar.mrp - firstVar.price) / firstVar.mrp) * 100) : 0;
                const card = document.createElement('div');
                card.className = 'related-card';
                card.innerHTML = `
                    <div class="discount-tag">${discountTag}% OFF</div>
                    <img class="related-img" src="${prod.images?.[0] || 'https://placehold.co/400x400/f5e9e7/c0392b?text=Pickle'}" alt="${escapeHtml(prod.name)}">
                    <div class="related-name">${escapeHtml(prod.name)}</div>
                    <div><span class="related-price">₹${firstVar.price}</span> <span class="related-mrp">₹${firstVar.mrp}</span></div>
                    <div class="stars" style="font-size:0.7rem;">${renderStars(prod.rating || 4)}</div>
                    <button class="view-product-btn" data-id="${prod.id}">View Product</button>
                `;
                const viewBtn = card.querySelector('.view-product-btn');
                viewBtn.addEventListener('click', () => {
                    window.location.href = `view.html?id=${prod.id}`;
                });
                relatedScroll.appendChild(card);
            });
        } catch (err) {
            console.warn("Related products error", err);
            relatedSection.style.display = 'none';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
    }

    async function loadProduct(productId) {
        try {
            const docRef = db.collection("products").doc(productId);
            const docSnap = await docRef.get();
            if (!docSnap.exists) {
                loaderDiv.innerHTML = '<div style="text-align:center;padding:2rem;">❌ Product not found. <a href="index.html">Go back to shop</a></div>';
                return;
            }
            const data = docSnap.data();
            currentProduct = { id: docSnap.id, ...data };
            allImages = currentProduct.images || ["https://placehold.co/600x600/f5e9e7/c0392b?text=Pickle"];
            variantList = currentProduct.variants || [];
            if (variantList.length) currentVariant = variantList[0];
            else currentVariant = { price: 0, mrp: 0, weight: 'Standard' };

            buildGallery();
            const detailsHtml = buildDetailsHTML();
            detailsContainer.innerHTML = detailsHtml;
            detailsContainer.style.display = 'block';
            loaderDiv.style.display = 'none';

            if (variantList.length) renderVariants(variantList, currentVariant.id);
            updatePriceFromVariant();
            attachEventListeners();

            const categoryRef = currentProduct.category;
            if (categoryRef) {
                await loadRelatedProducts(categoryRef, currentProduct.id);
            } else {
                relatedSection.style.display = 'none';
            }

            const observer = new IntersectionObserver((entries) => {
                const relatedTitle = document.querySelector('.related-title');
                if (entries[0]?.isIntersecting) {
                    document.getElementById('imageColumn')?.classList.add('stop-sticky');
                } else {
                    document.getElementById('imageColumn')?.classList.remove('stop-sticky');
                }
            }, { threshold: 0.1, rootMargin: "0px 0px -80px 0px" });
            const relatedTitleElem = document.querySelector('.related-title');
            if (relatedTitleElem) observer.observe(relatedTitleElem);
        } catch (err) {
            console.error(err);
            loaderDiv.innerHTML = '<div style="text-align:center;padding:2rem;">⚠️ Error loading product. Please try again later.</div>';
        }
    }

    // ========== COMBO SECTION LOGIC ==========
    let comboAllPickles = [];
    let comboSelectedIds = [];
    let comboMaxSelect = 4;

    function comboEscapeHtml(str) {
        return str ? str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m]) : '';
    }

    function comboUpdateUI() {
        const count = comboSelectedIds.length;
        document.getElementById('comboSelectedCount').textContent = count;
        const limitReached = count === comboMaxSelect;
        const gridEl = document.querySelector('.combo-pickle-grid');
        if (gridEl) gridEl.classList.toggle('limit-reached', limitReached);
        document.querySelectorAll('.combo-pickle-item').forEach(item => {
            item.classList.toggle('selected', comboSelectedIds.includes(item.dataset.id));
        });
        const addBtn = document.getElementById('comboAddToCartBtn');
        const buyBtn = document.getElementById('comboBuyNowBtn');
        const msgEl = document.getElementById('comboStatusMsg');
        if (count === comboMaxSelect) {
            addBtn.classList.remove('combo-btn-hidden');
            buyBtn.classList.remove('combo-btn-hidden');
            msgEl.textContent = '🎉 Perfect combo! You can now checkout.';
        } else {
            addBtn.classList.add('combo-btn-hidden');
            buyBtn.classList.add('combo-btn-hidden');
            const remaining = comboMaxSelect - count;
            msgEl.textContent = remaining > 0 ? ` Select ${remaining} more pickle${remaining > 1 ? 's' : ''} to unlock.` : '';
        }
    }

    function comboTogglePickle(pickleId) {
        const idx = comboSelectedIds.indexOf(pickleId);
        if (idx !== -1) {
            comboSelectedIds.splice(idx, 1);
        } else {
            if (comboSelectedIds.length >= comboMaxSelect) {
                const msgEl = document.getElementById('comboStatusMsg');
                msgEl.textContent = `⚠️ You can only select ${comboMaxSelect} pickles. Remove one first.`;
                setTimeout(() => {
                    const rem = comboMaxSelect - comboSelectedIds.length;
                    msgEl.textContent = rem > 0 ? `Select ${rem} more pickle${rem > 1 ? 's' : ''}.` : (comboSelectedIds.length === comboMaxSelect ? '🎉 Perfect combo!' : '');
                }, 1500);
                return;
            }
            comboSelectedIds.push(pickleId);
        }
        comboUpdateUI();
    }

    function comboRenderGrid() {
        const container = document.getElementById('comboPickleGridContainer');
        if (!comboAllPickles.length) {
            container.innerHTML = `<div style="text-align:center; padding: 2rem; color: #6b5b4e;">🍃 No pickles available in combo right now.</div>`;
            return;
        }
        const gridEl = document.createElement('div');
        gridEl.className = 'combo-pickle-grid';
        comboAllPickles.forEach(pickle => {
            const item = document.createElement('div');
            item.className = 'combo-pickle-item';
            if (comboSelectedIds.includes(pickle.id)) item.classList.add('selected');
            item.dataset.id = pickle.id;
            item.innerHTML = `
                <div class="combo-pickle-img-circle"><img src="${pickle.imageUrl}" alt="${comboEscapeHtml(pickle.name)}"></div>
                <div class="combo-pickle-info">
                    <div class="combo-pickle-name">${comboEscapeHtml(pickle.name)}</div>
                    <div class="combo-pickle-price">${pickle.price}</div>
                </div>`;
            item.addEventListener('click', (e) => { e.stopPropagation(); comboTogglePickle(pickle.id); });
            gridEl.appendChild(item);
        });
        container.innerHTML = '';
        container.appendChild(gridEl);
        comboUpdateUI();
    }

    async function comboFetchFromFirestore() {
        try {
            const snapshot = await db.collection('combos').get();
            if (snapshot.empty) throw new Error('No combos found');
            const data = snapshot.docs[0].data();
            comboAllPickles = (data.items || []).slice(0, 8).map(item => ({
                id: item.id || `item_${Math.random()}`,
                name: item.name || 'Unnamed Pickle',
                price: item.price || '₹199',
                imageUrl: item.imageUrl || 'https://placehold.co/400x400/f5e9e7/C0392B?text=Pickle'
            }));
            document.getElementById('comboBannerTitle').textContent = data.title || 'Special Combo';
            document.getElementById('comboBannerDesc').textContent = data.description || 'Select your favourite pickles';
            if (data.maxSelect) comboMaxSelect = data.maxSelect;
            document.getElementById('comboMaxSpan').textContent = comboMaxSelect;
            comboRenderGrid();
        } catch (err) {
            console.error('Combo error:', err);
            // fallback mock data
            comboAllPickles = [
                { id: '1', name: 'Chicken Pickle', price: '₹299', imageUrl: 'https://placehold.co/400/e2d6ca/5a3a2a?text=Chicken' },
                { id: '2', name: 'Mutton Pickle', price: '₹399', imageUrl: 'https://placehold.co/400/e2d6ca/5a3a2a?text=Mutton' },
                { id: '3', name: 'Prawn Pickle', price: '₹349', imageUrl: 'https://placehold.co/400/e2d6ca/5a3a2a?text=Prawns' },
                { id: '4', name: 'Fish Pickle', price: '₹249', imageUrl: 'https://placehold.co/400/e2d6ca/5a3a2a?text=Fish' }
            ];
            comboRenderGrid();
        }
    }

    // ========== INITIALIZE ==========
    const urlParams = new URLSearchParams(window.location.search);
    let productId = urlParams.get('id');
    if (!productId) productId = "spicyMangoDelight";
    loadProduct(productId);
    comboFetchFromFirestore();

    // Combo button events
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('comboAddToCartBtn')?.addEventListener('click', () => {
            const names = comboAllPickles.filter(p => comboSelectedIds.includes(p.id)).map(i => i.name).join(', ');
            alert(`🍯 Combo added to cart!\nSelected: ${names}`);
        });
        document.getElementById('comboBuyNowBtn')?.addEventListener('click', () => {
            const names = comboAllPickles.filter(p => comboSelectedIds.includes(p.id)).map(i => i.name).join(', ');
            alert(`🚀 Proceeding to checkout!\nSelected: ${names}`);
        });
    });
</script>
</body>
