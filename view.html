<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Page | Happy NonVeg Pickles</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f9f9f9;
            padding: 40px 20px;
        }

        /* Back to shop link */
        .back-link {
            display: inline-block;
            margin-bottom: 24px;
            color: #e67e22;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #c0392b;
            text-decoration: underline;
        }

        /* Main content area (no card) */
        .product-detail-container {
            max-width: 1200px;
            margin: 0 auto;
            background: transparent;
            padding: 0;
        }

        /* Loading & error */
        .loading-state, .error-state {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.2rem;
            color: #e67e22;
        }
        .error-state { color: #d32f2f; }

        /* --- TOP SPLIT SECTION --- */
        .split-layout {
            display: flex;
            gap: 50px;
            align-items: flex-start;
            margin-bottom: 40px;
        }

        .sticky-image-column {
            flex: 1.5;
            position: sticky;
            top: 40px;
        }

        .image-section {
            display: flex;
            gap: 15px;
        }

        .thumbnail-column {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 90px;
            flex-shrink: 0;
        }

        .thumb {
            width: 100%;
            height: 90px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            background-color: #e0e0e0;
            transition: border 0.2s ease;
        }

        .thumb:hover, .thumb.active { border-color: red; }

        /* ✅ Main image height changed to 600px */
        .main-image-container {
            flex: 1;
            height: 600px;
            background-color: #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #eaeaea;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }

        .scrollable-content-column {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .details-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .product-header {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .product-title {
            font-size: 2.2rem;
            color: #2c3e50;
            line-height: 1.2;
        }

        .price-container {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-top: 5px;
            flex-wrap: wrap;
        }

        .current-price-display {
            font-size: 2rem;
            font-weight: bold;
            color: #e67e22;
        }

        .mrp-price {
            font-size: 1.2rem;
            color: #95a5a6;
            text-decoration: line-through;
        }
        
        .discount-badge {
            background-color: #2ecc71;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .rating-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stars { color: #f1c40f; font-size: 1.3rem; }
        .rating-text { color: #7f8c8d; font-size: 0.95rem; }
        
        hr {
            border: 0;
            height: 1px;
            background: #eaeaea;
            width: 100%;
            margin: 10px 0;
        }

        .pricing-section h3 {
            font-size: 1.1rem;
            color: #34495e;
            margin-bottom: 12px;
        }

        .quantity-options {
            display: flex;
            gap: 15px; 
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .quantity-card {
            flex: 1;
            cursor: pointer;
            min-width: 100px;
        }

        .quantity-card input { display: none; }

        .card-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border: 2px solid #eaeaea;
            border-radius: 8px;
            transition: all 0.2s ease;
            text-align: center;
            background: #fff;
        }

        .card-content .weight {
            font-weight: bold;
            color: #2c3e50;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .card-prices { font-size: 0.9rem; color: #555; }
        .card-prices .strike { text-decoration: line-through; color: #95a5a6; font-size: 0.8rem; }
        .card-discount { color: #d32f2f; font-weight: bold; font-size: 0.8rem; margin-top: 3px; }

        .quantity-card input:checked + .card-content {
            border-color: red;
            background-color: #fff5f5; 
        }

        .item-quantity {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .item-quantity span { font-weight: bold; color: #34495e; }

        .qty-controls {
            display: flex;
            align-items: center;
            border: 1px solid #ccc;
            border-radius: 6px;
            overflow: hidden;
            background: #fff;
        }

        .qty-controls button {
            background: #f0f0f0; border: none; padding: 8px 15px;
            font-size: 1.2rem; cursor: pointer; transition: background 0.2s;
        }

        .qty-controls button:hover { background: #e0e0e0; }
        .qty-controls input {
            width: 40px; text-align: center; border: none;
            font-size: 1.1rem; font-weight: bold; outline: none; background: #fff;
        }

        .action-container { display: flex; flex-direction: column; gap: 15px; }
        .cart-wishlist-row { display: flex; gap: 15px; width: 100%; }

        .cart-btn, .wishlist-btn {
            flex: 1; 
            padding: 16px; font-size: 1.1rem; font-weight: bold;
            border-radius: 8px; cursor: pointer; display: flex;
            justify-content: center; align-items: center; gap: 10px;
            transition: all 0.3s ease;
        }

        .cart-btn { background-color: black; color: white; border: 2px solid black; }
        .wishlist-btn { background-color: white; color: black; border: 2px solid black; }
        .buy-now-btn {
            width: 100%; background-color: #e67e22; color: white; border: none;
            padding: 16px; font-size: 1.2rem; font-weight: bold; border-radius: 8px;
            cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 15px;
            transition: all 0.3s ease; text-transform: uppercase;
        }

        .cart-btn:hover, .wishlist-btn:hover, .buy-now-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }
        .cart-btn:hover { opacity: 0.85; }
        .wishlist-btn:hover { border-color: red; color: red; }
        .buy-now-btn:hover { background-color: #cf6d17; }

        .policy-accordion { background: #fdfbf7; border-radius: 8px; border: 1px solid #e67e22; overflow: hidden; margin-top: 10px; }
        .policy-accordion summary {
            padding: 15px; font-weight: bold; color: #e67e22; cursor: pointer;
            outline: none; list-style: none; display: flex; justify-content: space-between;
        }
        .policy-accordion summary::-webkit-details-marker { display: none; }
        .policy-accordion summary::after { content: '+'; font-size: 1.2rem; }
        .policy-accordion[open] summary::after { content: '-'; }
        .policy-accordion p {
            padding: 0 15px 15px 15px; color: #2c3e50; font-size: 0.95rem; line-height: 1.5;
            border-top: 1px dashed #e67e22; padding-top: 15px;
        }

        .description-section h2 { font-size: 1.5rem; color: #2c3e50; margin-bottom: 15px; }
        .description-section p { color: #555; line-height: 1.7; font-size: 1.05rem; }
        .description-section {
            background: transparent;
            padding: 0;
            margin-bottom: 40px;
        }

        /* Related products section */
        .related-products-section {
            margin-top: 40px;
        }
        .related-products-section h2 {
            font-size: 1.8rem;
            color: #2c3e50;
            margin-bottom: 25px;
        }

        /* Default grid for multiple cards */
        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        /* Card base style */
        .related-card {
            border: 1px solid #eaeaea;
            border-radius: 12px;
            background: #fff;
            text-align: center;
            padding-bottom: 15px;
            cursor: pointer;
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .related-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
        }

        .related-discount-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #d32f2f;
            color: white;
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 4px;
            z-index: 10;
        }

        .related-img-box {
            width: 100%;
            height: 180px;
            background-color: #f0f0f0;
            border-radius: 12px 12px 0 0;
            overflow: hidden;
        }
        .related-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .related-name {
            font-size: 1.05rem;
            color: #2c3e50;
            margin: 12px 10px 6px;
            font-weight: 600;
        }
        .related-price { color: #e67e22; font-weight: bold; }
        .related-mrp {
            text-decoration: line-through;
            color: #95a5a6;
            font-size: 0.9rem;
            margin-left: 8px;
        }
        .view-product-btn {
            background-color: black;
            color: white;
            border: none;
            padding: 10px 18px;
            margin: 12px 15px 0;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .view-product-btn:hover { background: #333; }

        .no-related-msg {
            text-align: center;
            color: #95a5a6;
            font-style: italic;
            padding: 20px;
        }

        /* ✅ Special style when only ONE related product exists */
        .related-grid.single-related {
            display: flex;
            justify-content: center;
        }
        .related-grid.single-related .related-card {
            width: 120px;
            height: 240px;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .related-grid.single-related .related-img-box {
            height: 100px;
            border-radius: 12px 12px 0 0;
        }
        .related-grid.single-related .related-name {
            font-size: 0.85rem;
            margin: 6px 6px 2px;
        }
        .related-grid.single-related .related-price,
        .related-grid.single-related .related-mrp {
            font-size: 0.8rem;
        }
        .related-grid.single-related .view-product-btn {
            padding: 6px 12px;
            font-size: 0.75rem;
            margin: 6px auto;
        }
        .related-grid.single-related .related-discount-tag {
            font-size: 0.7rem;
            padding: 2px 6px;
            top: 6px;
            right: 6px;
        }

        @media (max-width: 900px) {
            .split-layout { flex-direction: column; gap: 30px; }
            .sticky-image-column { position: relative; top: 0; }
            .thumbnail-column { flex-direction: row; width: 100%; }
            .thumb { width: calc(25% - 9px); }
            .main-image-container { height: 400px; } /* slightly reduced on mobile */
        }
    </style>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="page-wrapper">
    <a href="landing.html" class="back-link">← Back to Shop</a>
    <div class="product-detail-container" id="productContainer">
        <div class="loading-state">Loading product...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM",
        authDomain: "pickle-fdc54.firebaseapp.com",
        projectId: "pickle-fdc54",
        storageBucket: "pickle-fdc54.firebasestorage.app",
        messagingSenderId: "650348710985",
        appId: "1:650348710985:web:b8eedb551a79b536578398",
        measurementId: "G-B40NG5KQDL"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');

    let mainImageEl, currentPriceEl, mrpPriceEl, discountBadgeEl, qtyInput;
    let currentImgIndex = 0;
    let slideInterval;
    let productImages = [];

    const FALLBACK_IMG = "https://via.placeholder.com/600x420?text=Image+Not+Found";

    function updatePrice(price, mrp, discountPercent = null) {
        if (currentPriceEl) currentPriceEl.innerText = `₹${price}`;
        if (mrpPriceEl) mrpPriceEl.innerText = `₹${mrp}`;
        if (discountBadgeEl) {
            if (discountPercent !== null) {
                discountBadgeEl.innerText = `${discountPercent}% OFF`;
            } else if (mrp > price) {
                const disc = Math.round((1 - price/mrp)*100);
                discountBadgeEl.innerText = `${disc}% OFF`;
            } else {
                discountBadgeEl.innerText = '';
            }
        }
    }

    function changeQty(amount) {
        let val = parseInt(qtyInput.value);
        let newVal = val + amount;
        if (newVal >= 1) qtyInput.value = newVal;
    }

    function startSlideShow() {
        if (slideInterval) clearInterval(slideInterval);
        if (!productImages.length) return;
        slideInterval = setInterval(() => {
            currentImgIndex = (currentImgIndex + 1) % productImages.length;
            updateMainImageByIndex(currentImgIndex);
        }, 5000);
    }

    function updateMainImageByIndex(index) {
        if (!productImages[index]) return;
        mainImageEl.src = productImages[index];
        const thumbs = document.querySelectorAll('.thumb');
        thumbs.forEach((thumb, i) => {
            if (i === index) thumb.classList.add('active');
            else thumb.classList.remove('active');
        });
    }

    function changeImage(element, index) {
        currentImgIndex = index;
        mainImageEl.src = element.src;
        const thumbs = document.querySelectorAll('.thumb');
        thumbs.forEach((thumb, i) => {
            if (i === index) thumb.classList.add('active');
            else thumb.classList.remove('active');
        });
        clearInterval(slideInterval);
        startSlideShow();
    }

    async function loadCategoryRelatedProducts(productCategoryId, productCategoryName, currentId) {
        const grid = document.getElementById('relatedGrid');
        if (!grid) return;
        if (!productCategoryId && !productCategoryName) {
            grid.innerHTML = '<p class="no-related-msg">No related products found.</p>';
            return;
        }

        try {
            const snapshot = await db.collection("products").get();
            let related = [];
            snapshot.forEach(doc => {
                if (doc.id !== currentId) {
                    const data = doc.data();
                    const catMatch = (productCategoryId && data.categoryId === productCategoryId) ||
                                     (productCategoryName && data.category === productCategoryName);
                    if (catMatch) {
                        related.push({ id: doc.id, ...data });
                    }
                }
            });

            related = related.slice(0, 4);

            if (related.length === 0) {
                grid.innerHTML = '<p class="no-related-msg">No other products in this category.</p>';
                grid.classList.remove('single-related');
                return;
            }

            let html = '';
            related.forEach(p => {
                const img = p.image || FALLBACK_IMG;
                const name = p.name || "Pickle";
                const defaultVariant = (p.variants && p.variants.length > 0) ? p.variants[0] : {};
                const price = defaultVariant.price || p.price || 0;
                const mrp = defaultVariant.mrp || p.mrp || price;
                const discount = (mrp > price) ? Math.round((1 - price/mrp)*100) : 0;
                html += `
                    <div class="related-card" onclick="window.location.href='view.html?id=${p.id}'">
                        <div class="related-discount-tag">${discount}% OFF</div>
                        <div class="related-img-box"><img src="${img}" alt="${escapeHtml(name)}" onerror="this.onerror=null;this.src='${FALLBACK_IMG}';"></div>
                        <div class="related-name">${escapeHtml(name)}</div>
                        <div><span class="related-price">₹${price}</span><span class="related-mrp">₹${mrp}</span></div>
                        <button class="view-product-btn">View Product</button>
                    </div>
                `;
            });
            grid.innerHTML = html;

            // ✅ Apply single card class if only one item
            if (related.length === 1) {
                grid.classList.add('single-related');
            } else {
                grid.classList.remove('single-related');
            }

        } catch (err) {
            console.error('Failed to load category related products:', err);
            grid.innerHTML = '<p class="error-state">⚠️ Could not load related items.</p>';
            grid.classList.remove('single-related');
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function loadProduct() {
        const container = document.getElementById('productContainer');
        if (!productId) {
            container.innerHTML = `<div class="error-state">❌ No product ID specified in URL.</div>`;
            return;
        }

        try {
            const docSnap = await db.collection("products").doc(productId).get();
            if (!docSnap.exists) {
                container.innerHTML = `<div class="error-state">❌ Product not found. Please check the link.</div>`;
                return;
            }
            const product = { id: docSnap.id, ...docSnap.data() };
            
            const name = product.name || "Traditional Pickle";
            const variants = product.variants || [];
            const defaultPrice = variants.length ? variants[0].price : (product.price || 0);
            const defaultMRP = variants.length ? variants[0].mrp : (product.mrp || defaultPrice);
            
            const singleImage = product.image || FALLBACK_IMG;
            productImages = [singleImage];
            
            const rating = product.rating || 4.5;
            const ratingStars = "★".repeat(Math.floor(rating)) + "☆".repeat(5-Math.floor(rating));
            const description = product.description || "Handcrafted with authentic spices and love. No artificial preservatives.";

            let variantsHtml = '';
            if (variants.length > 0) {
                variants.forEach((v, idx) => {
                    const isChecked = idx === 0 ? 'checked' : '';
                    const discountPercent = Math.round((1 - v.price/v.mrp)*100);
                    variantsHtml += `
                        <label class="quantity-card">
                            <input type="radio" name="weight" value="${v.weight}" ${isChecked} onclick="updatePrice(${v.price}, ${v.mrp}, ${discountPercent})">
                            <div class="card-content">
                                <span class="weight">${v.weight}</span>
                                <div class="card-prices">₹${v.price} <span class="strike">₹${v.mrp}</span></div>
                                <div class="card-discount">${discountPercent}% OFF</div>
                            </div>
                        </label>
                    `;
                });
            } else {
                variantsHtml = '<p class="error-state">Only one size available.</p>';
            }

            const thumbsHtml = `<img src="${singleImage}" alt="Product image" class="thumb active" onclick="changeImage(this, 0)" onerror="this.onerror=null;this.src='${FALLBACK_IMG}';">`;

            const fullHtml = `
                <div class="split-layout">
                    <div class="sticky-image-column">
                        <div class="image-section">
                            <div class="thumbnail-column" id="thumbnailColumn">
                                ${thumbsHtml}
                            </div>
                            <div class="main-image-container">
                                <img src="${singleImage}" alt="Main View" id="mainImage" onerror="this.onerror=null;this.src='${FALLBACK_IMG}';">
                            </div>
                        </div>
                    </div>
                    <div class="scrollable-content-column">
                        <div class="details-section">
                            <div class="product-header">
                                <h1 class="product-title">${escapeHtml(name)}</h1>
                                <div class="price-container">
                                    <span class="current-price-display" id="dynamicPrice">₹${defaultPrice}</span>
                                    <span class="mrp-price" id="dynamicMRP">₹${defaultMRP}</span>
                                    <span class="discount-badge" id="discountBadge">${Math.round((1 - defaultPrice/defaultMRP)*100)}% OFF</span>
                                </div>
                                <div class="rating-container">
                                    <span class="stars">${ratingStars}</span>
                                    <span class="rating-text">(${rating} out of 5 stars)</span>
                                </div>
                            </div>
                            <hr>
                            <div class="pricing-section">
                                <h3>Select Quantity:</h3>
                                <div class="quantity-options" id="variantsContainer">
                                    ${variantsHtml}
                                </div>
                            </div>
                            <div class="item-quantity">
                                <span>Quantity:</span>
                                <div class="qty-controls">
                                    <button type="button" onclick="changeQty(-1)">-</button>
                                    <input type="text" id="qtyInput" value="1" readonly>
                                    <button type="button" onclick="changeQty(1)">+</button>
                                </div>
                            </div>
                            <div class="action-container">
                                <div class="cart-wishlist-row">
                                    <button class="cart-btn" id="cartBtn">🛒 Add to cart</button>
                                    <button class="wishlist-btn">❤️ Wishlist</button>
                                </div>
                                <button class="buy-now-btn" id="buyNowBtn">BUY NOW</button>
                            </div>
                            <details class="policy-accordion">
                                <summary>Shipping & Return Policy</summary>
                                <p>Free shipping on orders over ₹499. Eligible for return within 7 days.</p>
                            </details>
                        </div>
                    </div>
                </div>
                <div class="description-section">
                    <h2>Product Description</h2>
                    <p>${escapeHtml(description)}</p>
                </div>
                <hr>
                <div class="related-products-section">
                    <h2>You May Also Like</h2>
                    <div class="related-grid" id="relatedGrid">
                        <p class="loading-state">Loading related products...</p>
                    </div>
                </div>
            `;
            container.innerHTML = fullHtml;

            mainImageEl = document.getElementById('mainImage');
            currentPriceEl = document.getElementById('dynamicPrice');
            mrpPriceEl = document.getElementById('dynamicMRP');
            discountBadgeEl = document.getElementById('discountBadge');
            qtyInput = document.getElementById('qtyInput');
            
            startSlideShow();
            
            document.getElementById('cartBtn')?.addEventListener('click', () => {
                alert(`Added ${qtyInput.value} item(s) to cart!`);
            });
            document.getElementById('buyNowBtn')?.addEventListener('click', () => {
                alert('Proceeding to checkout...');
            });

            const catId = product.categoryId;
            const catName = product.category;
            loadCategoryRelatedProducts(catId, catName, productId);

        } catch (err) {
            console.error(err);
            container.innerHTML = `<div class="error-state">⚠️ Failed to load product. Please try again later.</div>`;
        }
    }

    window.updatePrice = updatePrice;
    window.changeQty = changeQty;
    window.changeImage = changeImage;
    
    loadProduct();
</script>
