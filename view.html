<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Happy NonVeg Pickles – Product Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --rust: #C0392B;
      --rust-dark: #962d22;
      --rust-light: #f5e9e7;
      --turmeric: #E8A020;
      --cream: #FDF6EC;
      --ink: #1C1009;
      --ash: #6b5b4e;
      --border: rgba(28, 16, 9, 0.1);
      --shadow-sm: 0 2px 8px rgba(28, 16, 9, 0.08);
      --shadow-md: 0 8px 32px rgba(28, 16, 9, 0.12);
      --r-card: 16px;
      --r-pill: 999px;
      --ff-display: 'Playfair Display', Georgia, serif;
      --ff-body: 'DM Sans', sans-serif;
      --nav-h: 68px;
    }

    body {
      background-color: var(--cream);
      color: var(--ink);
      font-family: var(--ff-body);
      line-height: 1.5;
      padding-top: var(--nav-h);
    }

    /* Navigation (reusing landing style) */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 900;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5vw;
      background: rgba(253, 246, 236, 0.94);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: box-shadow 0.3s;
    }
    .nav.scrolled { box-shadow: var(--shadow-md); }
    .nav-logo {
      font-family: var(--ff-display);
      font-size: 1.45rem;
      font-weight: 900;
      color: var(--rust);
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-logo .dot {
      width: 8px;
      height: 8px;
      background: var(--turmeric);
      border-radius: 50%;
    }
    .nav-links { display: flex; gap: 32px; }
    .nav-links a {
      font-weight: 600;
      font-size: 14px;
      color: var(--ash);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--rust); }
    .nav-cta {
      background: var(--rust);
      color: #fff;
      padding: 10px 22px;
      border-radius: var(--r-pill);
      font-weight: 600;
    }
    .nav-hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }

    /* Main product layout */
    .product-container {
      max-width: 1280px;
      margin: 30px auto 60px;
      padding: 0 5vw;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
    }

    /* Images */
    .product-gallery {
      position: sticky;
      top: calc(var(--nav-h) + 20px);
    }
    .main-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #f0e7de;
      border-radius: var(--r-card);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      margin-bottom: 20px;
    }
    .main-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }
    .thumbnail-list {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .thumbnail {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border 0.2s, transform 0.2s;
      background: #e9dfd5;
    }
    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .thumbnail.active {
      border-color: var(--rust);
      transform: scale(0.98);
    }

    /* Product info */
    .product-info {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .product-title {
      font-family: var(--ff-display);
      font-size: 2.4rem;
      font-weight: 900;
      line-height: 1.2;
      color: var(--ink);
    }
    .rating {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .stars {
      color: var(--turmeric);
      font-size: 1.1rem;
      letter-spacing: 2px;
    }
    .review-count {
      color: var(--ash);
      font-size: 0.85rem;
    }
    .price-group {
      display: flex;
      align-items: baseline;
      gap: 14px;
      flex-wrap: wrap;
      background: var(--rust-light);
      padding: 12px 20px;
      border-radius: 60px;
      width: fit-content;
    }
    .current-price {
      font-size: 2rem;
      font-weight: 800;
      color: var(--rust);
    }
    .old-price {
      text-decoration: line-through;
      color: var(--ash);
      font-size: 1rem;
    }
    .discount-badge {
      background: var(--rust);
      color: white;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .description {
      color: #3a2c22;
      border-left: 4px solid var(--turmeric);
      padding-left: 18px;
      margin: 10px 0;
    }
    /* Variant selector */
    .variants-section h3 {
      font-size: 1rem;
      margin-bottom: 12px;
      font-weight: 600;
    }
    .variant-buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .variant-btn {
      border: 1.5px solid var(--border);
      background: white;
      border-radius: 60px;
      padding: 10px 24px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .variant-btn.active {
      border-color: var(--rust);
      background: var(--rust-light);
      color: var(--rust);
    }
    .qty-selector {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 8px 0 10px;
    }
    .qty-control {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 40px;
      overflow: hidden;
    }
    .qty-control button {
      background: #fff;
      border: none;
      padding: 8px 18px;
      font-size: 1.2rem;
      cursor: pointer;
      font-weight: bold;
    }
    .qty-control input {
      width: 50px;
      text-align: center;
      border: none;
      font-weight: 600;
      font-size: 1rem;
    }
    .action-buttons {
      display: flex;
      gap: 16px;
      margin-top: 12px;
    }
    .btn-primary, .btn-secondary {
      flex: 1;
      padding: 14px;
      border-radius: 40px;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-primary {
      background: var(--rust);
      color: white;
      border: none;
    }
    .btn-primary:hover {
      background: var(--rust-dark);
      transform: translateY(-2px);
    }
    .btn-secondary {
      background: transparent;
      border: 1.5px solid var(--rust);
      color: var(--rust);
    }
    .btn-secondary:hover {
      background: var(--rust-light);
    }
    /* Related products */
    .related-section {
      max-width: 1280px;
      margin: 80px auto 60px;
      padding: 0 5vw;
    }
    .related-section h2 {
      font-family: var(--ff-display);
      font-size: 1.9rem;
      margin-bottom: 28px;
      position: relative;
      display: inline-block;
    }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 28px;
    }
    .related-card {
      background: white;
      border-radius: var(--r-card);
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      cursor: pointer;
    }
    .related-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-md);
    }
    .related-img {
      aspect-ratio: 1 / 1;
      background: #f3ede7;
    }
    .related-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .related-info {
      padding: 14px;
    }
    .related-name {
      font-weight: 700;
      font-size: 0.95rem;
    }
    .related-price {
      color: var(--rust);
      font-weight: 800;
      margin-top: 6px;
    }
    /* Loading & errors */
    .loader {
      text-align: center;
      padding: 60px;
      color: var(--ash);
    }
    .error-message {
      background: #ffefef;
      padding: 30px;
      text-align: center;
      border-radius: var(--r-card);
      margin: 40px auto;
      max-width: 600px;
    }
    footer {
      background: var(--ink);
      color: rgba(255, 255, 255, 0.6);
      padding: 30px 5vw;
      text-align: center;
      margin-top: 50px;
    }

    @media (max-width: 800px) {
      .product-container { grid-template-columns: 1fr; gap: 32px; }
      .product-gallery { position: relative; top: 0; }
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }
    }
    @media (max-width: 500px) {
      .variant-buttons { gap: 10px; }
      .variant-btn { padding: 6px 18px; font-size: 0.85rem; }
      .thumbnail { width: 60px; height: 60px; }
    }
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s, transform 0.6s;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

<nav class="nav" id="mainNav">
  <div class="nav-logo">
    <span class="dot"></span> Happy NonVeg Pickles
  </div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="index.html#bestsellers">Best Sellers</a>
    <a href="index.html#categories">Shop</a>
  </div>
  <div class="nav-hamburger" id="hamburger">
    <span></span><span></span><span></span>
  </div>
</nav>

<main id="productDetailRoot">
  <div class="loader">Loading delicious details...</div>
</main>

<footer>
  <p>© 2025 Happy NonVeg Pickles — handcrafted with tradition.</p>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getFirestore, doc, getDoc, getDocs, collection, query, where, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  // Firebase config (same as landing page)
  const firebaseConfig = {
    apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM",
    authDomain: "pickle-fdc54.firebaseapp.com",
    projectId: "pickle-fdc54",
    storageBucket: "pickle-fdc54.firebasestorage.app",
    messagingSenderId: "650348710985",
    appId: "1:650348710985:web:b8eedb551a79b536578398",
    measurementId: "G-B40NG5KQDL"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Helper: get product ID from URL
  function getProductId() {
    const params = new URLSearchParams(window.location.search);
    return params.get('id');
  }

  // Format price
  function formatPrice(price) {
    return `₹${Math.round(Number(price))}`;
  }

  // Calculate discount percent
  function getDiscountPercent(mrp, price) {
    if (!mrp || !price || mrp <= price) return null;
    return Math.round(((mrp - price) / mrp) * 100);
  }

  // Render full product page
  async function loadProductPage() {
    const root = document.getElementById('productDetailRoot');
    const productId = getProductId();
    if (!productId) {
      root.innerHTML = `<div class="error-message">❌ Product ID missing. Please go back to the shop.</div>`;
      return;
    }

    try {
      // 1. Fetch product
      const productRef = doc(db, "products", productId);
      const productSnap = await getDoc(productRef);
      if (!productSnap.exists()) {
        root.innerHTML = `<div class="error-message">😕 Product not found. It may have been removed.</div>`;
        return;
      }
      const product = { id: productSnap.id, ...productSnap.data() };

      // 2. Fetch related products (same categoryId or category name)
      let relatedProducts = [];
      const categoryId = product.categoryId || product.category;
      if (categoryId) {
        const q = query(collection(db, "products"), where("categoryId", "==", categoryId), limit(5));
        const querySnap = await getDocs(q);
        querySnap.forEach(docSnap => {
          if (docSnap.id !== product.id) {
            relatedProducts.push({ id: docSnap.id, ...docSnap.data() });
          }
        });
      }
      // fallback: if less than 3, fetch some best sellers
      if (relatedProducts.length < 3) {
        const fallbackQ = query(collection(db, "products"), where("isavailable", "==", true), limit(4));
        const fallbackSnap = await getDocs(fallbackQ);
        fallbackSnap.forEach(docSnap => {
          if (docSnap.id !== product.id && !relatedProducts.find(r => r.id === docSnap.id)) {
            relatedProducts.push({ id: docSnap.id, ...docSnap.data() });
          }
        });
      }
      relatedProducts = relatedProducts.slice(0, 4);

      // Render DOM with real data
      renderProductPage(product, relatedProducts);
      observeReveal();
    } catch (err) {
      console.error("Firestore error:", err);
      root.innerHTML = `<div class="error-message">⚠️ Failed to load data. Please check your connection.</div>`;
    }
  }

  function renderProductPage(product, relatedProducts) {
    const variants = product.variants || [];
    const defaultVariant = variants[0] || { weight: "Standard", price: product.price || 249, mrp: product.mrp || 299 };
    const mainImageUrl = product.mainImage || product.image || "https://placehold.co/600x600/f5e9e7/c0392b?text=Pickle";
    const thumbImages = product.thumbnailImages || product.additionalImages || (mainImageUrl ? [mainImageUrl] : []);

    // Create HTML skeleton
    const html = `
      <div class="product-container reveal">
        <div class="product-gallery">
          <div class="main-image" id="mainImageContainer">
            <img id="mainProductImage" src="${mainImageUrl}" alt="${product.name}" onerror="this.src='https://placehold.co/600x600/f5e9e7/c0392b?text=Pickle'">
          </div>
          <div class="thumbnail-list" id="thumbnailList">
            ${thumbImages.map((img, idx) => `
              <div class="thumbnail ${idx === 0 ? 'active' : ''}" data-img="${img}">
                <img src="${img}" alt="thumbnail">
              </div>
            `).join('')}
          </div>
        </div>
        <div class="product-info">
          <h1 class="product-title">${escapeHtml(product.name)}</h1>
          <div class="rating">
            <div class="stars">${renderStars(product.rating || 4.7)}</div>
            <span class="review-count">${product.reviewCount || '★ 100+ reviews'}</span>
          </div>
          <div class="price-group" id="priceGroup">
            <span class="current-price" id="currentPrice">${formatPrice(defaultVariant.price)}</span>
            ${defaultVariant.mrp ? `<span class="old-price" id="oldPrice">${formatPrice(defaultVariant.mrp)}</span>` : ''}
            ${getDiscountPercent(defaultVariant.mrp, defaultVariant.price) ? `<span class="discount-badge" id="discountBadge">${getDiscountPercent(defaultVariant.mrp, defaultVariant.price)}% OFF</span>` : ''}
          </div>
          <div class="description">
            <p>${escapeHtml(product.description || "Authentic homemade-style pickle made with sun-dried mangoes and secret spices. No artificial preservatives.")}</p>
          </div>
          ${variants.length > 0 ? `
          <div class="variants-section">
            <h3>Select Size:</h3>
            <div class="variant-buttons" id="variantButtons">
              ${variants.map((v, idx) => `
                <button class="variant-btn ${idx === 0 ? 'active' : ''}" data-price="${v.price}" data-mrp="${v.mrp || ''}" data-weight="${v.weight}" data-discount="${getDiscountPercent(v.mrp, v.price) || ''}">
                  ${v.weight}  ${formatPrice(v.price)}
                </button>
              `).join('')}
            </div>
          </div>
          ` : ''}
          <div class="qty-selector">
            <span style="font-weight:600;">Quantity:</span>
            <div class="qty-control">
              <button id="qtyMinus">-</button>
              <input type="text" id="qtyInput" value="1" readonly>
              <button id="qtyPlus">+</button>
            </div>
          </div>
          <div class="action-buttons">
            <div class="btn-primary" id="addToCartBtn">🛒 Add to Cart</div>
            <div class="btn-secondary" id="wishlistBtn">❤️ Wishlist</div>
          </div>
        </div>
      </div>
      <div class="related-section reveal">
        <h2>🔥 You may also like</h2>
        <div class="related-grid" id="relatedGrid">
          ${relatedProducts.map(prod => `
            <div class="related-card" data-id="${prod.id}">
              <div class="related-img"><img src="${prod.mainImage || 'https://placehold.co/400x400/f5e9e7/c0392b?text=Pickle'}" alt="${prod.name}"></div>
              <div class="related-info">
                <div class="related-name">${escapeHtml(prod.name)}</div>
                <div class="related-price">${formatPrice(prod.variants?.[0]?.price || prod.price)}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    document.getElementById('productDetailRoot').innerHTML = html;

    // ---- Post-render interactions ----
    // Thumbnail switcher
    const thumbnails = document.querySelectorAll('.thumbnail');
    const mainImg = document.getElementById('mainProductImage');
    thumbnails.forEach(thumb => {
      thumb.addEventListener('click', () => {
        const newSrc = thumb.getAttribute('data-img');
        if (newSrc) {
          mainImg.src = newSrc;
          thumbnails.forEach(t => t.classList.remove('active'));
          thumb.classList.add('active');
        }
      });
    });

    // Variant selection
    const variantBtns = document.querySelectorAll('.variant-btn');
    const currentPriceSpan = document.getElementById('currentPrice');
    const oldPriceSpan = document.getElementById('oldPrice');
    const discountSpan = document.getElementById('discountBadge');
    
    function updateVariant(btn) {
      variantBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const price = btn.getAttribute('data-price');
      const mrp = btn.getAttribute('data-mrp');
      const discount = btn.getAttribute('data-discount');
      if (currentPriceSpan) currentPriceSpan.innerText = formatPrice(price);
      if (oldPriceSpan) {
        if (mrp && mrp !== 'null') oldPriceSpan.innerText = formatPrice(mrp);
        else oldPriceSpan.style.display = 'none';
      }
      if (discountSpan) {
        if (discount && discount !== 'null' && discount > 0) {
          discountSpan.innerText = `${discount}% OFF`;
          discountSpan.style.display = 'inline-block';
        } else {
          discountSpan.style.display = 'none';
        }
      }
    }

    variantBtns.forEach(btn => {
      btn.addEventListener('click', () => updateVariant(btn));
    });

    // Quantity
    const qtyInput = document.getElementById('qtyInput');
    document.getElementById('qtyMinus')?.addEventListener('click', () => {
      let val = parseInt(qtyInput.value) || 1;
      if (val > 1) qtyInput.value = val - 1;
    });
    document.getElementById('qtyPlus')?.addEventListener('click', () => {
      let val = parseInt(qtyInput.value) || 1;
      qtyInput.value = val + 1;
    });

    // Cart & wishlist actions
    const getSelectedVariant = () => {
      const activeBtn = document.querySelector('.variant-btn.active');
      if (activeBtn) {
        const weight = activeBtn.innerText.split(' ')[0];
        const price = parseFloat(activeBtn.getAttribute('data-price'));
        return { weight, price };
      }
      return { weight: variants[0]?.weight || 'Standard', price: variants[0]?.price || product.price };
    };

    document.getElementById('addToCartBtn')?.addEventListener('click', () => {
      const qty = parseInt(qtyInput.value);
      const variant = getSelectedVariant();
      alert(`🛒 Added to cart: ${product.name} (${variant.weight}) x ${qty} — Total ${formatPrice(variant.price * qty)}`);
    });
    document.getElementById('wishlistBtn')?.addEventListener('click', () => {
      alert(`❤️ ${product.name} saved to wishlist!`);
    });

    // Related products click
    document.querySelectorAll('.related-card').forEach(card => {
      card.addEventListener('click', (e) => {
        const pid = card.getAttribute('data-id');
        if (pid) window.location.href = `view.html?id=${pid}`;
      });
    });
  }

  function renderStars(rating) {
    const full = Math.floor(rating);
    const half = rating % 1 >= 0.5;
    let stars = '';
    for (let i = 0; i < full; i++) stars += '★';
    if (half) stars += '½';
    for (let i = 0; i < (5 - Math.ceil(rating)); i++) stars += '☆';
    return stars;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function observeReveal() {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  }

  // Sticky nav effect
  const nav = document.getElementById('mainNav');
  window.addEventListener('scroll', () => {
    if (window.scrollY > 10) nav.classList.add('scrolled');
    else nav.classList.remove('scrolled');
  });

  // Hamburger (for mobile)
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.querySelector('.nav-links');
  hamburger?.addEventListener('click', () => {
    if (navLinks.style.display === 'flex') navLinks.style.display = '';
    else navLinks.style.cssText = 'display: flex; flex-direction: column; position: fixed; top: var(--nav-h); left: 0; right: 0; background: rgba(253,246,236,0.98); backdrop-filter: blur(16px); padding: 24px 5vw; gap: 20px; z-index: 800;';
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.nav') && navLinks && navLinks.style.display === 'flex') {
      navLinks.style.display = '';
    }
  });

  // Start
  loadProductPage();
</script>
</body>
</html>
