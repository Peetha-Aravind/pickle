<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-amber-50 text-gray-800 min-h-screen">
    <nav class="bg-white/90 backdrop-blur sticky top-0 z-50 shadow-sm border-b border-amber-200">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center">
            <span class="font-bold text-xl text-amber-900"><i class="fas fa-pepper-hot text-red-600 mr-2"></i>Spicy Delights Admin</span>
            <a href="manage-categories.html" class="text-sm font-medium text-amber-700 hover:text-amber-900">&larr; Back to Categories</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-8 border-b border-amber-200 pb-4">
            <h2 id="page-title" class="text-3xl font-bold">Loading Category...</h2>
            <button id="add-btn" onclick="app.addProduct()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-medium shadow"><i class="fas fa-plus mr-1"></i> Add Pickle</button>
        </div>
        <div id="products-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM", authDomain: "pickle-fdc54.firebaseapp.com", projectId: "pickle-fdc54" };
        const db = getFirestore(initializeApp(firebaseConfig));
        const appId = 'spicy-delights-app';
        
        // Extract category ID from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const categoryId = urlParams.get('categoryId');

        window.app = {
            products: [],
            init: async () => {
                if(!categoryId) return window.location.href = 'manage-categories.html';
                
                // Fetch category name
                const catDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'categories', categoryId));
                document.getElementById('page-title').innerText = catDoc.exists() ? `Pickles in "${catDoc.data().name}"` : "Category Products";

                // Listen to products in this category
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'products'), snap => {
                    app.products = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).filter(p => p.categoryId === categoryId);
                    app.render();
                });
            },
            render: () => {
                const container = document.getElementById('products-container');
                if(app.products.length === 0) return container.innerHTML = "<p>No products found. Add one!</p>";
                
                container.innerHTML = app.products.map(prod => {
                    const price = prod.variants ? prod.variants[0].price : prod.price;
                    return `
                        <div class="bg-white rounded-xl shadow border overflow-hidden flex flex-col">
                            <img src="${prod.image}" class="h-48 w-full object-cover">
                            <div class="p-4 flex-grow flex flex-col justify-between">
                                <div><h3 class="text-lg font-bold">${prod.name}</h3></div>
                                <div class="flex justify-between items-center mt-4">
                                    <span class="text-lg font-bold text-green-700">₹${price}</span>
                                    <div>
                                        <a href="product.html?id=${prod.id}&categoryId=${categoryId}" class="text-blue-500 p-2"><i class="fas fa-edit"></i></a>
                                        <button onclick="app.deleteProduct('${prod.id}')" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                }).join('');
            },
            addProduct: () => window.location.href = `product.html?categoryId=${categoryId}`,
            deleteProduct: async (id) => {
                if(confirm("Delete this pickle?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id));
            }
        };
        app.init();
    </script>
</body>
</html>
