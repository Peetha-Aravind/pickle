<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section Settings - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #fffbeb; font-family: sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-gray-800 min-h-screen pb-20">
    <nav class="glass-panel sticky top-0 z-50 shadow-sm border-b border-amber-200">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center">
            <a href="index.html" class="font-bold text-xl text-amber-900"><i class="fas fa-pepper-hot text-red-600 mr-2"></i>Spicy Delights Admin</a>
            <a href="index.html" class="text-sm font-medium text-gray-600 hover:text-gray-900">Back to Dashboard</a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-8 space-y-8">
        
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-amber-200 pb-4 gap-4">
            <div>
                <h2 class="text-3xl font-bold"><i class="fas fa-images mr-2 text-amber-600"></i>Hero Section</h2>
                <p class="text-gray-600 mt-1">Manage the main image slider at the top of your landing page.</p>
            </div>
            <div class="flex space-x-3">
                <button onclick="app.openModal()" class="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-lg font-bold shadow transition-colors">
                    <i class="fas fa-plus mr-2"></i>Add New Slide
                </button>
                <button onclick="app.saveAllChanges()" id="save-btn" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-bold shadow-lg transition-transform transform hover:scale-105">
                    <i class="fas fa-save mr-2"></i>Save Changes
                </button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 flex justify-between items-center">
            <div>
                <h3 class="font-bold text-lg text-gray-800">Entire Hero Section</h3>
                <p class="text-sm text-gray-500">Enable or disable the slider entirely on the website.</p>
            </div>
            <div class="flex items-center space-x-3 bg-gray-50 p-2 px-4 rounded-lg border">
                <span class="font-bold" id="hero-status-text">Enabled</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="hero-toggle" class="sr-only peer" onchange="app.toggleMaster(event)">
                    <div class="w-14 h-7 bg-gray-300 rounded-full peer peer-focus:ring-2 peer-focus:ring-amber-300 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-green-600"></div>
                </label>
            </div>
        </div>

        <section class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
            <h3 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Current Slides</h3>
            <div id="slides-container" class="space-y-4">
                <div class="text-center py-8 text-gray-400 italic"><i class="fas fa-spinner fa-spin mr-2"></i>Loading slides...</div>
            </div>
        </section>

    </main>

    <div id="slide-modal" class="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center hidden backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl p-6 max-w-lg w-full mx-4">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="text-xl font-bold text-gray-800">Add New Slide</h3>
                <button onclick="app.closeModal()" class="text-gray-400 hover:text-red-500"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <div class="space-y-4 mb-6">
                <div>
                    <label class="text-sm font-bold text-gray-700 block mb-1"><i class="fas fa-desktop mr-1 text-gray-400"></i>Desktop Image URL *</label>
                    <input type="text" id="slide-desktop" class="w-full px-4 py-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-amber-400 focus:outline-none" placeholder="https://...">
                </div>
                <div>
                    <label class="text-sm font-bold text-gray-700 block mb-1"><i class="fas fa-mobile-alt mr-1 text-gray-400"></i>Mobile Image URL *</label>
                    <input type="text" id="slide-mobile" class="w-full px-4 py-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-amber-400 focus:outline-none" placeholder="https://...">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-sm font-bold text-gray-700 block mb-1">Button Name</label>
                        <input type="text" id="slide-btn-name" class="w-full px-4 py-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-amber-400 focus:outline-none" placeholder="Shop Now">
                    </div>
                    <div>
                        <label class="text-sm font-bold text-gray-700 block mb-1">Button Link</label>
                        <input type="text" id="slide-btn-link" class="w-full px-4 py-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-amber-400 focus:outline-none" placeholder="/products.html">
                    </div>
                </div>
            </div>
            
            <div class="flex justify-end space-x-3">
                <button onclick="app.closeModal()" class="px-5 py-2 bg-gray-100 hover:bg-gray-200 text-gray-800 rounded-lg font-medium transition-colors">Cancel</button>
                <button onclick="app.saveNewSlide()" id="modal-save-btn" class="px-5 py-2 bg-amber-600 hover:bg-amber-700 text-white rounded-lg font-bold shadow transition-colors">Save Slide</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxjDuFS_ntaOF-K8hFBaxQ0_8CR9yvbkM", authDomain: "pickle-fdc54.firebaseapp.com", projectId: "pickle-fdc54" };
        const db = getFirestore(initializeApp(firebaseConfig));

        // ─── Single document reference ───────────────────────────────────────────
        const MASTER_DOC = doc(db, 'landing_page', 'master');

        window.app = {
            slides: [],
            isHeroEnabled: true,
            
            init: async () => {
                try {
                    const snap = await getDoc(MASTER_DOC);
                    if (snap.exists()) {
                        const data = snap.data();
                        app.isHeroEnabled = data.config?.isHeroEnabled !== false;

                        const rawSlides = data.hero_slides?.slides || [];
                        app.slides = rawSlides.map(slide => ({
                            ...slide,
                            isActive: slide.isActive !== false
                        }));
                    }
                } catch (error) {
                    console.error("Error loading data:", error);
                    alert("Failed to load hero section data.");
                }
                
                app.render();
            },

            render: () => {
                const toggle = document.getElementById('hero-toggle');
                const statusText = document.getElementById('hero-status-text');
                toggle.checked = app.isHeroEnabled;
                statusText.innerText = app.isHeroEnabled ? "Enabled" : "Disabled";
                statusText.className = `font-bold ${app.isHeroEnabled ? 'text-green-600' : 'text-red-500'}`;

                const container = document.getElementById('slides-container');
                if (app.slides.length === 0) {
                    container.innerHTML = `<div class="text-center py-8 text-gray-400 italic">No slides added yet. Click "Add New Slide" to begin.</div>`;
                    return;
                }

                container.innerHTML = app.slides.map((slide, index) => `
                    <div class="flex flex-col sm:flex-row items-center justify-between bg-white border border-gray-200 rounded-xl p-4 shadow-sm hover:shadow transition-all ${!slide.isActive ? 'opacity-70 bg-gray-50' : ''}">
                        <div class="flex items-center space-x-4 w-full sm:w-auto">
                            <span class="text-gray-400 font-bold text-lg w-6">${index + 1}.</span>
                            <div class="relative">
                                <img src="${slide.desktopImg}" class="w-24 h-16 rounded object-cover border border-gray-300">
                                <span class="absolute -top-2 -right-2 bg-gray-800 text-white text-[10px] px-1.5 py-0.5 rounded shadow"><i class="fas fa-desktop"></i></span>
                            </div>
                            <div class="relative">
                                <img src="${slide.mobileImg}" class="w-12 h-16 rounded object-cover border border-gray-300">
                                <span class="absolute -top-2 -right-2 bg-gray-800 text-white text-[10px] px-1.5 py-0.5 rounded shadow"><i class="fas fa-mobile-alt"></i></span>
                            </div>
                            <div class="ml-4 hidden md:block w-48">
                                ${slide.btnName ? `
                                    <div class="text-sm font-bold text-gray-800">Btn: <span class="bg-amber-100 text-amber-800 px-2 py-0.5 rounded text-xs">${slide.btnName}</span></div>
                                    <div class="text-xs text-blue-500 mt-1 truncate"><i class="fas fa-link"></i> ${slide.btnLink || '#'}</div>
                                ` : `<span class="text-sm text-gray-400 italic">No button</span>`}
                            </div>
                        </div>
                        <div class="flex items-center space-x-6 mt-4 sm:mt-0">
                            <div class="flex flex-col items-center">
                                <label class="relative inline-flex items-center ${app.isHeroEnabled ? 'cursor-pointer' : 'cursor-not-allowed opacity-50'}">
                                    <input type="checkbox" class="sr-only peer" 
                                        ${slide.isActive ? 'checked' : ''} 
                                        ${!app.isHeroEnabled ? 'disabled' : ''} 
                                        onchange="app.toggleSlideStatus('${slide.id}')">
                                    <div class="w-11 h-6 bg-gray-300 rounded-full peer peer-focus:ring-2 peer-focus:ring-amber-300 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500"></div>
                                </label>
                                <span class="text-xs font-bold mt-1 ${slide.isActive ? 'text-blue-600' : 'text-gray-400'}">${slide.isActive ? 'Active' : 'Inactive'}</span>
                            </div>
                            <button onclick="app.deleteSlide('${slide.id}')" class="p-3 text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="Delete Slide">
                                <i class="fas fa-trash-alt text-lg"></i>
                            </button>
                        </div>
                    </div>
                `).join('');
            },

            toggleMaster: (event) => {
                app.isHeroEnabled = event.target.checked;
                
                // NEW LOGIC: If master is disabled, force all slides to inactive
                if (!app.isHeroEnabled) {
                    app.slides.forEach(slide => {
                        slide.isActive = false;
                    });
                }
                
                app.render();
            },

            toggleSlideStatus: (id) => {
                // Safeguard: Do nothing if the main toggle is turned off
                if (!app.isHeroEnabled) return; 

                const slideIndex = app.slides.findIndex(s => s.id === id);
                if (slideIndex > -1) {
                    app.slides[slideIndex].isActive = !app.slides[slideIndex].isActive;
                    app.render();
                }
            },

            openModal: () => document.getElementById('slide-modal').classList.remove('hidden'),
            closeModal: () => {
                document.getElementById('slide-modal').classList.add('hidden');
                ['slide-desktop','slide-mobile','slide-btn-name','slide-btn-link'].forEach(id => {
                    document.getElementById(id).value = '';
                });
            },

            saveNewSlide: async () => {
                const desktopImg = document.getElementById('slide-desktop').value.trim();
                const mobileImg = document.getElementById('slide-mobile').value.trim();
                const btnName = document.getElementById('slide-btn-name').value.trim();
                const btnLink = document.getElementById('slide-btn-link').value.trim();

                if (!desktopImg || !mobileImg) return alert("Desktop and Mobile images are required.");

                const btn = document.getElementById('modal-save-btn');
                btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i>`;
                btn.disabled = true;

                try {
                    const newSlide = {
                        id: Date.now().toString(),
                        desktopImg, mobileImg, btnName, btnLink,
                        isActive: app.isHeroEnabled, // Sets new slide to inactive if master is currently off
                        createdAt: Date.now()
                    };
                    app.slides.push(newSlide);

                    await setDoc(MASTER_DOC, {
                        hero_slides: { slides: app.slides }
                    }, { merge: true });

                    app.closeModal();
                    app.render();
                } catch (error) {
                    console.error(error);
                    alert("Failed to save slide.");
                } finally {
                    btn.innerHTML = `Save Slide`;
                    btn.disabled = false;
                }
            },

            deleteSlide: async (id) => {
                if (confirm("Delete this slide entirely?")) {
                    try {
                        app.slides = app.slides.filter(s => s.id !== id);

                        await setDoc(MASTER_DOC, {
                            hero_slides: { slides: app.slides }
                        }, { merge: true });

                        app.render();
                    } catch (error) {
                        console.error(error);
                        alert("Failed to delete slide.");
                    }
                }
            },

            saveAllChanges: async () => {
                const saveBtn = document.getElementById('save-btn');
                saveBtn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i>Saving...`;

                try {
                    await setDoc(MASTER_DOC, {
                        config: {
                            isHeroEnabled: app.isHeroEnabled,
                            updatedAt: Date.now()
                        },
                        hero_slides: {
                            slides: app.slides,
                            updatedAt: Date.now()
                        }
                    }, { merge: true });

                    saveBtn.innerHTML = `<i class="fas fa-check mr-2"></i>Saved!`;
                    saveBtn.classList.replace('bg-green-600', 'bg-blue-600');
                    setTimeout(() => {
                        saveBtn.innerHTML = `<i class="fas fa-save mr-2"></i>Save Changes`;
                        saveBtn.classList.replace('bg-blue-600', 'bg-green-600');
                    }, 2000);
                } catch (error) {
                    console.error("Error saving changes:", error);
                    alert("Failed to save all changes.");
                    saveBtn.innerHTML = `<i class="fas fa-save mr-2"></i>Save Changes`;
                }
            }
        };

        app.init();
    </script>
</body>
</html>
